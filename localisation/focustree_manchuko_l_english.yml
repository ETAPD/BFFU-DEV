MAN_replacemanestsuscontrol:0 "Replace Manestsu's Control"
MAN_replacemanestsuscontrol_desc:0 "Times have changed, and Mantetsu could not survive in the conditions of the policy pursued by the Kwantung Army. The total assets of the South Manchurian Railway exceeded two billion yen, and it employed more than 53,000 employees. It was the largest company organized in accordance with Japanese law. It operated its own railway zone and remained a virtually independent entity. The Kwantung Army wanted to reorganize Mantetsu and strip it of its administrative authority and associated privileges. It wants to turn it into a simple economic unit subordinate to the government of Manchuria."
MAN_remove_extraterritorially_privledges:0 "Remove Extraterritorially Privledges"
MAN_remove_extraterritorially_privledges_desc:0 "The South Manchurian Railway was an "empire within an empire" with special privileges that other private companies had never had, including an administratively separate railway zone and extraterritoriality. It has also developed into a huge holding company that influences all aspects of Manchurian economic life. The railway zone and the extraterritoriality were on the way to the independence of Manchukuo and, as a result, to the superiority of the Kwantung Army in all aspects of life. This means that Mantetsu is forced to abandon its local administration unit. Its employees were transferred to the jurisdiction of the Government of Manchukuo. Three days later, Yōsuke Matsuoka said goodbye to the other employees who had been transferred to the new Mange Corporation. The days of greatness of the South Manchurian Railway have come to an end."
