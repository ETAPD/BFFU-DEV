USA_tva_alcoa_power_compact:0 "TVA-ALCOA Power Compact"
USA_tva_alcoa_power_compact_desc:0 "The Tennessee Valley Authority's vast hydroelectric grid has been formally dedicated to powering Alcoa's aluminum smelters at full wartime capacity. The arrangement slashed production costs and eliminated the pre-war bottleneck that had constrained American aircraft output — flooding the national stockpile with 1,500 tonnes of aluminium and permanently raising the output of every factory drawing on the grid."
general_motors_upgraded_desc:0 "Fully converted to wartime manufacturing, General Motors has become the single largest industrial contributor to the American war effort — producing everything from aircraft engines to trucks, tanks, and artillery shells across 100+ plants nationwide."

 USA_willkies_funding:0 "Willkie's Funding"
 USA_willkies_funding_desc:0 "American industrial capital, authorised under the Lend-Lease Act, is flowing into this nation's factories. Wendell Willkie's commitment to Allied rearmament has given a direct boost to domestic production capacity."
 USA_funding_the_allies:0 "Funding the Allies"
 USA_funding_the_allies_desc:0 "Supporting the Allied war effort comes at a significant domestic cost. American consumer goods production is being redirected toward foreign aid shipments, placing a strain on the home economy that will persist for the next two years."
 USA_cio_union_backing:0 "CIO Union Backing"
 USA_cio_union_backing_desc:0 "The Congress of Industrial Organisations has thrown its weight behind the administration, channelling the collective power of organised labour into the nation's factories. Union discipline and worker solidarity have translated into measurable gains on the shop floor — production lines run more efficiently and workers hit their stride faster."
 USA_backed_by_big_business:0 "Backed By Big Business"
 USA_backed_by_big_business_desc:0 "American corporate interests have secured sweeping tax concessions from Washington, redirecting capital away from public spending and into private hands. Consumer goods become cheaper and more plentiful as industries flood the market — but the widening inequality and neglect of public institutions erodes national stability. These arrangements will hold only until the drums of war drown out the boardroom."
