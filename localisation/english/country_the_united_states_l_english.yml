 # ── Icon tooltips ─────────────────────────────────────────────────────────
 USA_WPB_armor_tt:0 "§YArmored Forces Sector§!\n\nDirects WPB resources toward tank and mechanised vehicle production.\n\n§WLevel 1:§! +5% Mil Factory Speed, -2.5% Armored Vehicle Cost\n§WLevel 2:§! +10% Mil Factory Speed, -5% Armored Vehicle Cost\n§WLevel 3:§! +15% Mil Factory Speed, -7.5% Armored Vehicle Cost"
 USA_WPB_air_tt:0 "§YAir Forces Sector§!\n\nDirects WPB resources toward reducing airframe procurement costs.\n\n§WLevel 1:§! -2.5% All Airframe Production Cost\n§WLevel 2:§! -5% All Airframe Production Cost\n§WLevel 3:§! -7.5% All Airframe Production Cost"
 USA_WPB_naval_tt:0 "§YNaval Forces Sector§!\n\nDirects WPB resources toward shipyard output and naval construction savings.\n\n§WLevel 1:§! +5% Dockyard Output, -1.25% Ship Construction Cost\n§WLevel 2:§! +10% Dockyard Output, -2.5% Ship Construction Cost\n§WLevel 3:§! +15% Dockyard Output, -3.75% Ship Construction Cost"
 USA_WPB_infantry_tt:0 "§YInfantry Forces Sector§!\n\nDirects WPB resources toward infantry equipment, squad weapons, and motorised procurement.\n\n§WLevel 1:§! -7.5% Inf Eq / -5% Squad Weapons / -2.5% Motorized Cost\n§WLevel 2:§! -10% Inf Eq / -7.5% Squad Weapons / -3.75% Motorized Cost\n§WLevel 3:§! -12.5% Inf Eq / -10% Squad Weapons / -5% Motorized Cost"

 # ── Button tooltips ───────────────────────────────────────────────────────
 USA_WPB_decrease_tt:0 "Remove one production point from this sector.\n\n§RRequires no active reallocation cooldown.§!\nSets a §Y90-day§! cooldown on further changes."
 USA_WPB_increase_tt:0 "Add one production point to this sector.\n\n§RRequires no active reallocation cooldown.§!\nSets a §Y90-day§! cooldown on further changes.\nMaximum §Y3 points per sector§!, §Y6 points total§!."

 # ── Decision category ─────────────────────────────────────────────────────
 USA_war_productions_board_cat:0 "War Productions Board"
 USA_war_productions_board_cat_desc:0 "The War Production Board coordinates the full weight of American industry toward the war effort. Allocate production points to prioritise sectors, and issue one-time Historical Directives to unlock permanent industrial reforms."

 # ── One-time directive decisions ──────────────────────────────────────────
 USA_WPB_automotive_ban_decision:0 "Automotive Production Ban"
 USA_WPB_automotive_ban_decision_desc:0 "On February 22, 1942, the WPB orders an immediate halt to all civilian automobile production. Over 1,000 auto plants across Michigan, Ohio, and Indiana are converted almost overnight to produce tanks, half-tracks, jeeps, and engine components. The assembly lines that built Fords and Chevrolets now roll with Sherman tanks and military trucks."
 USA_WPB_automotive_ban_effect_tt:0 "Civilian auto production is permanently halted. The factory conversion is immediate and irreversible:\n§R-40 Civilian Factories§!. auto plants shuttered across the country\n§G+30 Military Factories§!. lines retooled for tanks, half-tracks, and jeeps"

 USA_WPB_victory_ship_program_decision:0 "Victory Ship Program"
 USA_WPB_victory_ship_program_decision_desc:0 "By 1943 the Liberty Ship, for all its production advantages, is showing its limitations against U-boat attacks. The WPB authorises a new programme: the faster, better-armed Victory Ship. Henry Kaiser's yards adapt their revolutionary construction methods, cutting build time to 30 days and fielding a vessel capable of outrunning most U-boats."
 USA_WPB_victory_ship_effect_tt:0 "American shipyards transition to Victory Ship construction methods:\n§G+10% Dockyard Construction Speed§!\n§G+5% Dockyard Output Efficiency§!"

 USA_WPB_synthetic_rubber_decision:0 "Synthetic Rubber Drive"
 USA_WPB_synthetic_rubber_decision_desc:0 "Japan's seizure of Malaya in early 1942 cuts off 90% of America's natural rubber supply. The WPB initiates the largest and fastest industrial pivot in American history. 51 synthetic rubber plants are ordered built within 18 months. Bernard Baruch chairs the Rubber Survey Committee, and within a year American output of synthetic rubber exceeds pre-war natural rubber imports."
 USA_WPB_synthetic_rubber_effect_tt:0 "Domestic synthetic rubber production achieves independence from imported natural rubber:\n§G-3% Consumer Goods Factor§! (rubber independence stabilises civilian supply)\n§G+10% Local Resource Factor§!\n§G4 Synthetic Refineries§! constructed in §YLouisiana§! and §YTexas§!. the primary sites of the WPB rubber programme"

 USA_WPB_aluminum_drive_decision:0 "Aluminium Drive"
 USA_WPB_aluminum_drive_decision_desc:0 "By late 1941 the WPB identifies aluminium as the single greatest bottleneck strangling American aircraft output. Every fighter and bomber frame demands thousands of pounds of the metal, yet pre-war Alcoa capacity is woefully insufficient. The Board throws the full weight of federal investment behind Alcoa and orders the rapid construction of new government-owned smelters in the Pacific Northwest, tapping cheap hydroelectric power."
 USA_WPB_aluminum_drive_effect_tt:0 "Federal investment unlocks aluminium production capacity far beyond pre-war levels:\n§G+5% Arms Factory Production Speed§!\n§G+7.5% Air Range§!\n§G+1400 Aluminium§! deposited in §YTennessee§!. the state home to Alcoa's flagship smelter at §YAlcoa, TN§!"

 # ── Idea names & descriptions ─────────────────────────────────────────────
 USA_WPB_victory_ship_program:0 "Victory Ship Program"
 USA_WPB_victory_ship_program_desc:0 "American shipyards have fully transitioned to the faster and better-armed Victory Ship design, dramatically increasing throughput and survivability against U-boat interdiction."

 USA_WPB_synthetic_rubber_drive:0 "Synthetic Rubber Drive"
 USA_WPB_synthetic_rubber_drive_desc:0 "Fifty-one federal synthetic rubber plants now operate across the southern United States, breaking America's pre-war dependence on Malayan natural rubber and securing the supply chain for tyres, gaskets, and industrial components."

 USA_WPB_aluminum_drive:0 "Aluminium Drive"
 USA_WPB_aluminum_drive_desc:0 "Federally funded smelters powered by Pacific Northwest hydroelectric dams have resolved the aluminium bottleneck, freeing American aircraft production to reach its full theoretical capacity."

 # ── WPB Sector Cost Ideas ─────────────────────────────────────────────
 USA_WPB_armor_cost_1:0 "WPB. Armored Priority (Basic)"
 USA_WPB_armor_cost_1_desc:0 "WPB directives are channelling early resources toward armoured vehicle and motorised transport lines, achieving modest production cost reductions across tanks, half-tracks, and armoured cars."

 USA_WPB_armor_cost_2:0 "WPB. Armored Priority (Expanded)"
 USA_WPB_armor_cost_2_desc:0 "Expanded WPB coordination is standardising sub-components and bulk raw material procurement for the armoured vehicle sector, delivering significant savings on tanks, mechanised vehicles, and armoured cars."

 USA_WPB_armor_cost_3:0 "WPB. Armored Priority (Full Drive)"
 USA_WPB_armor_cost_3_desc:0 "Full WPB resources are concentrated behind the armoured vehicle sector. Dedicated production lines, government-negotiated material contracts, and continuous engineering refinement have driven armoured and motorised vehicle costs to their wartime floor."

 USA_WPB_air_cost_1:0 "WPB. Air Priority (Basic)"
 USA_WPB_air_cost_1_desc:0 "WPB allocations are beginning to ease procurement bottlenecks in the airframe sector, reducing production costs modestly across fighters, medium bombers, and heavy bombers."

 USA_WPB_air_cost_2:0 "WPB. Air Priority (Expanded)"
 USA_WPB_air_cost_2_desc:0 "Expanded WPB direction has rationalised airframe production across multiple manufacturers, standardising components and materiel contracts to deliver meaningful cost reductions on all aircraft types."

 USA_WPB_air_cost_3:0 "WPB. Air Priority (Total)"
 USA_WPB_air_cost_3_desc:0 "The WPB has placed the entire American airframe industry under a single coordinated procurement umbrella. Mass production, standardised parts pools, and federal material guarantees have driven aircraft production costs to their lowest achievable wartime level."

 USA_WPB_naval_cost_1:0 "WPB. Naval Priority (Basic)"
 USA_WPB_naval_cost_1_desc:0 "WPB resource coordination is beginning to reduce the cost of hull construction across the fleet, applying early savings to destroyer, battleship, carrier, and submarine programmes."

 USA_WPB_naval_cost_2:0 "WPB. Naval Priority (Expanded)"
 USA_WPB_naval_cost_2_desc:0 "Expanded WPB direction has standardised hull designs and coordinated steel procurement across multiple shipyard complexes, delivering meaningful construction cost reductions across the entire fleet."

 USA_WPB_naval_cost_3:0 "WPB. Naval Priority (Full Shipyard Drive)"
 USA_WPB_naval_cost_3_desc:0 "The WPB has concentrated its full weight behind naval construction. Federal material allocations, modular hull assembly techniques, and coordinated labour scheduling have driven ship construction costs to their wartime minimum."

 USA_WPB_infantry_cost_1:0 "WPB. Infantry Priority (Basic Supply)"
 USA_WPB_infantry_cost_1_desc:0 "WPB directives are beginning to ease procurement costs for the infantry sector. reducing the cost of rifles and small arms, crew-served weapons, and motorised transport at a modest but meaningful level."

 USA_WPB_infantry_cost_2:0 "WPB. Infantry Priority (Expanded Arsenals)"
 USA_WPB_infantry_cost_2_desc:0 "Expanded WPB coordination has rationalised government arsenal output, consolidated ammunition contracts, and standardised squad weapon designs, delivering significant savings across infantry equipment, support weapons, and motorised transport."

 USA_WPB_infantry_cost_3:0 "WPB. Infantry Priority (GI War Machine)"
 USA_WPB_infantry_cost_3_desc:0 "The WPB has placed American infantry equipment production on a full wartime footing. Federal arsenals, licensed commercial manufacturers, and centralised material procurement have together driven infantry equipment, support weapons, and motorised vehicle costs to their wartime floor."

 usa.300.a:0 "Accelerate the programme. spare no expense."
 usa.300.b:0 "We will reach the finish line on our own timetable."

