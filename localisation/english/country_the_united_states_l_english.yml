l_english:
 # Forward Pacific airfield islands (item 1) + Hawaii fortification (item 6)
 usa_pacific_airfield:0 "Forward Airfield"
 USA_forward_naval_basing_hawaii_tt:0 "§YIn 180 days§!, fortify the Hawaiian Islands:\n §G2§! levels of §YLand Fort§! on §YHonolulu§! (Pearl Harbor)\n §G3§! levels of §YCoastal Fort§! on §Yevery coastal tile§! of Hawaii"
 usa.308.a:0 "Hawaii stands fortified."
 # Industrial Reallocation (Landon/Willkie) — hidden background event
 usa_realloc.1.t:0 "Industrial Reallocation"
 usa_realloc.1.d:0 "Civilian factories in fully-built states are being relocated into the national off-map industrial pool."
 usa_realloc.1.a:0 "Understood."

 # TVA focus tooltips
 USA_tva_cooldown:0 "TVA Restructuring Cooldown Active"
 USA_force_merge_tva_kaiser_tt:0 "Unlocks the §YTVA-Kaiser Conglomerate§! industrial concern (§R150 PP§! to hire):\n §GConstruction Speed: +15%\n Building Slots per State: +30%\n 2,000 Steel§! on hire."
 USA_tva_cooldown_tt:0 "Imposes a §Y90-day cooldown§!. The focuses §YSell Off Government Control of the TVA§!, §YForce a Merge Between TVA and Kaiser§!, and §YUtilise TVA Profits§! cannot be undertaken until the period has elapsed. Each of those focuses resets the timer on completion."
 USA_tva_depression_tt:0 "Reduces the §YGreat Depression§! by §Gone level§!. Private investment and infrastructure development are beginning to ease the economic strain gripping the nation."
 USA_tva_depression_cooldown_tt:0 "Reduces the §YGreat Depression§! by §Gone level§!. The injection of private capital and expanding economic activity is lifting confidence across the country.\n\nImposes a §Y90-day cooldown§!. The focuses §YSell Off Government Control of the TVA§!, §YForce a Merge Between TVA and Kaiser§!, and §YUtilise TVA Profits§! cannot be undertaken until the period has elapsed."

 USA_contracts_towards_big_gas_tt:0 "Unlocks the §YStandard Oil of California§! industrial concern. The §Wbase§! version is available immediately and operates in peacetime. Once the United States §Renters a war§!, the §YWartime Contract§! variant unlocks. replacing it with doubled construction bonuses and direct fuel production gains.\n\nAdditionally, §YSynthetic Rubber Refinery§! resource output is increased by §G+10§! once the United States is at war. If this focus is completed before the war, the bonus will apply automatically at the start of hostilities."

 standard_oil_upgraded:0 "Standard Oil of California (Wartime Contract)"
 standard_oil_upgraded_desc:0 "Under a federal wartime contract secured through the Landon administration's dealings with big oil, Standard Oil of California has expanded its operations to their fullest extent. Refinery and fuel infrastructure are being built at double the peacetime rate, and direct fuel production is supplemented by federal pipeline commitments. keeping the army and navy supplied for the long fight ahead."

 tva_desc:0 "The Tennessee Valley Authority has brought federal electricity, flood control, and economic development to one of the most impoverished regions of the country. Its success has cemented public confidence in government-directed investment and concentrated significant political capital in the administration."

 tva_upgraded:0 "Tennessee Valley Authority"
 tva_upgraded_desc:0 "Expanded federal investment has transformed the TVA into a cornerstone of national development. Its broadened remit covers hydroelectric power, flood management, and regional planning, reinforcing public morale, strengthening the administration's hand, and building a sense of shared national purpose that is slowly steeling the country for the conflicts ahead."

 USA_tva_kaiser_conglomerate:0 "TVA-Kaiser Conglomerate"
 USA_tva_kaiser_conglomerate_desc:0 "The merger of the Tennessee Valley Authority's federal infrastructure network with Henry J. Kaiser's industrial empire has created the most formidable construction enterprise in American history. Kaiser's crews, already legendary for their speed on Hoover Dam and the Bay Bridge, now command the full weight of federal resources. The Conglomerate is turning out steel at a pace that is rapidly expanding America's industrial capacity. state by state."

 wpa_desc:0 "The Works Progress Administration employs millions of Americans in public construction, arts, and literacy programmes. Its vast network of federally directed labour is reshaping the nation's infrastructure and freeing up consumer spending while redirecting resources toward public works at an unprecedented scale."

 USA_idea_isolationism:0 "Isolationism"

 USA_two_ocean_navy_act:0 "Two-Ocean Navy Act"
 USA_two_ocean_navy_act_desc:0 "The Vinson-Walsh Act has authorised the largest single naval expansion in American history. a 70% increase in fleet tonnage to sustain simultaneous operations in both the Atlantic and Pacific. Shipyards are working round the clock, new slipways are under construction, and production contracts are being let at a pace the industry has never seen."

 USA_bureau_of_ships_desc:0 "The consolidation of the Bureau of Construction and Repair and the Bureau of Engineering into a single Bureau of Ships has centralised authority over ship design, construction oversight, and material procurement. Standardised hull designs and common components have dramatically boosted yard output. but the sheer scale of the bureau's administrative apparatus, civilian workforce, and procurement machinery draws heavily on the broader economy."

 USA_fy40_funding:0 "Fiscal Year 40 Funding"
 USA_fy40_funding_desc:0 "Congress has approved emergency naval appropriations under the Fiscal Year 1940 budget, committing the Bureau of Ships to the most ambitious single procurement plan in American naval history. Shipyards are operating at maximum capacity with priority on immediate fleet deliveries. but the concentrated pace of spending cannot be sustained once the nation is drawn into open war."

 USA_naval_funds_running_low:0 "Naval Funds Running Low"
 USA_naval_funds_running_low_desc:0 "With America at war, defence appropriations are being stretched across all services. The concentrated pre-war naval investment has given way to broader wartime priorities, and dockyard output suffers as contracts are renegotiated and materials are redirected to the armies mobilising across three continents."

 USA_middle_ground_naval_programme:0 "Balanced Naval Programme"
 USA_middle_ground_naval_programme_desc:0 "A steady, measured expansion of American naval capacity. investing equally in production output and new slipway construction. Neither the frantic pace of an emergency build-up nor the patience of a decade-long programme, the balanced approach produces a capable fleet on a sustainable footing that outlasts any rival."

 USA_long_term_funding:0 "Long Term Funding"
 USA_long_term_funding_desc:0 "Congress has committed to a multi-year naval expansion plan, prioritising shipyard infrastructure and slipway construction over immediate vessel delivery. Production costs run high as new facilities are constructed, and the redirection of federal resources into capital projects strains the civilian economy, but the foundations are being laid for the most powerful fleet in American history."

 USA_fy40_wartime_swap_tt:0 "Replaced by §YNaval Funds Running Low§! upon entering a war:"
 USA_fy42_wartime_swap_tt:0 "Replaced by §YSuperior Naval Shipbuilding§! upon entering a war:"

 USA_superior_naval_shipbuilding:0 "Superior Naval Shipbuilding"
 USA_superior_naval_shipbuilding_desc:0 "The long investment in shipyard capacity has paid dividends. American yards now operate at a scale and efficiency that outstrips any rival. standardised hull designs, pre-fabricated components, and a vast trained workforce allow ships to be built faster and cheaper than at any point in the nation's history. The fleet envisioned in the FY42 plan is being delivered ahead of schedule."

 USA_liberty_ship:0 "Liberty Ship Programme"
 USA_liberty_ship_desc:0 "The Emergency Shipbuilding Programme has standardised convoy vessel production around the EC2 Liberty Ship design. a simple, prefabricated hull that can be assembled in days rather than months. With production lines running across the East and Gulf Coasts, American yards can replace convoy losses faster than any adversary can sink them."

 USA_expanded_repair_yards:0 "Expanded Repair Yards"
 USA_expanded_repair_yards_desc:0 "Federal investment in naval repair infrastructure has transformed the Navy's maintenance capacity. Expanded drydock facilities, pre-positioned spare parts, and trained repair crews allow damaged vessels to return to service in a fraction of the previous time. and refitting older hulls for modern equipment has never been more efficient."

 USA_modern_super_heavy_designs:0 "Modern Super Heavy Designs"
 USA_modern_super_heavy_designs_desc:0 "The Bureau of Ships has finalised construction blueprints for the Montana-Class, incorporating lessons learned from earlier capital ship programmes. Streamlined procurement, pre-approved schematics, and dedicated yard allocations cut production costs across all super-heavy battleship hulls for the next two years."

 USA_new_ship_classes_research_spirit:0 "Naval Research Programme"
 USA_new_ship_classes_research_spirit_desc:0 "The Bureau of Ships has brought together the Navy's leading designers, engineers, and ordnance specialists under a unified research and development programme. With clear institutional backing and dedicated funding, American naval architects are advancing ship design, propulsion, weapons systems, and electronics at a pace unmatched since the Great War."

 USA_united_states_navy:0 "The United States Navy"
 USA_united_states_navy_desc:0 "The United States Navy enters the war years as a force of immense potential. but one hampered by peacetime neglect, doctrinal stagnation, and a catalogue of equipment failures. Capital ships lack battle-hardened crews and suffer from poor heavy gunfire accuracy. Anti-aircraft doctrine is underdeveloped, and carrier air group coordination remains inefficient. Most critically, the Navy's Mark 14 torpedo and its detonator have proven chronically unreliable. condemning submarine and carrier strikes alike. These are not permanent failings. With investment, experience, and reformed procurement, the United States Navy will become the most powerful naval force in the world."

 USA_naval_treaty:0 "Dormant Naval Industry"
 USA_naval_treaty_desc:0 "The long period of reduced shipbuilding as a result of the Naval Treaties, combined with the effects of the depression, has left our naval industry largely inactive and underfunded. It will take time to correct this."

 USA_torpedo_detonator_penalty:0 "Torpedo Reliability Issues"
 USA_torpedo_detonator_penalty_desc:0 "The Navy's Mark 14 torpedo has proven catastrophically unreliable. running too deep, striking as duds, or detonating prematurely before reaching their target. For years the Bureau of Ordnance has blamed the crews, but the defects are built into the weapon itself. Until they are acknowledged and corrected, our submarines will wage war with arms they cannot trust."

 USA_great_depression_4:0 "The Great Depression"
 USA_great_depression_4_desc:0 "The worst economic catastrophe in modern American history has left millions unemployed, banks collapsed, and industry paralysed. The road to recovery is long and uncertain."

 USA_great_depression_3:0 "The Great Depression"
 USA_great_depression_3_desc:0 "The depression still grips the nation. Unemployment remains high and industry is struggling, but early signs of recovery are beginning to emerge."

 USA_great_depression_2:0 "Economic Recovery"
 USA_great_depression_2_desc:0 "Federal programmes and investment are beginning to take hold. Production is rising and confidence is slowly returning, though the depression's scars run deep."

 USA_great_depression_1:0 "Early Recovery"
 USA_great_depression_1_desc:0 "The worst of the depression is behind us. Employment is recovering and industry is picking up pace, though full economic health is not yet restored."

 USA_dust_bowl:0 "The Dust Bowl"
 USA_dust_bowl_desc:0 "A decade of severe drought and destructive farming practices has turned the Great Plains into a wasteland of choking dust storms. Hundreds of thousands of displaced families flood westward, straining relief efforts and deepening public despair at a moment when American confidence is already fragile."

 USA_paying_off_veterans:0 "Paying Off Veterans"
 USA_paying_off_veterans_desc:0 "The Landon administration has pre-emptively met the veterans' demands, authorising the early payment of the bonus certificates before discontent can boil over into open protest. The goodwill generated is tangible. public confidence is ticking upward week by week, and the government's handling of the crisis has quietly bolstered the nation's appetite for collective sacrifice."

 USA_pwa_dismantled:0 "PWA Spending Halted"
 USA_pwa_dismantled_desc:0 "The federal spigot has been turned off. Cutting the PWA's budget frees up capital for the New Business Deal, but the retreat from public works reduces the administration's political reach. fewer federal projects means fewer levers of patronage and public goodwill to draw on."

 USA_political_corruption:0 "Political Corruption"
 USA_political_corruption_desc:0 "Graft, patronage networks, and entrenched machine politics sap the government's ability to act decisively, draining political capital and eroding public confidence in American institutions."

 USA_new_deal:0 "New Deal"
 USA_new_deal_desc:0 "Roosevelt's sweeping programme of federal intervention spans public works, financial reform, and relief agencies, rebuilding the nation's infrastructure and restoring faith in government, though it comes at a cost in political capital."

 USA_nye_committee_denounced:0 "Merchants of Death"
 USA_nye_committee_denounced_desc:0 "With the Nye Committee dissolved, the nation's arms manufacturers and their Wall Street backers operate free from congressional scrutiny. Profitable contracts and unregulated competition have pushed equipment production costs upward. corporations charge what the market will bear. In exchange, the Landon administration has slashed government social spending commitments, freeing up industrial capacity that the New Deal had earmarked for civilian relief."

 USA_new_business_deal:0 "The New Business Deal"
 USA_new_business_deal_desc:0 "Landon's alternative to Roosevelt's New Deal: less federal intervention, more private enterprise. The administration has entered into a broad economic compact with American industry, reducing the cost of civilian factory construction and sustaining infrastructure investment. The price is steep. social programmes are cut, public confidence wavers, and managing the demands of a business-first coalition drains the administration's political capital."

 USA_new_business_deal_jpm:0 "The New Business Deal"
 USA_new_business_deal_jpm_desc:0 "Landon's economic compact. now fortified by Morgan capital. J.P. Morgan's banking network has channelled private credit into the New Business Deal framework, accelerating civilian factory construction at pace. The arrangement is not without cost: Morgan's terms demand increased domestic consumption to sustain corporate liquidity, driving consumer goods requirements upward even as the factories rise."

 USA_new_business_deal_agri:0 "The New Business Deal"
 USA_new_business_deal_agri_desc:0 "Landon's economic compact has been reshaped by the demands of the Land Stewardship Act. Federal obligations to the farming lobby and rural interest groups have driven consumer goods requirements upward and placed new burdens on the administration's political capital. In exchange, improved confidence among rural voters and the farming community has provided a modest stabilising effect on the national mood."

 USA_new_business_deal_jpm_agri:0 "The New Business Deal"
 USA_new_business_deal_jpm_agri_desc:0 "Landon's economic compact. fortified by Morgan capital and reshaped by the Land Stewardship Act. The farming lobby's demands have layered new consumer goods costs and political burdens on top of Morgan's already steep terms, but the rural vote has been secured and public confidence holds."

 USA_socon_requires_third_new_deal_tt:0 "§RRequires the §YThird New Deal§R to be active.§! Complete §YA New Cheque for a New Deal§! first. This focus upgrades that spirit with the Soil Conservation Act's benefits."
 USA_socon_tnd_upgrade_tt:0 "§WExpands the Third New Deal with the Soil Conservation Act: adds §G−15%§W Consumer Goods Factories factor."
 USA_wic_tnd_upgrade_tt:0 "Renegotiates the §YThird New Deal§! through Congress: §R−10%§! Infrastructure and Civilian Factory construction speed in exchange for §G−7.5%§! Consumer Goods Factories factor."
 USA_agri_requires_nbd_tt:0 "§RRequires the §YNew Business Deal§R to be active.§! Complete §YCancel Deficit Spending§! first. The Agricultural Recovery Act upgrades that spirit with the farming lobby's demands."
 USA_agricultural_act_nbd_tt:0 "§WThe New Business Deal§! is modified by the agricultural lobby's demands:\n §GStability: +15%\n §RPolitical Power cost: +7.5%\n Consumer Goods factor: +5.0%§!"
 USA_agricultural_act_no_nbd_tt:0 "§RThe New Business Deal is not yet active.§! Complete §YCancel Deficit Spending§! first to activate the spirit. The agricultural modifications will apply automatically once it is in place."

 USA_domestic_economy_growth_achieved:0 "Domestic Economic Growth Achieved"
 USA_domestic_economy_growth_achieved_desc:0 "Years of sustained federal investment, corporate partnership, and strategic infrastructure spending have transformed the American domestic economy. Construction proceeds at a pace unmatched in the nation's history, public confidence in the government's stewardship runs high, and the country's productive base stands ready to meet whatever demands the coming years may bring. The era of recovery is over. the era of strength has begun."

 USA_third_new_deal:0 "Third New Deal"
 USA_third_new_deal_desc:0 "A bold expansion of federal investment has breathed new life into the American economy. Stabilised public confidence and a surge in public works spending are accelerating construction across the nation, laying the foundations for the industrial mobilisation to come."

 USA_third_new_deal_socon:0 "Third New Deal"
 USA_third_new_deal_socon_desc:0 "A bold expansion of federal investment has breathed new life into the American economy. The Soil Conservation and Domestic Allotment Act has further redirected federal resources, reducing consumer demand pressures while accelerating infrastructure and industrial construction across the nation."

 USA_soil_conservation_act:0 "Soil Conservation and Domestic Allotment Act"
 USA_soil_conservation_act_desc:0 "Federal programmes to restore depleted farmland and pay farmers to reduce surplus production are reshaping the agricultural economy. The redirection of federal spending toward land recovery is easing broader consumer demand pressures and beginning to rebuild rural confidence."

 USA_neutrality_1937:0 "Neutrality Acts"
 USA_neutrality_1937_desc:0 "Congress has codified American non-involvement into law. The Neutrality Acts prohibit arms sales and loans to belligerents on both sides, reflecting the public's deep aversion to foreign entanglements following the carnage of the Great War. Joining any foreign alliance or extending credit to warring nations remains firmly off the table."

 USA_neutrality_1939:0 "Cash and Carry"
 USA_neutrality_1939_desc:0 "A revised neutrality framework now permits belligerents to purchase American goods. provided they pay cash and arrange their own transport. This cautious step preserves the formal appearance of neutrality while quietly opening the door to Allied procurement, though any direct alliance commitment remains politically impossible."

 USA_neutrality_no_war_call:0 "American Non-Interventionism"
 USA_neutrality_no_war_call_desc:0 "America will not be dragged into a foreign war. The United States cannot be called into faction wars nor join a faction until it is attacked by Japan or Britain itself has fallen."

 USA_emerging_interventionism:0 "Emerging Interventionism"
 USA_emerging_interventionism_desc:0 "Roosevelt's Quarantine Speech has shifted the national conversation. The public's appetite for engagement is growing and defence spending is rising in kind, injecting new urgency into American industry and steeling the country's resolve against the spread of fascism."

 USA_inefficient_airforce_bureaucracy:0 "Inefficient Airforce Bureaucracy"
 USA_inefficient_airforce_bureaucracy_desc:0 "The pre-war U.S. Army Air Corps suffers from outdated doctrine, fragmented command structures, and chronic underfunding. Pilots lack standardised training and air force leaders struggle to secure resources or modernise tactics within a military bureaucracy that still views air power as secondary."

 USA_airforce_crushed_morale:0 "Airforce: Crushed Morale"
 USA_airforce_crushed_morale_desc:0 "The decision to keep the air arm subordinate to the Army has not been welcomed by its officers or pilots. Ambitions for an independent strategic service have been shelved, and the sense of institutional defeat hangs over every squadron. Training pipelines are sluggish, experienced aviators are leaving for private work, and the bureaucracy that hamstrings the Corps shows no sign of loosening its grip. The men who fly know they are fighting for an institution that does not fight for them."

 USA_decentralised_army_air_integration:0 "Decentralised Army Air Integration"
 USA_decentralised_army_air_integration_desc:0 "Rather than pursue an independent air force, the United States has doubled down on integrating airpower directly into Army ground operations. Air assets are spread across commands and subordinated to the needs of frontline commanders, resulting in highly responsive close air support but a fragmented strategic picture. The cost in centralised leadership and pilot training is real. but for an Army that fights alongside its air arm, the results on the battlefield speak for themselves."
 air_mastery_gain_factor_tt_n50:0 "Air doctrine mastery gain: -50%"

 USA_airforce_desire_for_independence:0 "Airforce Desire for Independence"
 USA_airforce_desire_for_independence_desc:0 "The creation of an independent air arm marks a decisive break from the old Army Air Corps model. A new command structure is taking shape, and while the organisation is still finding its footing. pilot pipelines are thin, doctrine is evolving, and the costs of standing up a separate service are not trivial. the foundations of a genuine strategic air force are being laid. In time, the inefficiencies of the transition will give way to something formidable."

 USA_usaaf_established:0 "USAAF Established"
 USA_usaaf_established_desc:0 "The United States Army Air Forces has been formally established as a major command. no longer an appendage of the Army but a genuine strategic service in its own right. A unified doctrine is taking hold, experienced leadership is directing resources where they are needed most, and the air force is becoming the formidable instrument its architects always envisioned. The costs of standing up a new branch are giving way to the dividends of purpose-built airpower."

 # Timed production cost spirits
 USA_big_week_air_push:0 "Preparing for Big Week"
 USA_big_week_air_push_desc:0 "American heavy bomber production is being prioritised and streamlined in preparation for an intensive strategic bombing campaign. Industry has adapted its lines to produce strategic bombers more cheaply and efficiently. but this mobilisation cannot be sustained indefinitely."

 USA_compromise_procurement:0 "Compromise Procurement Programme"
 USA_compromise_procurement_desc:0 "A procurement agreement has been struck between strategic and tactical aviation advocates. By standardising components and splitting contracts, both heavy fighters and tactical bombers can be produced at reduced cost over the next several months."

 USA_fighter_armaments_push:0 "Fighter Armaments Development Push"
 USA_fighter_armaments_push_desc:0 "Following Chennault's doctrine of aggressive fighter development, American manufacturers are being directed to reduce the cost and increase the output of both conventional fighters and heavy fighters. The focus on armament performance over exotic engineering is already simplifying the production process."

 USA_strike_aircraft_push:0 "Strike Aircraft Production Drive"
 USA_strike_aircraft_push_desc:0 "Grumman and Douglas have been tasked with accelerating output of close air support and naval strike aircraft. Streamlined contracts and refined manufacturing processes have driven down the cost of producing CAS and naval bomber airframes for a limited but valuable window."

 USA_heroes_mighty_eighth:0 "Heroes of the Mighty Eighth"
 USA_heroes_mighty_eighth_desc:0 "The men of the Eighth Air Force flew deep into occupied Europe under ferocious fighter and flak opposition, setting a standard of courage and sacrifice that became legend. Their service has inspired a doctrine of precision strategic bombing and a culture of resilience. American bombers fly harder, absorb more punishment, and strike with greater coordination as a result of the Eighth's example."

 USA_heroes_mighty_eighth_2:0 "Heroes of the Mighty Eighth: Napalm Programme"
 USA_heroes_mighty_eighth_2_desc:0 "The introduction of napalm incendiaries into the strategic bombing programme has transformed the Eighth Air Force's capacity for destruction. Incendiary raids burn far deeper into industrial complexes than conventional high-explosive loads. the Eighth's crews now fly with the knowledge that each sortie leaves nothing standing."

 USA_4th_fighter_group:0 "The 4th Fighter Group"
 USA_4th_fighter_group_desc:0 "The 4th Fighter Group, built on the combat experience of the Eagle Squadrons, stands as the premier fighter unit of the USAAF. Their aggressive tactics, precise gunnery, and deep camaraderie have set the standard for American fighter aviation. The rest of the air force models its training, doctrine, and spirit after the 4th's example, producing sharper pilots and more capable escorts across the board."

 # Conscription laws
 USA_volunteer_army:0 "Volunteer Army"
 USA_volunteer_army_desc:0 "The United States Army of 1936 is built entirely on volunteers. men who chose to serve in a peacetime force long underfunded and largely ignored by Congress. Numbers are thin, training is inconsistent, and the pool of recruitable manpower reflects a nation with no appetite for military service. The Army takes what it can get."

 USA_selective_service_conscription:0 "Selective Service Conscription"
 USA_selective_service_conscription_desc:0 "The Selective Service Act has introduced the first peacetime draft in American history. Registration is nationwide, inductions are underway, and the Army is growing at a pace that voluntary enlistment could never have sustained. The manpower pipeline is open. the question now is how fast the training infrastructure can absorb what it is being sent."

 USA_extensive_service_drafts:0 "Extensive Service Drafts"
 USA_extensive_service_drafts_desc:0 "Wartime demands have expanded the draft to its fullest peacetime-compatible extent. Deferment categories have been narrowed, service terms extended, and the intake of new soldiers is running at the maximum the training system can handle. The Army is no longer short of men. it is short of time to turn them into soldiers."

 USA_desegregated_army:0 "Desegregated Army"
 USA_desegregated_army_desc:0 "By executive order, racial segregation in the United States Armed Forces has been abolished. African American soldiers are no longer confined to separate units under white officers. they serve, train, and fight alongside their fellow Americans as equals. The manpower pool of the nation is now drawn upon in full, without arbitrary exclusion. It is a transformation long overdue, and one that will be measured in the weight of the divisions it puts in the field."

 # Army spirits
 USA_united_states_army:0 "United States Army"
 USA_united_states_army_desc:0 "The United States Army of 1936 is a professional institution proud of its heritage but hollowed by a decade of austerity. The officer corps is experienced and principled, the doctrine inherited from the Great War sound enough. but the rank and file are few, the equipment is ageing, and appropriations are a fraction of what a modern army demands. What the Army becomes depends entirely on the decisions made in the years ahead."

 # NOTE: USA_united_states_army_reformed removed. bonuses now applied directly to the USA_united_states_army dynamic modifier via variables

 USA_outdated_undertrained_underfunded:0 "Outdated, Undertrained, Underfunded"
 USA_outdated_undertrained_underfunded_desc:0 "Years of Congressional budget cuts, isolationist sentiment, and institutional neglect have left the United States Army in a state of genuine crisis. Equipment is a generation behind its European counterparts, the training pipeline cannot keep pace with even peacetime needs, doctrine has stagnated, and the promotion system is so encrusted with seniority rules that talent is strangled at every rank. High command billets are beyond reach, and even modest reforms require time the country may not have. Before the United States can project power, it must first rebuild the instrument of that power from the ground up."

 USA_outdated_undertrained_underfunded_2:0 "Undertrained, Underfunded"
 USA_outdated_undertrained_underfunded_2_desc:0 "The Army's observers in Spain have brought back hard-won lessons. from the olive groves and broken offensives of the Civil War. and the institution is beginning, haltingly, to absorb them. Training doctrine is being revised, and a handful of officers willing to challenge the old thinking are gaining ground. The structural problems have not gone away: budgets remain thin, promotion is still slow, and high command billets remain out of reach. But the Army is no longer entirely blind to what modern war demands of it."

 USA_outdated_undertrained_underfunded_3:0 "An Army Learning"
 USA_outdated_undertrained_underfunded_3_desc:0 "The fall of France was a shock that even the most complacent officers in Washington could not ignore. The speed of the German advance, the collapse of what was supposed to be the finest army in Europe. it has forced a genuine reckoning in the American military establishment. Doctrine is being overhauled, training is accelerating, and the dead weight of the old seniority system is beginning, slowly, to give way. The Army is still underfunded and years behind, but it is learning. and it knows now what it is learning for."

 # Armour Programme spirits. added by armour-branch focuses
 USA_m6_production_support:0 "M6 Heavy Tank Support"
 USA_m6_production_support_desc:0 "Congressional funding and industrial priority have been directed at the M6 heavy tank programme. Contracts have been expedited, supplier bottlenecks cleared, and the full weight of the armoured branch's procurement machinery turned toward getting more M6s out the factory door for less."

 USA_streamlined_sherman_production:0 "Streamlined Sherman Production"
 USA_streamlined_sherman_production_desc:0 "Years of production runs at the Fisher Body and Chrysler Tank Arsenal plants have taught engineers exactly where to find efficiencies in the M4 line. Retooled jigs, rationalised supply chains, and shared component standards across variants have brought the unit cost of the Sherman chassis down without compromising the quality that made it the backbone of Allied armoured warfare."

 USA_pershing_production_priority:0 "Pershing Production Priority"
 USA_pershing_production_priority_desc:0 "The Ordnance Department has designated the M26 Pershing a priority procurement item. Industrial contracts, raw material allocations, and tooling investments have been accelerated to drive down the chassis cost as quickly as possible. the Army is getting its modern tank, and getting it at a price the war economy can sustain."

 # M29 Weasel. granted technology
 usa_m29_weasel:0 "M29 Weasel"
 usa_m29_weasel_desc:0 "The M29 Weasel is a lightweight tracked carrier designed to cross terrain that would stop any wheeled vehicle dead. Developed from a Studebaker prototype, it floats, climbs, and hauls supplies through mud, snow, jungle, and swamp alike. Issue of the Weasel to mountaineer and marine formations dramatically improves their cross-country mobility across every environment."

 # Marine Invasion Advisors. granted technology
 USA_marine_invasion_advisors:0 "Marine Invasion Advisors"
 USA_marine_invasion_advisors_desc:0 "Veteran Marine officers and assault-landing specialists are embedded with Army formations as tactical advisors. Drawing on hard-won experience from Pacific island campaigns, they refine pre-landing planning, surf-crossing drills, and beachhead consolidation across every branch of the ground forces. All combat battalions gain greater effectiveness when pressing an amphibious assault."

 # Offer Invasion Advisors. focus tooltip
 USA_offer_invasion_advisors_tech_tt:0 "Grants the §YMarine Invasion Advisors§! technology. All ground battalions receive §G+10%§! attack in §Yamphibious§! terrain."

 # Federal Project One. decision category, decisions, tooltips, and spirit tiers
 USA_federal_project_one_cat:0 "Federal Project One"
 USA_federal_project_one_cat_desc:0 "Sub-divisions of the WPA's Federal Project Number One, employing artists, musicians, actors, writers, and archivists across the country. Each programme strengthens the nation's cultural fabric and the government's grip on public morale."

 USA_federal_art_project:0 "Federal Art Project"
 USA_federal_art_project_desc:0 "Commission murals, prints, and posters for government buildings across the country. The WPA's artists will put the face of the New Deal on every post office wall from Maine to California."
 USA_federal_art_project_tt:0 "Public art and propaganda posters boost national pride and war readiness."

 USA_federal_music_project:0 "Federal Music Project"
 USA_federal_music_project_desc:0 "Employ sixteen thousand musicians to perform free concerts and teach music education in Depression-hit communities. The sound of the nation will carry its people through the hardest years."
 USA_federal_music_project_tt:0 "Free concerts and music education sustain public morale and ease economic anxiety."

 USA_federal_theatre_project:0 "Federal Theatre Project"
 USA_federal_theatre_project_desc:0 "Fund theatre companies, vaudeville troupes, and Living Newspaper productions to reach tens of millions of Americans. No other WPA programme touches the public as broadly or as immediately."
 USA_federal_theatre_project_tt:0 "Mass-audience productions build civic consciousness and political engagement."

 USA_federal_writers_project:0 "Federal Writers' Project"
 USA_federal_writers_project_desc:0 "Put America's unemployed writers to work producing state travel guides, folklore collections, and oral histories. In doing so they will document the nation's identity and preserve knowledge that might otherwise be lost."
 USA_federal_writers_project_tt:0 "Documentation and cultural preservation sharpen the nation's intellectual resources."

 USA_historical_records_survey:0 "Historical Records Survey"
 USA_historical_records_survey_desc:0 "Dispatch survey teams to county courthouses, federal archives, and church registries across the country. A nation that knows its records governs itself more efficiently."
 USA_historical_records_survey_tt:0 "Systematic archiving of public records reduces bureaucratic friction and speeds administration."

 USA_federal_project_one_unlock_tt:0 "Unlocks the §YFederal Project One§! decision tab. Five WPA cultural programmes that progressively strengthen the nation's morale and administrative efficiency."

 # Federal Project One spirit tiers
 USA_federal_project_one_1:0 "Federal Project One"
 USA_federal_project_one_1_desc:0 "The WPA's arts programmes have begun. Federal artists are putting murals on government walls and posters in public spaces, forging a visible national identity out of the Depression's wreckage."

 USA_federal_project_one_2:0 "Federal Project One"
 USA_federal_project_one_2_desc:0 "Music has joined art. Sixteen thousand federal musicians are performing free concerts in parks and community halls, keeping spirits alive in cities where relief lines stretch around the block."

 USA_federal_project_one_3:0 "Federal Project One"
 USA_federal_project_one_3_desc:0 "The Federal Theatre Project has taken the stage. Living Newspaper productions and travelling troupes are reaching thirty million Americans. the government's most powerful instrument of mass cultural engagement."

 USA_federal_project_one_4:0 "Federal Project One"
 USA_federal_project_one_4_desc:0 "Writers have joined the effort. State guides, folklore archives, and oral histories are being assembled from coast to coast, documenting America's identity and putting its intellectuals to productive work."

 USA_federal_project_one_5:0 "Federal Project One"
 USA_federal_project_one_5_desc:0 "All five programmes are running. The Historical Records Survey has completed the framework. county records, federal archives, and church registries inventoried across the nation. The government knows itself, and so does its people."

 USA_usace_spirit:0 "US Army Corps of Engineers"
 USA_usace_spirit_desc:0 "The Army Corps of Engineers has been mobilised to assist with the nation's military and civil infrastructure. Under federal direction, military construction across the country is accelerated. supply networks, rail lines, ports, fortifications, airfields, anti-air emplacements, and radar installations all benefit from the Corps' expertise and organisational reach."

 USA_rfc_spirit:0 "Reconstruction Finance Corporation"
 USA_rfc_spirit_desc:0 "The RFC provides emergency credit to banks, railroads, and struggling industries, easing the economy's civilian drag and allowing businesses to operate with greater efficiency. Federal control over the nation's lending gives Washington quiet leverage over the commanding heights of American commerce."

 USA_ops_war_economy_tt:0 "Upon declaration of war, the §YOffice of Prices and Supply§! supplements the War Economy: §G-15%§! Resources to Market and §G+5%§! Local Resource Efficiency are added to the §YWar Economy of the United States§! dynamic modifier."

 USA_war_economy_ops:0 "War Economy. Office of Prices and Supply"
 USA_war_economy_ops_desc:0 "The Office of Prices and Supply has invoked its wartime authority. capping the export of vital raw materials and mandating that domestic extraction be maximised for military and industrial use."

 # CWA direction focus tooltip
 USA_cwa_dispute_focus_tt:0 "Fires the §YDispute Over CWA Direction§! event. Choose between the §Yengineers'§! vision (§G-7.5%§! Consumer Goods, §G+7.5%§! Dockyard Output) or the §Ysocial workers'§! vision (§G+5%§! Factory Output, §G+5%§! Stability)."

 # Office of Prices and Supply
 USA_ops_spirit:0 "Office of Prices and Supply"
 USA_ops_spirit_desc:0 "The Office of Prices and Supply has assumed broad authority over the allocation and pricing of strategic raw materials. By regulating domestic commodity markets and directing resource flows away from open export, the OPS ensures that American industry and the armed forces receive first call on the nation's mineral and agricultural wealth. Local extraction becomes more worthwhile as speculative trading is curtailed, and the government's hand in the supply chain tightens with every passing month."

 # CWA Direction spirits
 USA_cwa_engineers_spirit:0 "CWA: Engineers' Mandate"
 USA_cwa_engineers_spirit_desc:0 "Control of the Civil Works Administration passed to its engineers and industrial planners. Under their direction, the CWA's enormous workforce has been channelled into heavy construction. drydocks, shipways, and marine works that the private sector could never have financed alone. The result is a leaner agency with fewer overhead costs and substantially greater output from every dollar of naval investment."

 USA_cwa_social_workers_spirit:0 "CWA: Workers' Mandate"
 USA_cwa_social_workers_spirit_desc:0 "Control of the Civil Works Administration passed to its social workers and community advocates. Under their stewardship, the CWA prioritised wages, working conditions, and the welfare of the labourers it employed. and the effect on American morale has been profound. Factories report higher throughput as workers arrive steadier, healthier, and with greater confidence in their government. The sense that Washington is working for ordinary Americans has strengthened the national fabric."

 USA_einstein_szilard_spirit:0 "The Einstein–Szilard Letter"
 USA_einstein_szilard_spirit_desc:0 "Albert Einstein's letter to President Roosevelt. drafted with the urgency of physicist Leo Szilard. has galvanised federal investment in advanced scientific research. The warning that uranium chain reactions could yield weapons of extraordinary power has shifted Washington's attitude toward scientific institutions: funding flows more freely, bureaucratic obstacles are cleared, and America's research community operates with a new sense of mission and purpose."

 USA_rural_electrification_administration_spirit:0 "Rural Electrification Administration"
 USA_rural_electrification_administration_spirit_desc:0 "The Rural Electrification Administration's programme of federally backed cooperatives has brought electrical power to millions of American farms and rural communities for the first time. The construction of transmission lines, sub-stations, and distribution networks across the interior has dramatically reduced the cost of consumer goods, accelerated infrastructure development, and opened up local resource extraction that was previously uneconomical. The new electrical grid is also proving invaluable to the development of radar and detection technology, as ground stations and antenna networks can now be reliably powered across previously inaccessible terrain."

 USA_dupont_expertise:0 "DuPont's Expertise"
 USA_dupont_expertise_desc:0 "The appointment of DuPont's industrial leadership to the Tennessee Valley Authority has injected world-class chemical and electronic research capability into federal planning. DuPont's laboratories, among the most advanced in the world, are now operating in concert with government priorities, accelerating American progress in electronics and industrial science."

 USA_appoint_dupont_to_the_tva_tt:0 "§GGM/DuPont§! relations advance to §YNeutral§!."

 USA_alphabet_agencies_unlocks_tt:0 "Unlocks the §YTennessee Valley Authority§! and §YWorks Progress Administration§! industrial concerns for hire."
 USA_expand_tva_upgrades_tt:0 "Upgrades the §YTennessee Valley Authority§! industrial concern if currently hired.\nUnlocks the upgraded §YTennessee Valley Authority§! concern for hire (§R150 PP§!)."

 USA_contract_lasts_365_tt:0 "§YContract is active for §G365 days§Y (one year), then it expires.§!"
 USA_reclaim_democracy:0 "Reclaim Democracy"
 USA_reclaim_democracy_desc:0 "With Britain fallen and London in enemy hands, the United States enters the war not merely to win, but to liberate. Every soldier who steps onto English soil fights to restore the cradle of democracy.

§G+15.0%§! Army Attack"
 consumer_goods_expected_value_tt:0 " $MODIFIER_CONSUMER_GOODS_EXPECTED_VALUE$: $RIGHT|Y=%1$"
 USA_wealth_tax_4_to_3_tt:0 "The §YFull Crisis§! eases to §YSevere§!:\n §GConsumer Goods Required: -5.0%§!\n §GResources from States: +10.0%§!\n §GRecruits Available: +0.50%§!\n §GConstruction Speed: +5.0%§!"
 USA_wealth_tax_3_to_2_tt:0 "The §YSevere§! depression eases to §YModerate§!:\n §GConsumer Goods Required: -5.0%§!\n §GResources from States: +10.0%§!\n §GRecruits Available: +0.30%§!\n §GConstruction Speed: +3.0%§!"
 USA_wealth_tax_2_to_1_tt:0 "The §YModerate§! depression eases to §YMild§!:\n §GConsumer Goods Required: -5.0%§!\n §GResources from States: +10.0%§!\n §GRecruits Available: +0.40%§!\n §GConstruction Speed: +4.0%§!"
 USA_wealth_tax_1_to_0_tt:0 "The §YGreat Depression§! is lifted entirely:\n §GConsumer Goods Required: -5.0%§!\n §GResources from States: +10.0%§!\n §GRecruits Available: +0.30%§!\n §GConstruction Speed: +3.0%§!"

 USA_nlrb:0 "National Labor Relations Board"
 USA_nlrb_desc:0 "The reorganised National Labor Relations Board has strengthened federal oversight of labour disputes, guaranteeing workers the right to organise and bargain collectively. The resulting stability on the factory floor has raised production efficiency, accelerated industrial output, and unlocked investment in new rounds of industrial expansion."

 USA_ccc:0 "Civil Construction Corps"
 USA_ccc_desc:0 "Hundreds of thousands of young Americans are enrolled in work camps across the country, building roads, bridges, and public infrastructure. The Corps has become a cornerstone of federal investment, accelerating construction across the board, driving industrial development, and putting the nation's natural resources to more productive use."

 keynesianism:0 "Keynesianism"
 keynesianism_desc:0 "Roosevelt's wartime economic programme channels the full weight of federal authority into rearmament. Government expenditure and central direction of industry have accelerated military and naval production to extraordinary levels, while civilian factory construction is deliberately deprioritised in favour of the arms economy. The conversion of industrial capacity is locked in. the factory mix is fixed by federal decree."

 militarised_keynesianism:0 "Militarised Keynesianism"
 militarised_keynesianism_desc:0 "Roosevelt's Keynesian framework has been further refined. Decades of economic theory applied to wartime conditions have squeezed additional efficiency from the production base. factory and dockyard output are climbing, and military construction is accelerating as the administration's grip on industry tightens."

 laissez_faire:0 "Laissez-Faire"
 laissez_faire_desc:0 "Landon's economic programme dismantles federal interference and unleashes private enterprise. Reduced regulatory burden and lower taxation have turbocharged construction and investment across the board, with private industry expanding rapidly into both civilian and military production. Factory conversion is frictionless as capital flows freely toward the most profitable opportunities. leaving the market, not the state, to direct the American war economy."

 laissez_faire_wartime:0 "Laissez-Faire (Wartime)"
 laissez_faire_wartime_desc:0 "Pearl Harbour has done what no federal programme ever could: it has turned American private enterprise toward the war effort entirely of its own accord. The defence contracts are flowing, arms manufacturers are scaling up at a pace the government could never have mandated, and military construction, once strangled by the ideology of non-intervention, is now running at a net positive speed. The market has chosen war."

 militarised_keynesianism_wartime:0 "Militarised Keynesianism (Wartime)"
 militarised_keynesianism_wartime_desc:0 "The shock of Pearl Harbour has stripped away the last restraints on Roosevelt's economic mobilisation. Federal direction of industry has reached its apex. factory and dockyard output have crossed into positive territory as the state commands every lever of production, and military construction is accelerating faster than any peacetime planner projected. The Keynesian machine is running at full throttle."

 USA_third_new_deal_flsa:0 "Third New Deal"
 USA_third_new_deal_flsa_desc:0 "A bold expansion of federal investment has breathed new life into the American economy. The Fair Labour Standards Act has further energised organised labour. codifying workers' rights and driving productivity on the factory floor."

 USA_third_new_deal_socon_flsa:0 "Third New Deal"
 USA_third_new_deal_socon_flsa_desc:0 "A bold expansion of federal investment has breathed new life into the American economy. The Soil Conservation Act has redirected federal resources to reduce consumer demand pressures, while the Fair Labour Standards Act has galvanised organised labour and boosted factory output across the nation."

 # War Economy of the United States. added by December 7th focus
 USA_war_economy:0 "War Economy of the United States"
 USA_war_economy_desc:0 "The shock of Pearl Harbour has galvanised the nation. Federal authority now directs the full weight of American industry toward the war effort. military production has surged, conversion of civilian capacity is accelerating, and factories are running at a pace the world has never seen. The price is real: consumer demands must be met even as the war machine expands."

 USA_offer_subsidies_big_business_tt:0 "Upgrades the §YWar Economy of the United States§! spirit with §G+10%§! Production Efficiency Cap and §G+5%§! Production Efficiency Gain. If the §YWar Economy§! is not yet active, these bonuses will apply automatically once §YDecember 7th§! is completed."

 # War Economy of the United States. enhanced (Big Business Subsidies active)
 USA_war_economy_subsidies:0 "War Economy of the United States"
 USA_war_economy_subsidies_desc:0 "With America's major corporations fully contracted into the federal war effort, the War Economy has reached its highest expression. Guaranteed procurement deals have driven factories to peak efficiency faster than ever, and the ceiling on maximum output has been raised further still. the full weight of American industry is now bearing down on the enemy."

 # December 7. War Economy variant tooltips
 USA_dec7_war_economy_fdr_tt:0 "Activates the §YWar Economy of the United States§!. Roosevelt's federal mobilisation drives §G+35%§! Factory Output, §G+70%§! Military Factory Construction Speed, and §G+35%§! Dockyard Construction Speed."
 USA_dec7_war_economy_landon_tt:0 "Activates the §YWar Economy of the United States§!. Willkie's private enterprise model drives §G+45%§! Factory Output, §G+50%§! Military Factory Construction Speed, §G+40%§! Dockyard Construction Speed, and §G-15%§! Military Factory Construction Cost."
 USA_dec7_war_economy_subsidies_landon_tt:0 "Activates the §YWar Economy of the United States§!. Willkie's administration, backed by Big Business Subsidies, drives §G+45%§! Factory Output, §G+50%§! Military Factory Construction Speed, §G+40%§! Dockyard Construction Speed, §G-15%§! Military Factory Construction Cost, §G+10%§! Production Efficiency Cap, and §G+5%§! Production Efficiency Gain."

 # War Economy. Roosevelt path
 USA_war_economy_fdr:0 "War Economy of the United States"
 USA_war_economy_fdr_desc:0 "The shock of Pearl Harbour has galvanised the nation. Under Roosevelt's leadership, federal authority now directs the full weight of American industry toward the war effort. military production has surged, naval construction is running at record pace, and factories are accelerating beyond all peacetime expectations. The price is real, but the nation has committed to seeing it through."

 # War Economy. Landon/Willkie path (no subsidies)
 USA_war_economy_landon:0 "War Economy of the United States"
 USA_war_economy_landon_desc:0 "The Willkie administration's close relationship with American industry has shaped a war economy built on private enterprise rather than federal direction. Military factory construction costs have been driven down through corporate procurement deals, arms production is running at full speed, and the nation's shipyards are outpacing all prior records. The market, properly unleashed, has answered the call of war."

 # War Economy. Landon/Willkie path (Big Business Subsidies active)
 USA_war_economy_subsidies_landon:0 "War Economy of the United States"
 USA_war_economy_subsidies_landon_desc:0 "With America's major corporations fully contracted into the federal war effort under Willkie's direction, the War Economy has reached its fullest expression. Guaranteed procurement deals have driven factories to peak efficiency faster than ever, military factory costs have been slashed through corporate agreements, and the nation's shipyards are running at an unprecedented pace. American industrial might is bearing down on the enemy."

 # Court Packing spirit

 USA_subdued_the_supreme_court:0 "The Supreme Court Tamed"
 USA_subdued_the_supreme_court_desc:0 "An unprecedented expansion of the Supreme Court has broken the conservative bloc's stranglehold on executive legislation. With a sympathetic majority now holding the bench, the federal judiciary operates in alignment with the administration's agenda. and Washington has demonstrated that no institution, however venerable, is beyond the reach of determined political will."

 # Manhattan Project spirits
 USA_manhattan_project_spirit:0 "Manhattan Project"
 USA_manhattan_project_spirit_desc:0 "A classified federal programme is assembling the nation's foremost physicists at Los Alamos, New Mexico, tasked with developing an atomic weapon before any foreign power can do so. Federal investment is accelerating nuclear research and reactor construction across the country."

 USA_heavy_investment_manhattan_project:0 "Manhattan Project. Heavy Investment"
 USA_heavy_investment_manhattan_project_desc:0 "Intelligence reports have hardened Washington's resolve. Federal appropriations for the Manhattan Project have been dramatically increased. additional scientists recruited, facilities expanded, and reactor construction driven at a pace that strains the broader economy. The industrial cost is real, but America cannot afford to fall behind in the atomic race."

 # New Deal Fiscal Spirits
 USA_deficit_spending:0 "Deficit Spending"
 USA_deficit_spending_desc:0 "With the New Deal's civilian commitments maintained beyond what federal revenue can comfortably sustain, the administration has turned to deficit financing. The short-term injection of federal spending is accelerating construction across the country, but the structural costs of this approach cannot be ignored indefinitely."

 USA_reprioritise_new_deal:0 "Reprioritised New Deal"
 USA_reprioritise_new_deal_desc:0 "With civilian New Deal commitments scaled back, federal investment has been redirected toward the nation's military-industrial base. Arms factories and naval dockyards are benefiting from the reallocation, quietly preparing America for the industrialised conflict that the administration sees on the horizon."

 # New Deal fiscal event tooltips
 usa_303_third_new_deal_removed_tt:0 "§RThe Third New Deal§! spirit is fully dismantled. All associated bonuses are removed immediately."
 usa_304_third_new_deal_removed_tt:0 "§RThe Third New Deal§! spirit has been dismantled. Federal spending is now redirected toward the military-industrial base."

 # North American Aviation Military Contracts
 USA_north_american_aviation_military_contracts_tt:0 "§YNorth American Aviation Contracts§!\nActivates a recurring §Ymission§! that constructs §G6 Military Factories§! across §Y3 random states§! every §Y180 days§!. The contract cycle continues until the §RUnited States enters the war§! or §RJanuary 29th, 1941§!, whichever comes first.\n\n§WThis focus becomes available on §YJune 1st, 1938§! and must be §Ystarted by July 8th, 1938§! to guarantee the full effect. a §Y38-day window§!.§! Starting within this window allows the cycle to fire §G5 times§! before the deadline, yielding a maximum of §G30 Military Factories§!. Starting after July 8th drops the cycle to §R4 fires§! and §R24 factories§!."

 USA_military_contracts_cat:0 "Military Contracts"
 USA_military_contracts_cat_desc:0 "Covert rearmament through private military contracts. North American Aviation's arrangement with the government channels federal funds into arms factory construction across the country, building the military-industrial base under the cover of commercial enterprise."

 USA_north_american_aviation_contracts_mission:0 "North American Aviation Contracts"
 USA_north_american_aviation_contracts_mission_desc:0 "North American Aviation's recurring military contracts are delivering a steady stream of arms factory construction across the nation. Framed as legitimate commercial enterprise, each contract cycle quietly expands America's military-industrial base. the only form of rearmament that Washington can afford to admit. This arrangement will continue until the country is drawn into the war or the contract window closes in early 1941."
 USA_north_american_aviation_contracts_mission_timeout:0 "The latest contract cycle has concluded. §G6 Military Factories§! have been established across §Y3 states§!."

 # 1936 Election focus tooltips
 USA_1936_election_chain_tt:0 "§YElection Event Chain§!\nCompleting this focus triggers a series of §Ynine campaign events§! spanning the full year of 1936. the Literary Digest Poll, the Liberty League Dinner, the Supreme Court's AAA ruling, the National Conventions, the Townsend Plan debate, Father Coughlin's Union Party, Landon's Chautauqua address, the September campaign swing, and Roosevelt's Madison Square Garden rally. Each event awards one point to either §HRoosevelt§! or §RLandon§! based on your choice. If §RLandon§! accumulates §R5 or more points§!, he wins the election and §RLandon's Uproar§! is automatically completed. Otherwise, §HRoosevelt§! wins and §YOn The Shoulder of Giants§! is completed instead."

 USA_on_the_shoulder_of_giants_reward_tt:0 "§HRoosevelt Favours§!:\n§G+ Stability and Political Power Gain§!. Roosevelt has quicker and greater access to long term stability, war support and PP gain allowing variation in PP picks, a stronger cushion for early setbacks in the Asia campaign.\n§G+ Stronger Pre-War§!. Roosevelt has greater early spawn in economy and quicker ability to build Military Factories alongside earlier economic bonuses, giving you greater ability to contain Japan and conduct a large campaign in 1941.\n§G+ Ability to Lend-Lease§!. Due to Roosevelt's desire against isolationism you will be able to lend-lease to the Allies before WW2 breaks out, helping boost our allies abroad."

 USA_landonsuproar_reward_tt:0 "§RLandon Favours§!:\n§Y+ Post-War Scaling§!. Landon's path compounds over time, his industrial and military output will begin to outpace Roosevelt by mid-1942 and continue to widen the gap the longer the war goes on, making him the stronger choice for a prolonged conflict.\n§Y+ Total Industrial Capacity§!. Landon's laissez-faire economic policy unlocks a higher overall factory ceiling than Roosevelt, giving you greater raw production once the economy is fully mobilised for war.\n§Y+ Sustain Combat§!. Greater long-term output means Landon can fight harder, replace losses faster and support more fronts simultaneously, making him the more durable option in a drawn-out global war.\n§Y+ Stronger Economic Concerns§!. Landon's private-sector driven growth unlocks more aggressive industrial expansion and stronger economic bonuses post-war, though this comes at the cost of §Rgreater early volatility§! and a weaker pre-war political foundation compared to Roosevelt."

 # Manhattan Project focus tooltip
 USA_manhattan_los_alamos_tt:0 "If there are no other §YExperimental Facilities§! in §YNew Mexico§!, we will establish §G1 Nuclear Research Facility§! at §YLos Alamos§!."

 # Rubber Reserve Company focus completion tooltip
 USA_rubber_reserve_prepared_tt:0 "The Rubber Reserve Company is established and funded. Level 3 synthetic rubber refineries will be constructed in §YKentucky§!, §YLouisiana§!, and §YTexas§! the moment America enters a war, providing §Y600§! units of rubber alongside their ongoing production. Completing this focus early grants additional rubber:\n §Y+300§! rubber. completed in 1938 (3 years before 1941)\n §Y+200§! rubber. completed in 1939 (2 years before 1941)\n §Y+100§! rubber. completed in 1940 (1 year before 1941)\n\nThe refineries and stockpiles are §Rtemporary§!. they will be dismantled 3 months after the USA enters the war."

 # Manhattan Project intelligence event (usa.300)
 usa.300.t:0 "The Atomic Race"
 usa.300.d:0 "Intelligence has reached Washington that §RGermany§! has made significant strides in nuclear research. the Uranverein programme is no longer a theoretical curiosity. Our physicists at Los Alamos warn that if we do not accelerate our own programme, the Reich may achieve a working weapon first. The question before the administration is whether to redouble our commitment to the Manhattan Project regardless of the industrial cost."

 USA_arcadia_conference_auto_tt:0 "The §YArcadia Conference§! convenes automatically. §Wone month after the United States enters the war§!, Churchill will arrive in Washington and the two nations will establish their combined war strategy. This focus §Rcannot be selected manually§!."

 usa.504.t:0 "The Arcadia Conference"
 usa.504.d:0 "Three weeks after Pearl Harbor, Winston Churchill has arrived in Washington, D.C. For three weeks the Prime Minister and President Roosevelt will meet in secret. codenamed ARCADIA. to forge the Allied war plan.\n\nThe conference settles the fundamental question: §YGermany First§!. Despite Japan's attack on America, the defeat of Hitler's Reich takes priority. A §YCombined Chiefs of Staff§! is established to coordinate British and American military planning, and the Allies formally commit to make §Rno separate peace§! with the enemy.\n\nThe Alliance that will defeat the Axis is now bound together."
 usa.504.a:0 "The foundations of victory are laid."

 USA_operation_downfall_spirit:0 "Operation Downfall"
 USA_operation_downfall_spirit_desc:0 "The final assault on the Japanese home islands is underway. Every soldier knows the cost of what lies ahead. and every soldier fights with the certainty that this is the blow that ends the war. American divisions advance with a ferocity born of years of island-hopping, fuelled by the knowledge that Japan, Manchukuo and Siam stand at the edge of defeat."
 USA_Break_the_Initative_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YPapua, Kaiser-Wilhelmsland, West Papua, the Bismarck Archipelago and the Solomon Islands§!."
 USA_Control_the_Philippines_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YManila, Luzon, Palawan, Mindanao, Cebu and North Mindanao§!."
 USA_control_philippines_macarthur_tt:0 "If §YThe Philippines§! are controlled: §YDouglas MacArthur§! gains §Y+2 Skill Level§!, §Y+2 Attack§!, §Y+2 Defense§!, §Y+2 Planning§! and §Y+2 Logistics§!."
 USA_Operation_Iceberg_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YGuam, Saipan, the Caroline Islands, Minamitorishima, Wake Island and Palau§!."
 USA_Operation_Causeway_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YTaiwan and Okinawa§!."
 USA_Operation_Torch_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YCasablanca, Marrakech and Algiers§!."
 USA_operation_torch_generals_tt:0 "§YGeorge S. Patton§! gains §Y+1 Skill Level§! and §Y+1 Attack§!.\n§YOmar Bradley§! is unlocked as a §GCorps Commander§! with the §Gbrilliant strategist§!, §Ginfantry leader§! and §Gengineer§! traits."
 USA_Kaiserrine_Pass_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YTunisia and Gabès§!."
 USA_Operation_Husky_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YSicily§!."
 USA_Operation_Avalanche_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YPiemonte and Toscana§!."
 USA_Operation_Manna_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YAttica, Peloponnese, Crete, Dodecanese and the Aegean Islands§!."
 USA_Operation_Dragoon_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YBouches-du-Rhône, Var, Savoy and Roussillon§!."
 USA_Operatation_Overlord_tt:0 "Unlocks §ROn Map Decisions§! to decrease entrenchment and defense on §YNormandy, Pas-de-Calais, Picardy, Brittany and Brest§!."
 Allied_bombardment:0 "Add §YMassive Allied Bombardment§! (§Y30§! days) which grants:\n Max Entrenchment: §R-50%§!\n Fort Damage from Combat: §G+40%§!"

 USA_manifest_destiny_spirit:0 "Manifest Destiny"
 USA_manifest_destiny_spirit_desc:0 "The United States stands apart from the old world. boundless in resources, unmatched in industrial output, and driven by an unshakeable belief in the righteousness of its cause. American soldiers fight not merely for territory but for an idea, and that conviction is worth five divisions."

 USA_v_for_victory_spirit:0 "V for Victory"
 USA_v_for_victory_spirit_desc:0 "Churchill's two fingers, the BBC's morse-code V, Beethoven's Fifth. the V for Victory symbol has become the rallying cry of every Allied nation. From London to Moscow, soldiers and citizens alike know that the full weight of American industry now stands behind the common cause."

 USA_war_powers_act_spirit:0 "War Powers Act"
 USA_war_powers_act_spirit_desc:0 "Congress has granted the president sweeping executive authority to reorganise federal agencies, direct industrial production, and expand military conscription without legislative approval for the duration of the war. The acceleration of American power comes at a cost to civil liberties."

 USA_owm_spirit:0 "Office of War Mobilisation"
 USA_owm_spirit_desc:0 "Under James Byrnes, the Office of War Mobilisation sits above every other wartime agency, the WPB included, as the supreme coordinator of the American war economy. With all industrial output channelled through a single directing body, the nation's factories operate as one unified machine."

 USA_owi_spirit:0 "Office of War Information"
 USA_owi_spirit_desc:0 "The Office of War Information coordinates all domestic propaganda. from Rosie the Riveter posters to newsreels, radio broadcasts, and pamphlets. The result is a sustained surge in public morale and national commitment to the war effort."

 USA_epca_spirit:0 "Emergency Price Control Act"
 USA_epca_spirit_desc:0 "The Office of Price Administration freezes rents, caps consumer prices, and administers a national rationing system. By keeping wartime inflation to roughly 3% annually, stable prices allow industry to plan production efficiently and free factory capacity from consumer demand."

 USA_series_e_war_bonds:0 "Series E War Bonds"
 USA_series_e_war_bonds_desc:0 "Sold to ordinary Americans at 75 cents on the dollar, the Treasury's Series E bonds channelled billions in civilian savings directly into the war chest. reducing the cash circulating in the economy, dampening inflation, and freeing factory output from consumer demand."

