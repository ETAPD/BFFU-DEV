 BUL_legacy_of_neuilly: "Legacy of Neuilly"
 BUL_legacy_of_neuilly_desc: "Defeat in the Great War and the punitive Treaty of Neuilly stripped Bulgaria of territory, burdened it with crippling reparations, and left a nation hungry to right a historic injustice."
 BUL_personal_rule: "Personal Rule of Tsar Boris III"
 BUL_personal_rule_desc: "After the Zveno coup of 1934 and his own counter-coup in 1935, Tsar Boris III rules without parties or parliament. His firm hand brings order, but smothers political life."
 BUL_macedonian_question: "The Macedonian Question"
 BUL_macedonian_question_desc: "The fate of Macedonia poisons relations with Yugoslavia and Greece, while the armed bands of the IMRO operate as a state within a state, undermining order at home."
 BUL_backward_economy: "A Backward Economy"
 BUL_backward_economy_desc: "Bulgaria remains a poor, overwhelmingly peasant nation with little heavy industry - rich only in cheap consumer goods and self-sufficient farms."
