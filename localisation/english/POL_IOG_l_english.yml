 # Kategoria decyzji
 POL_war_missions:0 "The Invasion of Poland"
 POL_war_missions_desc:0 "The Wehrmacht has initiated a full-scale invasion. Our forces are mobilizing, but we are outmatched in both armor and air power. The strategy is to delay the enemy and await intervention from our allies, but time is not on our side."

 # Nazwa Misji (Pętli)
 POL_morale_loop_mission:0 "Desperate Defense"
 POL_morale_loop_mission_desc:0 "Our situation is deteriorating. Every 7 days, the disorganization of our army increases as the enemy pushes forward.\n\n§YCurrent Penalty:§! §R[?POL_morale_var|%0]§!\n§YNext Increase in:§! §G[?POL_morale_loop_mission.days_mission_timeout] days§!"
 
 # Historical Radio Broadcasts
 POL_1st_september_radio_announcement:0 "September 1st Radio Announcement"
 POL_1st_september_radio_announcement_desc:0 "At dawn on September 1st, 1939, German forces crossed our borders without declaration of war. The Polish Radio will broadcast an emergency announcement to inform the nation that we are at war. This is not a drill - Poland is under attack, and every Pole must stand ready to defend the homeland."
 
 POL_fall_of_warsaw:0 "The Fall of Warsaw"
 POL_fall_of_warsaw_desc:0 "Warsaw, the heart of Poland, has fallen to the enemy. Polish Radio will broadcast its final message from the capital before the transmitters fall silent. Though Warsaw is lost, the Polish spirit remains unbroken, and our government will continue the fight from abroad."
 
