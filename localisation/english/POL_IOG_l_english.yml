 # --- Propaganda Campaign Decisions ---
 POL_IOG_propaganda_campaigns:0 "Propaganda Campaigns"
 POL_IOG_propaganda_campaigns_desc:0 ""
 
 POL_IOG_one_bullet_one_german:0 "One Bullet, One German"
 POL_IOG_one_bullet_one_german_desc:0 "Launch a propaganda campaign emphasizing the effectiveness of Polish marksmanship against the German invaders. Every bullet must count, every shot must find its mark. This campaign will boost our soldiers' combat effectiveness against German forces through psychological warfare and improved tactical awareness.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_baltic_is_ours:0 "The Baltic is Ours"
 POL_IOG_baltic_is_ours_desc:0 "Promote Poland's historical connection to the Baltic Sea and our naval ambitions. This campaign will emphasize amphibious warfare training, coastal defense, and naval operations, improving our ability to conduct and defend against seaborne invasions.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_strong_united_ready:0 "Strong, United, Ready"
 POL_IOG_strong_united_ready_desc:0 "A comprehensive propaganda campaign highlighting Poland's air power and the bravery of our pilots. By glorifying aerial combat and our air force achievements, we will inspire a new generation of aces and improve overall air combat performance.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_strong_united_ready_idea:0 "Strong, United and Ready"
 POL_IOG_strong_united_ready_idea_desc:0 "Our propaganda campaign celebrating Polish air power has taken root in the national consciousness, inspiring our pilots and ground crews to extraordinary feats of courage and skill."
 
 POL_IOG_our_own_dockyards:0 "Our Own Dockyards"
 POL_IOG_our_own_dockyards_desc:0 "Celebrate Polish shipbuilding prowess and the expansion of our naval infrastructure. This campaign will motivate dockyard workers and naval engineers, increasing both the efficiency of ship construction and the capacity of our maritime industry.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_the_western_border:0 "Defend the Western Border"
 POL_IOG_the_western_border_desc:0 "Rally the nation to defend our territorial integrity and core lands. This campaign emphasizes the sacred duty of protecting Polish soil from all threats, particularly from our southern neighbors. Our soldiers will fight with renewed determination on home ground.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_polish_colonies:0 "Polish Colonial Pride"
 POL_IOG_polish_colonies_desc:0 "Promote the vision of Poland as a colonial power and emphasize the benefits of our overseas territories. This campaign will improve governance in occupied territories, reduce resistance, and strengthen our legitimacy as a global power.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_pull_even_if_your_back_is_cracking:0 "Pull, Even If Your Back is Cracking"
 POL_IOG_pull_even_if_your_back_is_cracking_desc:0 "A campaign emphasizing the importance of industrial production and worker dedication to the war effort. Using powerful imagery and patriotic slogans, we will push our factories to maximum efficiency while maintaining worker morale through appeals to national duty.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_polish_armed_forces_in_the_west:0 "Polish Armed Forces in the West"
 POL_IOG_polish_armed_forces_in_the_west_desc:0 "Even in exile, Poland fights on! This campaign will reach Polish communities abroad and encourage volunteers to join our forces-in-exile. By highlighting the continued resistance and the sacrifice of Poles fighting on foreign soil, we will maintain steady recruitment.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_to_victory:0 "To Victory!"
 POL_IOG_to_victory_desc:0 "A rousing campaign focused on total mobilization of national resources for the war effort. Every mine, every factory, every resource must contribute to victory. This propaganda will increase resource extraction and reduce exports, keeping vital materials for our own military production.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_we_are_not_alone:0 "We Are Not Alone"
 POL_IOG_we_are_not_alone_desc:0 "Emphasize Poland's alliances and the international support for our cause. This campaign will boost national morale by reminding citizens that powerful allies stand with us in our struggle, strengthening both stability and war support through messages of solidarity.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_we_will_build_mighty_poland:0 "We Will Build Mighty Poland"
 POL_IOG_we_will_build_mighty_poland_desc:0 "Focus propaganda efforts on reconstruction and infrastructure development. This forward-looking campaign will inspire construction workers and engineers, accelerating the building of railways, roads, supply nodes, and the repair of war damage across Polish territories.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_IOG_antiair_investments_loan:0 "Shield From the Sky"
 POL_IOG_antiair_investments_loan_desc:0 "Promote investment in anti-aircraft defenses and radar technology. Through propaganda highlighting the threat of enemy bombers and the effectiveness of our AA defenses, we will accelerate the construction of air defense infrastructure and improve the performance of our anti-aircraft batteries.\n\n§YDuration:§! 180 days\n§YCooldown:§! 360 days"
 
 POL_unlock_new_propaganda_tt:0 "\n§0Completing this national focus will unlock a new propaganda campaign§!"
