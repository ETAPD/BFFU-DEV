 ###EVENTS
 POL_IOG.1.t:0 "The Problem of Forest Bandits"
 POL_IOG.1.d:0 "Reports from local administrative offices indicate an increase in the activity of armed groups hidden in the forests. These 'forest bandits' are disrupting local logistics and spreading unrest among the population. We must take measures to ensure order in our provinces. Poland is unable to build in its core states to prevent excessive factory construction in states controlled by Germany or the Soviets."
 POL_IOG.1.a:0 "We must deal with this."
 POL_lesni_bandyci:0 "Leśne Bandy"
 POL_lesni_bandyci_light:0 "Leśne Bandy"
 GMFU_POLAND_ELECTION.1.t:0 "Election of a King"
 GMFU_POLAND_ELECTION.1.desc:0 "Following the restoration of the monarchy, the Sejmik has convened to decide who shall wear the Polish crown. Our choice will not only determine our diplomatic standing but also the future doctrine of our military, as each claimant brings their own expertise and military preferences to the throne."
 
 GMFU_POLAND_ELECTION.1.a:0 "Elect Karl Albrecht - Special Forces Path"
 GMFU_POLAND_ELECTION.1.b:0 "Elect Friedrich Christian - Infantry Path"
 GMFU_POLAND_ELECTION.1.c:0 "Elect Pavel Bermondt-Avalov - Cavalry, Motorized & Katyusha Path"
 
 GMFU_POLAND_ELECTION_NEWS.1.t:0 "[POL.GetNameDefCap] Crowns a King!"
 GMFU_POLAND_ELECTION_NEWS.1.desc.saxon:0 "On the fifth of November 1916, Wilhelm II of Germany and Franz Joseph of Austria signed a joint-declaration that out of the Polish occupied territories in Russia, a new Kingdom would be born; the Kingdom of Poland. However, the young state failed to find a King in its time and the then-President declared the Second Polish Republic.\n\nHowever, it seems Poland has at last found herself a King in [POL.GetLeader]! The Margrave of Meissen is now King Friedrich I of Poland. Despite fears of impending war with the Germans, the Polish regency council offered the Margrave the throne due to the longstanding historical link between Poland and the nobility of Saxony."
 GMFU_POLAND_ELECTION_NEWS.1.desc.romania:0 "On the fifth of November 1916, Wilhelm II of Germany and Franz Joseph of Austria signed a joint-declaration that out of the Polish occupied territories in Russia, a new Kingdom would be born; the Kingdom of Poland. However, the young state failed to find a King in its time and the then-President declared the Second Polish Republic.\n\nHowever, it seems Poland has at last found herself a King in [POL.GetLeader]! With a longstanding friendship and alliance existing between Poland and Romania, it seems that the Polish regency council has ambitions of much closer relations with [ROM.GetNameDef]. As heir to the Romanian throne, it is only a matter of time before the two nations are irreversibly intertwined."
 GMFU_POLAND_ELECTION_NEWS.1.desc.cossack:0 "On the fifth of November 1916, Wilhelm II of Germany and Franz Joseph of Austria signed a joint-declaration that out of the Polish occupied territories in Russia, a new Kingdom would be born; the Kingdom of Poland. However, the young state failed to find a King in its time and the then-President declared the Second Polish Republic.\n\nHowever, it seems Poland has at last found herself a King in [POL.GetLeader]! A cossack, a noble, and a warlord, [POL.GetLeader] is an unlikely claimant to the Polish throne, but no doubt his undying ambition for a personal fiefdom in the Baltic is of great appeal to Polish ministers who still hold the ambitions of a restored Commonwealth in their hearts."
 GMFU_POLAND_ELECTION_NEWS.1.desc.romanov:0 "On the fifth of November 1916, Wilhelm II of Germany and Franz Joseph of Austria signed a joint-declaration that out of the Polish occupied territories in Russia, a new Kingdom would be born; the Kingdom of Poland. However, the young state failed to find a King in its time and the then-President declared the Second Polish Republic.\n\nHowever, it seems Poland has at last found herself a King in [POL.GetLeader]! Just like Jadwiga before her, the Queen Regnant has chosen to adopt ‘King’ as her title. Though many doubt that she is the true daughter of Tsar Nicholas II, she has nonetheless been coronated in Warsaw as King Anastasia Romanov of Poland."
 GMFU_POLAND_ELECTION_NEWS.1.desc.habsburg:0 "On the fifth of November 1916, Wilhelm II of Germany and Franz Joseph of Austria signed a joint-declaration that out of the Polish occupied territories in Russia, a new Kingdom would be born; the Kingdom of Poland. However, the young state failed to find a King in its time and the then-President declared the Second Polish Republic.\n\nHowever, it seems Poland has at last found herself a King in [POL.GetLeader]! Born into Habsburg nobility, Karl Albrecht has been fighting for the Polish military for almost as long as the Polish state has existed, and today to the roar of cheering crowds, he has been elected the first Habsburg King of Poland."
 GMFU_POLAND_ELECTION_NEWS.1.a:0 "Long live the King!"
 GMFU_POLAND_ELECTION_NEWS.1.b:0 "A kingdom has come."
 GMFU_POLAND_ELECTION_NEWS.1.c:0 "What madness is this?"
 
 # World News Events - Polish Government-in-Exile
 IOG_POLAND_WORLD_NEWS.1.t:0 "General Sikorski Dies in Plane Crash"
 IOG_POLAND_WORLD_NEWS.1.desc:0 "Tragedy has struck the Polish government-in-exile. General Władysław Sikorski, Prime Minister and Commander-in-Chief, has died in a plane crash near Gibraltar.\n\nSikorski's death creates a dangerous power vacuum at a critical moment. Western observers fear this may weaken Poland's position in post-war negotiations.\n\nMeanwhile, Stalin's Ludowe Wojsko Polskie stands to gain. With Sikorski gone, Soviet-backed forces may claim greater legitimacy, undermining the government-in-exile's authority."
 IOG_POLAND_WORLD_NEWS.1.a:0 "A terrible loss for Poland and the Allied cause."
 IOG_POLAND_WORLD_NEWS.1.b:0 "A terrible loss for Poland and the Allied cause." 
 
 IOG_POLAND_WORLD_NEWS.2.t:0 "Sikorski and Churchill Discuss Polish Future"
 IOG_POLAND_WORLD_NEWS.2.desc:0 "Polish Prime Minister General Sikorski has held talks with Winston Churchill in London, focusing on Poland's military contribution and post-war arrangements.\n\nSikorski pledged Polish forces will continue fighting in North Africa and wherever needed. In return, Churchill made carefully worded promises regarding Poland's territorial integrity.\n\nWhile stopping short of specific guarantees - particularly on eastern borders - the British PM emphasized Britain's commitment to Polish independence. Observers note the absence of concrete commitments regarding Soviet territorial demands."
 IOG_POLAND_WORLD_NEWS.2.a:0 "Poland fights on, for freedom and independence!"
 
 
 # --- Military Development Focuses ---
 POL_form_special_forces:0 "Form Special Forces"
 POL_form_special_forces_desc:0 "Drawing upon our experience with elite units and partisan warfare, we must formalize the creation of dedicated special forces battalions. These highly trained units will conduct reconnaissance, sabotage, and unconventional operations behind enemy lines, proving invaluable in the modern battlefield."
 
 POL_invest_in_domestic_production:0 "Invest in Domestic Production"
 POL_invest_in_domestic_production_desc:0 "Our industrial capacity must be expanded to meet the demands of modern warfare. By directing investment into domestic manufacturing facilities, we can reduce our dependence on foreign imports and ensure a steady supply of military equipment for our armed forces."
 
 POL_loyal_legions:0 "Loyal Legions"
 POL_loyal_legions_desc:0 "The tradition of the Polish Legions runs deep in our military culture. By reorganizing our forces around this historic model and emphasizing loyalty to the Polish cause above all else, we can create highly motivated units that will fight to the last man for Poland's freedom."
 
 POL_promote_competence:0 "Promote Competence"
 POL_promote_competence_desc:0 "Too often, military promotions have been based on political connections rather than battlefield merit. We must reform our officer corps by promoting based on competence and proven leadership, ensuring that our forces are led by the most capable commanders available."
 
 POL_operacja_szpej:0 "Operation Szpej"
 POL_operacja_szpej_desc:0 "Named after the master spy Colonel Szpej, this operation will establish a comprehensive intelligence network throughout occupied territories. Through careful recruitment of agents and coordination with resistance cells, we will gather vital intelligence on enemy movements and capabilities."
 
 POL_plan_w_infantry_modernization_plan:0 "Plan W: Infantry Modernization"
 POL_plan_w_infantry_modernization_plan_desc:0 "Plan W (Plan Wolność - Freedom Plan) represents a comprehensive modernization program for our infantry forces. This includes new weapons, improved training methods, and updated tactical doctrines to transform our foot soldiers into a more lethal and efficient fighting force capable of standing toe-to-toe with any European army."
 
 POL_plan_w_infantry_modernization:0 "Infantry Modernization Program"
 POL_plan_w_infantry_modernization_desc:0 "Our infantry forces require comprehensive modernization to meet the challenges of modern warfare. New weapons, improved training protocols, and updated tactical doctrines will transform our foot soldiers into an elite fighting force capable of standing against any adversary."
 
 POL_urban_training:0 "Urban Warfare Training"
 POL_urban_training_desc:0 "Modern warfare increasingly takes place in cities and towns. We must develop specialized training programs to prepare our soldiers for the brutal, close-quarters combat of urban environments. From Warsaw to Kraków, our forces must be ready to defend every street and building."
 
 POL_invest_in_new_ammunitions:0 "Invest in New Ammunition"
 POL_invest_in_new_ammunitions_desc:0 "The effectiveness of our weapons depends not just on the guns themselves, but on the quality and types of ammunition we employ. By investing in new ammunition production facilities and developing improved cartridges, armor-piercing rounds, and explosive shells, we can significantly enhance our forces' combat effectiveness."
 
 POL_arm_paramilitary_wings:0 "Arm Paramilitary Wings"
 POL_arm_paramilitary_wings_desc:0 "Beyond our regular military forces, numerous paramilitary organizations stand ready to defend Poland. By providing these patriotic volunteers with proper weapons and training, we can create a formidable auxiliary force capable of supporting our regular army and conducting guerrilla operations if necessary."
 
 POL_domestic_support_equipment_production:0 "Domestic Support Equipment Production"
 POL_domestic_support_equipment_production_desc:0 "Modern armies require more than just rifles and tanks - they need radios, medical supplies, engineering equipment, and countless other support items. By establishing domestic production lines for this crucial support equipment, we ensure our forces can operate independently without relying on foreign suppliers."
 
 POL_reserve_divisions:0 "Form Reserve Divisions"
 POL_reserve_divisions_desc:0 "In times of crisis, our professional army alone will not be sufficient. We must establish well-organized reserve divisions that can be rapidly mobilized when needed. These formations, composed of trained veterans and volunteers, will provide strategic depth to our military capabilities."
 
 POL_anti_air_development:0 "Anti-Aircraft Development"
 POL_anti_air_development_desc:0 "The skies above Poland must be denied to our enemies. By investing in anti-aircraft artillery development and production, we can create an umbrella of steel that will protect our cities, factories, and military installations from aerial bombardment. No enemy bomber will fly over Poland with impunity."
 
 POL_mobile_army:0 "Mobile Army Doctrine"
 POL_mobile_army_desc:0 "The static warfare of the past is obsolete. Modern conflict demands mobility, speed, and flexibility. We must reorganize our forces around the concept of rapid movement, ensuring our army can concentrate force where needed and exploit enemy weaknesses before they can react."
 
 POL_mechanisation_program:0 "National Mechanization Program"
 POL_mechanisation_program_desc:0 "The horse has served Poland well for centuries, but the age of mechanized warfare has arrived. By implementing a comprehensive mechanization program, we will replace our cavalry units with armored cars and motorized infantry, creating a modern force capable of matching any mechanized army in Europe."
 
 POL_maczeks_innovations:0 "Maczek's Innovations"
 POL_maczeks_innovations_desc:0 "General Stanisław Maczek has proven himself a brilliant innovator in armored warfare. His tactical concepts and organizational ideas represent the cutting edge of tank doctrine. By adopting Maczek's innovations throughout our armored forces, we can maximize the effectiveness of our mechanized units."
 
 POL_tank_divisions:0 "Form Tank Divisions"
 POL_tank_divisions_desc:0 "Scattered tank companies and battalions cannot achieve decisive results. We must concentrate our armor into full tank divisions capable of breakthrough operations and deep penetrations into enemy territory. These steel fists will be the spearhead of Poland's offensive capability."
 
 POL_IOG_tank_inefficiencies:0 "Tank Force Inefficiencies"
 POL_IOG_tank_inefficiencies_desc:0 "Our armored forces suffer from organizational problems, inadequate maintenance infrastructure, and lack of coordination between tank units and supporting arms. These inefficiencies significantly reduce the combat effectiveness of our armor, leaving our tanks vulnerable and underutilized on the battlefield."
 
 POL_modernising_the_mechanized_forces:0 "Modernize Mechanized Forces"
 POL_modernising_the_mechanized_forces_desc:0 "Our initial mechanization efforts provided a foundation, but we must continue upgrading our mechanized forces with better vehicles, improved tactics, and enhanced support capabilities. Only through constant modernization can we stay ahead of our adversaries."
 
 POL_develop_synthetic_production:0 "Synthetic Resource Development"
 POL_develop_synthetic_production_desc:0 "Modern warfare demands resources Poland does not naturally possess in sufficient quantities. Through synthetic production technologies, we can manufacture rubber, petroleum products, and other strategic materials from coal and agricultural products, achieving resource independence regardless of blockades or territorial losses."
 
 POL_warszawo_walcz:0 "Warszawo Walcz!"
 POL_warszawo_walcz_desc:0 "The capital must never fall without a fight. We will transform Warsaw into a fortress city, preparing defensive positions, stockpiling weapons and supplies, and training the civilian population in urban resistance. When the enemy comes to our gates, they will face a city prepared to fight to the last stone of every building."
 
 POL_equalize_poland_ab:0 "Equalize Poland A and B"
 POL_equalize_poland_ab_desc:0 ""
 
 POL_folk_high_school:0 "Folk High Schools"
 POL_folk_high_school_desc:0 "Education is the foundation of a strong nation. By establishing folk high schools throughout Poland, we provide practical education to rural communities, raising literacy rates and technical skills. An educated populace is essential for operating modern industry and maintaining a technologically sophisticated military."
 
 POL_resource_excavation:0 "Resource Excavation Program"
 POL_resource_excavation_desc:0 "Poland's soil contains valuable resources that remain untapped. By launching a comprehensive geological survey and excavation program, we can uncover new deposits of coal, iron, and other strategic materials, reducing our dependence on imports and strengthening our industrial base."
 
 POL_electrification_efforts:0 "National Electrification"
 POL_electrification_efforts_desc:0 "Large areas of Poland still lack access to electrical power. By extending the electrical grid to underserved regions and constructing new power plants, we can modernize our economy, improve living standards, and provide the energy needed for expanded industrial production."
 
 POL_fight_from_the_rear_strategy:0 "Fight From the Rear Strategy"
 POL_fight_from_the_rear_strategy_desc:0 "If Poland is overrun, the fight will not end. We must prepare for a strategic doctrine of fighting from the rear - coordinating with partisan forces, establishing intelligence networks, and maintaining government continuity from abroad. Poland will never surrender, even if Warsaw falls."
 
 POL_higher_spending_on_army:0 "Increase Army Spending"
 POL_higher_spending_on_army_desc:0 "Our military budget must reflect the threats we face. By significantly increasing spending on the army, we can expand our forces, improve equipment, and ensure our soldiers receive the training and support they need to defend Poland against any aggressor."
 
 POL_form_kop_on_the_german_border:0 "Form KOP on the German Border"
 POL_form_kop_on_the_german_border_desc:0 "The Korpus Ochrony Pogranicza (Border Protection Corps) has proven its worth on our eastern frontier. Now we must extend this concept to our German border, creating elite border guard units that combine military capability with intelligence gathering, providing early warning and initial resistance against any invasion."
 

 POL_z_ziemii_wloskiej:0 "Z Ziemii Włoskiej"
 POL_z_ziemii_wloskiej_desc:0 "The Italian campaign has forged our soldiers in the fires of brutal mountain warfare. Polish blood has been shed on Italian soil."
 
 POL_bojowe_oddzialy_liberalizmu_polskiego:0 "Combat Units of Polish Liberalism"
 POL_bojowe_oddzialy_liberalizmu_polskiego_desc:0 "The liberal democratic forces of Poland must be organized into effective combat formations. These units, representing the ideals of freedom and democracy, will fight not just for Polish independence but for the principles of liberty that define our nation's identity."
 
 POL_emergency_mobilization:0 "Emergency Mobilization"
 POL_emergency_mobilization_desc:0 "The situation demands immediate action. We must implement emergency mobilization procedures to rapidly expand our military forces, calling up reservists, accelerating training programs, and converting civilian industry to military production. Every able-bodied Pole must be ready to defend the homeland."
 
 # --- National Spirit / Ideas ---
 POL_IOG_heavy_artillery_sf_idea:0 "Heavy Artillery Support"
 POL_IOG_heavy_artillery_sf_idea_desc:0 "Our special forces operations are backed by devastating heavy artillery support. When elite units mark targets, massive firepower can be brought to bear, giving even small special forces teams the punch of a full division."
 
 POL_IOG_sf_gear_production_production_buff_idea:0 "Specialization of Equipment Production"
 POL_IOG_sf_gear_production_production_buff_idea_desc:0 "Dedicated production lines manufacturing specialized equipment for our elite units - from advanced weapons to specialized communication gear - ensure our special forces operate with the best equipment available."
 
 POL_IOG_sf_gear_production_buff_idea:0 "Operation Szpej"
 POL_IOG_sf_gear_production_buff_idea_desc:0 "Streamlined production facilities dedicated to manufacturing cutting-edge special forces equipment provide our elite units with superior weapons, advanced reconnaissance tools, and specialized gear that gives them a decisive advantage in unconventional operations."
 
 POL_IOG_inf_arty_bonus_idea:0 "Infantry Artillery Coordination"
 POL_IOG_inf_arty_bonus_idea_desc:0 "Our infantry and artillery units have achieved exceptional coordination through integrated training and communication systems. This synergy allows for devastating concentrated fire support exactly when and where infantry commanders need it most."
 
 POL_IOG_arm_paramilitary_wings_idea:0 "Armed Paramilitary Forces"
 POL_IOG_arm_paramilitary_wings_idea_desc:0 "Numerous paramilitary organizations now possess proper military weapons and training, creating a substantial auxiliary force that supplements our regular army and provides a foundation for rapid expansion if needed."
 
 POL_IOG_arm_paramilitary_wings_improved_idea:0 "Professional Paramilitary Forces"
 POL_IOG_arm_paramilitary_wings_improved_idea_desc:0 "Our paramilitary forces have evolved beyond mere armed volunteers into professional auxiliary units with standardized equipment, regular training, and integration into our military command structure - a formidable reserve force ready for immediate deployment."
 
 POL_IOG_nation_wide_mechanization_program_idea:0 "Nationwide Mechanization"
 POL_IOG_nation_wide_mechanization_program_idea_desc:0 "Poland's mechanization program has transformed our military from a horse-drawn force into a modern mechanized army. Trucks, armored cars, and tanks have replaced cavalry across our formations, fundamentally changing our operational capabilities."
 
 POL_IOG_anti_blitz_tactics_idea:0 "Anti-Blitzkrieg Tactics"
 POL_IOG_anti_blitz_tactics_idea_desc:0 "We have developed specialized tactics to counter enemy mechanized assaults. Through careful study of modern mobile warfare, our forces know how to disrupt, delay, and destroy enemy armored spearheads, turning the tables on those who rely on speed and shock."
 
 POL_IOG_our_own_mechanized_blitzkrieg_idea:0 "Polish Blitzkrieg Doctrine"
 POL_IOG_our_own_mechanized_blitzkrieg_idea_desc:0 "Poland has mastered the art of mechanized warfare. Our own blitzkrieg doctrine combines speed, firepower, and coordination to achieve devastating breakthrough operations. We no longer fear enemy armor - we have become the hammer that strikes first."
 
 POL_IOG_radicalized_poles:0 "Radicalized Patriotic Fervor"
 POL_IOG_radicalized_poles_desc:0 "The Polish people have been galvanized by threats to our sovereignty. This radicalized patriotic fervor permeates society, making every citizen a potential partisan and every soldier willing to fight to the death. Our enemies will face a nation that cannot be broken."
 
 POL_IOG_army_investments_idea:0 "Comprehensive Army Investment"
 POL_IOG_army_investments_idea_desc:0 "Substantial investment in military infrastructure, training facilities, and equipment production has created a more professional and capable armed force. Every zloty spent on the army multiplies our defensive capabilities."
 
 POL_IOG_korpus_ochrony_granicy_niemieckiej_idea:0 "German Border Corps"
 POL_IOG_korpus_ochrony_granicy_niemieckiej_idea_desc:0 "The Border Protection Corps stationed along the German frontier represents our first line of defense. These elite units combine military strength with intelligence gathering, providing both deterrence and early warning of any German aggression."
 
 POL_IOG_potomkowie_legionow_idea:0 "Descendants of the Legions"
 POL_IOG_potomkowie_legionow_idea_desc:0 "The spirit of Piłsudski's Legions lives on in our armed forces. Our soldiers carry forward the traditions, valor, and unwavering dedication of those who fought for Polish independence, making them formidable warriors driven by historical purpose."
 
 POL_IOG_investments_in_eastern_poland_idea:0 "Eastern Poland Development"
 POL_IOG_investments_in_eastern_poland_idea_desc:0 "Significant investment in Poland's eastern regions has improved infrastructure, expanded industry, and strengthened our defensive positions. These territories are no longer a vulnerable periphery but an integrated part of our national strength."
 
 POL_IOG_construction_speed:0 "Accelerated Construction"
 POL_IOG_construction_speed_desc:0 "Through improved organization, modern equipment, and motivated labor, our construction projects proceed at an accelerated pace. Fortifications, factories, and infrastructure rise faster than ever before, rapidly strengthening Poland's strategic position."
 