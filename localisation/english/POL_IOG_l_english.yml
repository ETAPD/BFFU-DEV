 POL_spawn_steel_refinery_post_cap:0 "Establish Off-map Steel Refinery"
 POL_spawn_steel_refinery_post_cap_desc:0 "By utilizing our pre-war preparations and specialized tokens, we can secure additional steel production outside of occupied territories to fuel our war effort."

 POL_colonies_development:0 "Colonial Industrial Development"
 POL_colonies_development_desc:0 "§HColonial Resource Management§!\nHaving established our government's presence in exile or expanded our overseas reach, we can now utilize §YDevelopment Tokens§! to bolster our industry and military capabilities. These tokens represent specialized equipment and expertise saved for our national reconstruction.\n\n§WCurrent Token Reserves:§!\n  - Steel Refinery Tokens: [?POL_steel_refinery_tokens|Y0]\n  - Synthetic Refinery Tokens: [?POL_synthetic_refinery_tokens|Y0]\n  - Infrastructure and Industry Tokens: [?POL_reconstruction_tokens|Y0]\n  - Army Recruitment Tokens: [?POL_army_recruitment_tokens|Y0]\n\n\n§YPost-Cap Protocol:§! Resources are deployed exclusively to controlled territories to ensure our eventual return to the homeland."
 
 POL_warsaw_the_capital:0 "Warsaw - The Capital"
 POL_warsaw_the_capital_desc:0 "Warsaw has been the heart of Poland for centuries, serving as our political, cultural, and military center. Even in the darkest hours of foreign occupation and exile, Warsaw remains the true capital of Poland in the hearts of all Poles. We must ensure that our government's legitimacy continues to be tied to this historic city, whether we hold it or not."
 
 POL_return_to_warsaw:0 "Return to Warsaw"
 POL_return_to_warsaw_desc:0 "After years of exile and struggle, the moment has finally come - Warsaw is once again under Polish control. The government-in-exile can now return to the capital, restoring the legitimate Polish state to its rightful seat of power. The Polish Eagle will fly over Warsaw once more, and our nation can begin the long process of reconstruction and renewal."

 POL_spawn_steel_refinery:0 "Deploy Steel Production Plant"
 POL_spawn_steel_refinery_desc:0 "Utilize one Steel Refinery Token to immediately establish a high-capacity steel processing facility in one of our controlled provinces."
 
 POL_spawn_synthetic_refinery:0 "Deploy Synthetic Fuel Plant"
 POL_spawn_synthetic_refinery_desc:0 "Utilize one Synthetic Refinery Token to deploy a modern synthetic refinery, securing our fuel and rubber supply lines."
