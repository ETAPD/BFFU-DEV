 POL_dynamic_morale_penalty:0 "Morale of the Armed Forces"
 POL_dynamic_morale_penalty_desc:0 "Our forces are suffering from deteriorating morale as the frontline collapses."
 POL_african_campaign:0 "African Campaign Experience"
 POL_african_campaign_desc:0 "Our forces have gained valuable combat experience from operations in Africa, making them more effective in battle."
 POL_soviet_campaign:0 "Soviet Campaign Experience"
 POL_soviet_campaign_desc:0 "Our troops have been hardened by fighting in the vast expanses of the Soviet Union, improving their combat effectiveness."
 POL_african_campaign_debuff:0 "African Campaign Exhaustion"
 POL_african_campaign_debuff_desc:0 "Extended operations in the harsh African climate have exhausted our forces, reducing their combat effectiveness."
 POL_soviet_campaign_debuff:0 "Soviet Campaign Exhaustion"
 POL_soviet_campaign_debuff_desc:0 "The brutal conditions and relentless fighting on the Eastern Front have taken a severe toll on our troops."
 
 
 
 
