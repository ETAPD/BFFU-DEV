 # --- Inlay Window for Polish Political Paths ---
 pol_political_paths_inlay_window_title:0 "Polish Political Paths"
 
 # Path 1: Moscicki - Sanation Government
 pol_path_1_title:0 "§YSanation Government§!"
 pol_path_1_desc:0 "Ignacy Mościcki leads Poland through consolidation of the Sanacja movement, maintaining authoritarian control while modernizing infrastructure."
 pol_path_1_modifiers:0 "§GEconomic Focus:§! This path emphasizes comprehensive economic development and industrial expansion. Poland will establish strategic resource stockpiles and off-map factories to ensure continued production capacity even after capitulation. A balanced all-round approach securing Poland's economic future through diversified development."
 
 # Path 2: Wincenty Witos - Democratic Poland
 pol_path_2_title:0 "§YDemocratic Sejm§!"
 pol_path_2_desc:0 "Wincenty Witos represents the peasant movement (PSL), bringing democratic reforms and organizing rural Poland."
 pol_path_2_modifiers:0 "§GArmored Warfare:§! This path focuses on developing Poland's mechanized forces through close cooperation with the Soviet Union. Emphasis on building a powerful armored corps with access to Allied tank designs and industrial support, creating a formidable mobile force."
 
 # Path 3: Karl Albrecht - Habsburg Restoration
 pol_path_3_title:0 "§YHabsburg Restoration§!"
 pol_path_3_desc:0 "Karl Albrecht von Habsburg-Lothringen ascends to the Polish throne, restoring the ancient Diet of Galicia."
 pol_path_3_modifiers:0 "§GElite Forces:§! Under Karl Albrecht's patronage, Poland develops specialized military units and elite formations. Focus on quality over quantity with the establishment of the Royal Hussars and special forces units, embodying the martial traditions of the Habsburg monarchy."
 
 # Path 4: Friedrich Christian - Polish-Lithuanian Union
 pol_path_4_title:0 "§YThe Commonwealth§!"
 pol_path_4_desc:0 "Friedrich Christian von Sachsen claims the throne, seeking to restore the Commonwealth."
 pol_path_4_modifiers:0 "§GSuperior Firepower:§! This path emphasizes the Superior Firepower doctrine, focusing on extensive artillery development and enhanced infantry capabilities. Poland will maximize the effectiveness of its ground forces through overwhelming firepower and well-trained infantry divisions."
 
 # Path 5: Pavel Bermondt-Avalov - Cossack Kingdom
 pol_path_5_title:0 "§YCossack Kingdom§!"
 pol_path_5_desc:0 "Pavel Bermondt-Avalov establishes a militant Cossack-dominated government with aggressive expansionism."
 pol_path_5_modifiers:0 "§GMechanized Warfare:§! An aggressive approach centered on mobile warfare and mechanized operations. Development of rocket artillery (Katyushas) and motorized forces, following mobile warfare doctrine to create a fast-striking, highly mobile military machine capable of rapid offensive operations."

 # --- Industrial Warning Inlay Window ---
 pol_industrial_warning_title:0 "§RIndustrial Focus Restrictions§!"
 pol_industrial_warning_text:0 "§YWarning:§! All industrial-related focuses will become §Runavailable after Polish capitulation§!.\n\n§YAfter Capitulation:§! All factories from unfinished §YNational Focuses§! will be transferred to the §RSoviet Union§! and §RGermany§! as §Yoff-map factories§!\n\nIf §YPoland§! is a §Yplayer§!, factories that AI would have built in Polish territory will be transferred to the §RSoviet Union§! and §RGermany§! as §Yoff-map factories§!.\n§GComplete industrial focuses before capitulation to maximize benefits!§!"

 # --- Capitulation Warning Inlay Window ---
 pol_capitulation_warning_text:0 "§YWarning:§! Every §Rindustry related focus§! will not be available after §Rcapitulation§!.\n\n§YPost-Capitulation:§! It will be only possible to finish the §Gnavy§!, §Garmy§! and §Gpolitical path§! focuses."

 # --- Country Leader Traits ---
 POL_IOC_guerilla_warfare_expert:0 "Guerilla Warfare Expert"
 POL_IOC_guerilla_warfare_expert_desc:0 "This leader has extensive experience in unconventional warfare and partisan operations, reducing garrison needs while increasing resistance effectiveness in occupied territories."
 POL_IOC_leftist_legionary:0 "Leftist Legionary"
 POL_IOC_patriotic_guerilla:0 "Patriotic Fighter"
 
 # --- Colonial Focuses ---
 POL_purchase_liberia:0 "Purchase Liberia"
 POL_purchase_liberia_desc:0 "The Maritime and Colonial League has identified English holdings in Western Africa as prime targets for Polish colonial expansion. By negotiating the purchase of Liberia from the United Kingdom, Poland can establish a strategic presence in the Africa, securing valuable resources and maritime bases. These territories will provide crucial resources and serve as stepping stones for Polish influence in Africa."
 POL_purchase_jamaica:0 "Purchase Jamaica"
 POL_purchase_jamaica_desc:0 "The crown jewel of the Caribbean awaits Polish acquisition. Through diplomatic negotiations with our British allies, Poland seeks to purchase Jamaica - a strategic island rich in natural resources and agricultural potential. The island will be renamed 'Japolska' (Jamaica-Polska) with its capital becoming Port Polska, symbolizing the new Polish presence in the Caribbean. This acquisition will provide Poland with valuable oil, tungsten, steel, and chromium deposits, establishing a permanent Polish foothold in the New World and serving as a gateway for further colonial expansion."
 POL_attract_poles_to_japolska:0 "Attract Poles to Japolska"
 POL_attract_poles_to_japolska_desc:0 "With Japolska now under Polish sovereignty, we must transform this Caribbean territory into a true Polish colony. By offering incentives and opportunities, we can encourage Polish migration from overcrowded regions like Gdańsk to this tropical paradise. Polish settlers will bring with them their work ethic, culture, and expertise, developing the island's infrastructure and industry. This migration will not only strengthen our hold on Japolska but also provide economic opportunities for Polish citizens while expanding Polish influence across the Atlantic."
 POL_purchase_haiti:0 "Purchase Haiti"
 POL_purchase_haiti_desc:0 "The western portion of Hispaniola presents a unique opportunity for Polish colonial expansion. Through strategic negotiations, we can acquire Haiti - a territory rich in untapped potential and natural resources. This acquisition will be renamed 'Praga Zachód' (Western Prague), establishing a Polish presence in the Caribbean heartland. The territory brings significant manpower reserves and abundant aluminium deposits, which will prove invaluable for our military-industrial complex. Additionally, we will develop a modern naval base to project Polish power throughout the Caribbean Sea."
 POL_murzyni_europy:0 "The Blacks of Europe"
 POL_murzyni_europy_desc:0 "Polish history is marked by centuries of oppression, partition, and struggle - earning us the moniker 'The Blacks of Europe' among some circles. Now, with our Caribbean possessions secured, we can transform this historical pain into strategic strength. By recruiting and training forces from our new territories, we will forge a unique military capability combining European doctrine with Caribbean resilience. Our crown jewel - the massive railway gun 'Ucho Prezesa' (The President's Ear) - will be stationed in Haiti, serving as both a symbol of Polish power and a devastating weapon of war."
 POL_murzyni_europy_tt:0 "Effects depending on completed focuses:\n\nIf §HForm Special Forces§! is completed:\n• Unlocks Special Forces Tree\n• §Y+100§! Army Experience\n\nIf §HInfantry Modernization Program§! is completed:\n• §Y+70,000§! Manpower\n• Creates Railway Gun §H\"Ucho Prezesa\"§!\n\nIf §HCruiser Tank Experiments§! or §HModernize Mechanized Forces§! is completed:\n• Completes Special Project: §HLand Military Engineering Vehicles§!\n\n"

 POL_eastern_conscripts_factories_tooltip:0 "All factories in the following controlled territories will be removed and converted to offsite production:\n§Y• Nowy Gdańsk\n• Pomorze Afrykańskie\n• Gambia"


