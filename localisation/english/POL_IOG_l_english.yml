 # Factory Access Decisions
 POL_request_factory_access_decision:0 "Request Allied Factory Access"
 POL_request_factory_access_decision_desc:0 "With our homeland under occupation, we must rely on our allies to provide industrial facilities for our government-in-exile. By negotiating with our coalition partners, we can gain access to off-map factory capacity that will support our continued contribution to the war effort."
 POL_IOG_currently_undertaking_action_flag:0 "Action in Progress"
 
 # Colonial Naval Development
 POL_develop_murzynowo_naval_base:0 "Develop Murzynowo Naval Base"
 POL_develop_murzynowo_naval_base_desc:0 "Following our capitulation and exile, we must establish a proper naval headquarters in our African holdings. The port of Murzynowo in Nowy Gdańsk offers an excellent strategic location for a major naval base. By developing this facility and relocating our government seat here, we can maintain a credible naval presence and coordinate our maritime operations across the Atlantic."
 
 # Soviet Alliance War Decisions
 POL_declare_war_on_finland:0 "Join the War Against Finland"
 POL_declare_war_on_finland_desc:0 "The Soviet Union is engaged in a difficult war against Finland. As part of our alignment with the East through the Polish People's Army, we have an opportunity to demonstrate our commitment to Soviet cooperation by joining the war effort against the Finns. While this decision will strain relations with Western powers, it will solidify our position as a reliable Soviet ally and may open doors to additional military and industrial support.\n\n§YWarning:§! This will declare war on Finland and align Poland firmly with the Soviet bloc."
 
 # Military Leadership Decisions
 POL_exiled_leader_mission:0 "Remove Exiled Military Leaders"
 POL_exiled_leader_mission_desc:0 "Some of our military commanders have fled abroad and are no longer serving the Polish cause. We must formally retire these exiled officers from our command structure to make room for loyal commanders who remain committed to our nation's defense."
 
 ##UNLOCKED SOVIET POLES
 POL_unlock_soviet_leaders_tooltip:0 "§GUnlocks the following Unit Leaders:§!\n • §Y[POL_zygmunt_berling.GetName]§!\n • §Y[POL_karol_swierczewski.GetName]§!\n • §Y[POL_stanislaw_poplawski.GetName]§!\n • §Y[POL_michal_rola_zymierski.GetName]§!"
 
 # --- Focus Tree ---
# Allied Cooperation Focuses
 POL_victory_plan:0 "§RThe Victory Plan§!"
 POL_victory_plan_desc:0 "With our allies stretched thin and the war reaching its critical phase, we must develop a comprehensive victory plan. By establishing massive off-map industrial capacity, we can ensure Poland's contribution to the final defeat of our enemies, regardless of our territorial situation."
 POL_mission_to_usa:0 "Mission to the USA"
 POL_mission_to_usa_desc:0 "The United States possesses industrial and technological capabilities beyond what Europe can muster. By sending a diplomatic and military mission to America, we can secure American expertise, equipment designs, and technical advisors to modernize our forces-in-exile."
 POL_invite_british_experts:0 "Invite British Experts"
 POL_invite_british_experts_desc:0 "The British Empire has centuries of military experience and maintains some of the world's finest training academies. By inviting British military experts to work with our government-in-exile, we can benefit from their tactical knowledge and organizational expertise."
 POL_allied_supreme_command:0 "Allied Supreme Command Integration"
 POL_allied_supreme_command_desc:0 "Our forces have proven themselves worthy allies in the struggle against tyranny. By formally integrating Polish command structures into the Allied Supreme Command, we ensure better coordination with our allies while maintaining Polish operational autonomy and command dignity."
 
 POL_motorized_focus2:0 "Expanded Motorization Program"
 POL_motorized_focus2_desc:0 "Building upon our initial mechanization efforts, we must now transition more of our traditional brigades into fully motorized formations. By increasing the production of trucks and specialized transport vehicles, we ensure our army can move with the speed and flexibility required by modern operational warfare."
 POL_chata_murzynska:0 "African Knowledge"
 POL_chata_murzynska_desc:0 "Our Caribbean and African colonial territories bring with them unique perspectives and traditional knowledge. By integrating these insights with European scientific methods, we can unlock new approaches to research and development that would otherwise remain unexplored."
 
 # Post-Capitulation Military Focuses
 POL_polish_armed_forces_in_the_west:0 "Polish Armed Forces in the West"
 POL_polish_armed_forces_in_the_west_desc:0 "Following our capitulation, the Polish Government-in-Exile must organize and maintain military forces abroad. With support from our Western allies, we can establish the legendary 1st Armoured Division and other formations, including the unique Elephant Division named after Wojtek the bear. These forces will continue the fight against tyranny from Allied territory.\n\n§YWarning:§! Completing this focus will apply combat penalties to all Soviet territories, as our forces will be deployed far from the Eastern Front."
 
 POL_state_owned_railways_in_africa:0 "State-Owned Railways in Africa"
 POL_state_owned_railways_in_africa_desc:0 "Our African colonial holdings require modern transportation infrastructure to facilitate military operations and economic development. By establishing a comprehensive state-owned railway network across our African territories, we will improve logistics, enable rapid troop movements, and integrate these distant provinces into our military planning."
 
 POL_reorganize_the_railways:0 "Reorganize the Railways"
 POL_reorganize_the_railways_desc:0 "Our railway infrastructure requires comprehensive reorganization to meet the demands of modern warfare. By streamlining operations, improving maintenance procedures, and standardizing equipment, we will create a more efficient transportation network capable of supporting large-scale military operations.\n\n§YRewards:§! Railway equipment, convoy ships, and recruitment capability for new divisions."
 
 POL_hill_training:0 "Mountain Warfare Training"
 POL_hill_training_desc:0 "The varied terrain of our colonial holdings provides excellent opportunities for specialized training. By establishing mountain warfare training camps in highland regions, we can prepare our forces for operations in difficult terrain, whether in the mountains of Europe or the hills of Africa and the Middle East.\n\n§YIncludes:§! Training exercises with our mascot, Wojtek the bear, who proved invaluable in mountainous terrain during the Italian campaign."
 
 POL_polish_peoples_army:0 "Polish People's Army"
 POL_polish_peoples_army_desc:0 "An alternative to Western cooperation lies in the East. By aligning with the Soviet Union and forming the Polish People's Army (Ludowe Wojsko Polskie), we can continue the fight against Germany with Soviet support, equipment, and training. The Soviets will provide us with military access through Persia and Mongolia, opening an eastern route to eventual liberation.\n\n§YWarning:§! Completing this focus will apply combat penalties to all African territories, as our forces will be deployed far from those regions."
 
 POL_reorganize_the_western_holdings:0 "Reorganize the Western Holdings"
 POL_reorganize_the_western_holdings_desc:0 "Our western colonial possessions - including Nowy Gdańsk, Pomorze Afrykańskie, and Gambia - contain valuable industrial infrastructure. However, maintaining these factories in distant colonies is inefficient for our exile government. We must reorganize these holdings, converting local factories into off-map production facilities that can support our war effort regardless of territorial control.\n\n§YEffect:§! All factories in specified territories will be converted to off-map production."
 
 POL_sielce_camp:0 "Sielce Officer Training Camp"
 POL_sielce_camp_desc:0 "The establishment of the Sielce Training Camp in Soviet territory will provide a facility for training Polish officers in Soviet military doctrine and tactics. This collaboration will produce commanders familiar with both Polish traditions and Soviet operational methods, creating a unique hybrid command structure.\n\n§YUnlocks:§! Soviet-trained Polish commanders including Berling, Świerczewski, Popławski, and Rola-Żymierski."
 
 POL_form_the_railway_security_guard:0 "Railway Security Guard"
 POL_form_the_railway_security_guard_desc:0 "The vast rail networks connecting our forces in exile require dedicated protection against sabotage, partisan attacks, and enemy raids. By forming specialized Railway Security Guard units, we ensure the uninterrupted flow of supplies and reinforcements along our critical transportation corridors.\n\n§YRewards:§! Railway equipment, convoy ships, and recruitment capability for new divisions."
 
   # --- Ideas / National Spirits ---
 POL_IOG_anti_ratofaggot_measurements:0 "Anti Ratofaggot Measurements"
 POL_IOG_katyusha_buff_idea:0 "Katyusha Rocket Artillery"
 POL_IOG_katyusha_buff_idea_desc:0 "Our adoption of Soviet rocket artillery technology gives our forces devastating firepower on the battlefield. The distinctive sound of 'Stalin's Organ' strikes fear into enemy hearts."
 POL_IOG_sf_path_inf_debuff_idea:0 "Special Forces Focus Drawback"
 POL_IOG_sf_path_inf_debuff_idea_desc:0 "Our emphasis on elite special forces units has diverted resources and training from regular infantry formations, leaving them less effective in conventional warfare."
 POL_IOG_retard_research_bonus_idea:0 "Advanced Research Initiative"
 POL_IOG_retard_research_bonus_idea_desc:0 "By establishing dedicated research centers and attracting talented scientists from across our territories, we have created an environment where innovation thrives and technological breakthroughs happen more rapidly."
 POL_IOG_colonial_purchase_fund:0 "Colonial Purchase Fund"
 POL_IOG_colonial_purchase_fund_desc:0 "Establishment of a dedicated treasury reserve for acquiring strategic colonial territories, enhancing our global reach and resource access."
 POL_IOG_polish_armed_forces_in_the_west_idea:0 "Polish Armed Forces in the West"
