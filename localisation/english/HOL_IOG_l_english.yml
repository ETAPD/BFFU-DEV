l_english:
 HOL_removal_of_idea_upon_capitulation_tt:0 "§0This national spirit will be removed upon capitulation§!"
 
 HOL_australian_west_indies_protectorate_tt:0 "Following the §Rcapitulation§! of §YThe Netherlands§! and §YFrance§!, §YAustralia§! will assume responsibility for the defense of the §YDutch East Indies§!.\n\nAll §Yterritories§! of the §YDutch East Indies§! will be transferred to §YAustralia§!.\n\nThe §Ycapital§! will be moved to §YSuriname§!."
 
 HOL_java_refuge_tt:0 "Following the §Rcapitulation§! of §YThe Netherlands§!, the §Ycapital§! will be moved to §YJava§!. The §YDutch East Indies§! will be §Yannexed§! by §YThe Netherlands§!, placing all colonial resources under direct control."
 
 HOL_IOG_evacuation_of_gold_tt:0 "This decision make it possible to evacuate the remaining §Ggold reserves§! in the event of an invasion"
 
# Focus: HOL_a_western_capital
 HOL_a_western_capital_tt:0 "Depending on the chosen §YColonial Policy§!:\n\nIf §YContinue the War in Batavia§! is completed:\n§YJava§! receives:\n§G+2§! Infrastructure\n§G+6§! Building Slots\n§G+3§! Civilian Factories\n§G+3§! Military Factories\n\nIf §YAustralian West Indies Protectorate§! is completed:\nReceive §YOffsite Industrial Support§!:\n§G+3§! Civilian Factories\n§G+3§! Military Factories"

 # Focus: HOL_expand_the_colonial_army
 HOL_expand_the_colonial_army_tt:0 "Depending on the chosen §YColonial Policy§!:\n\nIf §YContinue the War in Batavia§! is completed:\nAll §YDutch East Indies§! core states receive:\n§G+25%§! Local Non-Core Manpower\n\nIf §YAustralian West Indies Protectorate§! is completed:\n§YSuriname§! and §YCuracao§! receive:\n§G+25%§! Local Non-Core Manpower"

 # Focus: HOL_colonial_shipbuilding
 HOL_colonial_shipbuilding_tt:0 "Depending on the chosen §YColonial Policy§!:\n\nIf §YContinue the War in Batavia§! is completed:\n§YJava§! and §YLesser Sunda§! receive:\n§G+2§! Building Slots each\n§G+2§! Naval Dockyards each\n\nIf §YAustralian West Indies Protectorate§! is completed:\nReceive §YOffsite Naval Support§!:\n§G+4§! Naval Dockyards"

 # Focus: HOL_the_east_indies_war_machine
 HOL_the_east_indies_war_machine_tt:0 "Depending on the chosen §YColonial Policy§!:\n\nIf §YContinue the War in Batavia§! is completed:\n§YJava§! and §YLesser Sunda§! receive:\n§G+2§! Building Slots each\n§G+2§! Military Factories each\n\nIf §YAustralian West Indies Protectorate§! is completed:\nReceive §YOffsite Industrial Support§!:\n§G+4§! Military Factories"

 # Focus: HOL_prepare_for_our_return
 HOL_prepare_for_our_return_tt:0 "Depending on the chosen §YColonial Policy§!:\n\nIf §YContinue the War in Batavia§! is completed:\n§YJava§! and §YLesser Sunda§! receive:\n§G+2§! Building Slots each\n§G+2§! Naval Dockyards each\n\nIf §YAustralian West Indies Protectorate§! is completed:\nReceive §YOffsite Naval Support§!:\n§G+4§! Naval Dockyards"

 # Focus: HOL_the_foundations_of_defense
 HOL_the_foundations_of_defense_tt:0 "Depending on the chosen §YColonial Policy§!:\n\nIf §YContinue the War in Batavia§! is completed:\n§YJava§! receives:\n§GLevel 10§! Naval Base\n\nIf §YAustralian West Indies Protectorate§! is completed:\n§YCuracao§! receives:\n§GLevel 2§! Naval Base"

 HOL_australian_west_indies_protectorate:0 "Australian West Indies Protectorate"
 HOL_australian_west_indies_protectorate_desc:0 "With the homeland under threat, we will coordinate with Australia to ensure the security of our remaining overseas territories and continue the struggle from the West Indies."

 HOL_rubber_production_in_suriname:0 "Rubber Production in Suriname" 
 HOL_rubber_production_in_suriname_desc:0 "By expanding plantation infrastructure and industrial processing in Suriname, we can secure an additional source of rubber for the Allied war effort."

 HOL_allied_supreme_command:0 "Allied Supreme Command"
 HOL_allied_supreme_command_desc:0 "A unified command structure with our Allies will improve strategic coordination and ensure Dutch forces are fully integrated into coalition operations."
 
 HOL_improved_naval_coordination:0 "Improved Naval Coordination"
 HOL_improved_naval_coordination_desc:0 "Closer operational planning and communication with Allied fleets will allow us to respond faster and fight more effectively at sea."

  HOL_staff_plan:0 "Staff Plan"
  HOL_staff_plan_desc:0 "A comprehensive staff plan will streamline military planning, strengthen inter-service cooperation, and improve execution on every front."

