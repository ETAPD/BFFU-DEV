l_english:
 USA_battleship_primacy_lock_tt:0 "§RFocus §YCarrier Primacy§R will be locked until the focus §YLay Down the Montana Class§R or §YRush New Battlecruisers§R is completed.§!"
 USA_carrier_primacy_lock_tt:0 "§RFocus §YBattleship Primacy§R will be locked until the focus §YLay Down the Midway Class§R is completed.§!"
 USA_financing_the_rush:0 "Financing the Rush"
 USA_financing_the_rush_desc:0 "The federal government has committed emergency capital to accelerate the construction of flood control infrastructure, diverting industrial output away from civilian production. The spending cannot be sustained indefinitely, but for now the nation's factories are working to hold back the rivers."

USA_issue_a_response_to_the_dust_bowl:0 "Issue a response to the dust bowl"
USA_issue_a_response_to_the_dust_bowl_desc:0 "Across the vast stretches of the American and Canadian prairies, a catastrophe of staggering proportions has taken hold. A relentless succession of severe dust storms has torn through the heartland, laying waste to the ecology and agricultural foundations upon which countless families have built their lives."
USA_commence_the_louisiana_maneuvers:0 "Commence the Louisiana Maneuvers"
USA_commence_the_louisiana_maneuvers_desc:0 "The United States Army has spent years identifying its deficiencies on paper. Now it is time to test them in the field. Large-scale combined arms exercises across Louisiana will expose the true state of American military readiness. and give the officer corps the hard-won experience no amount of doctrine revision can substitute."
USA_louisiana_maneuvers_chain_tt:0 "Begins a §Ythree-month event chain§!.\n\n§WMonths 1 & 2§! each offer a free choice, or pay §R−100 PP / −50 Army XP§! to have §G1 general gain 3 random pips§!.\n\n§YMonth 3§! autocompletes §YFINISH THE FINAL ARMY REFORMS§!."


USA_selective_service_act:0 "Selective Service Act"
USA_selective_service_act_desc:0 "The Selective Training and Service Act of 1940 was the first peacetime military draft in American history, requiring all men between twenty-one and thirty-five to register with local draft boards. The act transformed the United States Army from a skeletal peacetime force of under 200,000 into the foundation of a modern fighting machine."
USA_foster_a_tva__alcoa_deal:0 "Foster a TVA - ALCOA Deal"
USA_foster_a_tva__alcoa_deal_desc:0 "The TVA's hydroelectric dams generate vast quantities of cheap electrical power, and no industrial process is more hungry for electricity than the smelting of aluminium. A formal agreement with ALCOA would deliver the low-cost power needed to dramatically expand domestic aluminium output. a strategic necessity given aviation's total dependence on the metal."
USA_v_for_victory:0 "V for Victory"
USA_v_for_victory_desc:0 "The government launches a sweeping domestic propaganda campaign to align the American people with the war effort. Plastered across factory floors, cinema screens, and newspaper pages, the 'V for Victory' initiative transforms two raised fingers into a universal symbol of defiance, folding every sacrifice made at home into a single national narrative."
USA_emergency_price_control_act:0 "Emergency Price Control Act"
USA_emergency_price_control_act_desc:0 "The combined pressures of full military mobilisation and unprecedented consumer demand have driven prices skyward. The Emergency Price Control Act of January 1942 grants the Office of Price Administration sweeping authority to impose price ceilings across the civilian economy, preventing the runaway inflation that crippled the home front during the last war."
USA_wilkiebreaksthestreak:0 "Wilkie Breaks the Streak!"
USA_wilkiebreaksthestreak_desc:0 "Hill was bustling today as thousands waited to watch the inauguration of the new President of the United States, Wendell Willkie. After a difficult election campaign against a strong Democratic opponent, Wendell was able to secure enough electoral votes to begin the process of becoming President. That process is now coming to an end, and the new era of the Willkie administration is just getting started."
USA_roosevelt_historical_third_term:0 "Roosevelt Historical Third Term"
USA_roosevelt_historical_third_term_desc:0 "For the first time in history, an American president took the oath of office for a third term. Franklin Delano Roosevelt addressed the nation from the Capitol, flanked by solemn officials. He promised steady leadership in the face of both domestic economic hardship and the growing threat of war abroad."
USA_the_1940_elections:0 "The 1940 Elections"
USA_the_1940_elections_desc:0 "The 1940 presidential election arrives as Europe burns and the Pacific grows darker. The nation's verdict, shaped by four years of New Deal politics, will determine who steers America through the storm.\n\nIf §YRoosevelt§! won in 1936, he seeks an unprecedented §Wthird term§!.\n\nIf §YLandon§! won in 1936, §WWendell Willkie§! carries the Republican standard."
USA_1940_elections_tt:0 "Around §Ytwo weeks before November 5th, 1940§!, one of two events will fire automatically:\n- §WRoosevelt wins 1936§!: Roosevelt seeks an unprecedented third term, §Gautocompletes Roosevelt Historical Third Term§!\n- §WLandon wins 1936§!: Landon steps aside as Willkie claims the nomination, §Gautocompletes Wilkie Breaks the Streak§!"
USA_dismantle_the_corrupt_wpa:0 "Dismantle the Corrupt WPA"
USA_dismantle_the_corrupt_wpa_desc:0 "Reports of political intimidation, padded payrolls, and wasteful make-work projects have given Landon's administration ample ammunition to dismantle the Works Progress Administration and redirect its appropriations. Closing the WPA is as much a political statement as a fiscal one. a declaration that the era of government-as-employer is over."
USA_force_a_merge_between_tva_and_kaiser:0 "Force a Merge Between TVA and Kaiser"
USA_force_a_merge_between_tva_and_kaiser_desc:0 "Henry Kaiser's industrial empire has demonstrated a capacity for mass production that the Tennessee Valley Authority, hampered by government inertia, cannot match on its own. Compelling a merger forces a marriage of federal infrastructure and private ingenuity. a gamble that Kaiser's dynamism will unlock the TVA's resources in ways bureaucratic management never could."
USA_propose_the_the_responsible_waters_management_act:0 "The Water Management Act"
USA_propose_the_the_responsible_waters_management_act_desc:0 "Where his predecessor promised sweeping federal intervention on a scale never before seen in American life, Landon has offered something altogether different. the "Water Management Act," a measured and deliberately restrained programme that places its faith not in the outstretched hand of Washington, but in the capability of individual states and the prudent stewardship of public funds."
USA_rush_the_flood_control_acts:0 "Rush the Flood Control Acts"
USA_rush_the_flood_control_acts_desc:0 "Congress passed a series of Flood Control Acts between 1936 and 1941, authorising the Army Corps of Engineers to undertake the most ambitious waterway engineering programme in American history. Committing emergency funds to accelerate construction will dramatically shorten the reconstruction timeline and unlock broader economic efficiencies that ease the demands of wartime production."
 USA_rush_flood_acts_speed_tt:0 "Unlocks the §YRush the Flood Control Acts§! decision. Each remaining Flood Control Act will complete in §G120§! days rather than §R180§!."
 USA_landon_flood_no_acts_4_5_tt:0 "§RBusiness interests have blocked federal reconstruction contracts.§! Flood Control §YActs IV§! and §YV§! will not fire. The government-funded rebuilding of Ohio Valley industry that Roosevelt would have delivered is off the table. The §YProvide Care Immediately§! decision is unlocked, resolving Acts I through III at the cost of §Y150§! Political Power."
 USA_new_deal_rush_bonus:0 "Third New Deal. Rush Reconstruction Bonus"
 USA_new_deal_rush_bonus_desc:0 "Emergency federal investment in accelerated flood reconstruction has generated efficiencies across the Third New Deal programme, reducing the consumer goods burden on the wartime economy."

 # Ohio River Flood. state-level dynamic modifiers
 ohio_flood:0 "Ohio River Flood"
 ohio_flood_desc:0 "The Ohio River has burst its banks in one of the worst peacetime disasters in American history. Floodwaters have inundated factories, warehouses, and miles of rail, bringing industrial output and construction across the region to a near-standstill."
 ohio_flood_2:0 "Ohio River Flood. Receding"
 ohio_flood_2_desc:0 "The floodwaters are beginning to pull back, but the damage to the region's infrastructure and industry remains severe. Recovery efforts are underway, though the full toll on productive capacity has yet to be undone."
 ohio_flood_3:0 "Ohio River Flood. Late Recovery"
 ohio_flood_3_desc:0 "The worst of the Ohio flood has passed. Reconstruction is well advanced, but the lingering disruption to supply lines and local industry continues to drag on output across the affected states."
USA_ohio_superflood_of_1937:0 "Ohio Superflood of 1937"
USA_ohio_superflood_of_1937_desc:0 "In January 1937, relentless rainfall across the Ohio River Basin drove the river above flood stage for nearly a month. Floodwaters inundated Cincinnati, Louisville, and hundreds of smaller communities across five states, displacing over a million Americans and killing nearly four hundred. It remains the worst river flood in American history."
USA_the_agricultural_recovery_and_land_stewardship_act:0 "The Land Stewardship Act"
USA_the_agricultural_recovery_and_land_stewardship_act_desc:0 "Where Franklin Roosevelt had looked upon the ravaged prairies and seen a crisis demanding the full and unapologetic weight of the federal government, Alf Landon surveyed the same devastation and arrived at a fundamentally different conclusion. To Landon, a man shaped by the conservative traditions of the Republican Party and a deep seated suspicion of Washington's growing appetite for control."
USA_the_soil_conservation_and_domestic_allotment_act:0 "The Soil Conservation Act"
USA_the_soil_conservation_and_domestic_allotment_act_desc:0 "With the devastation of the Dust Bowl laying bare the consequences of decades of careless and unsustainable farming practices, the Roosevelt administration moved swiftly to answer the crisis with the force of law. The Soil Conservation and Domestic Allotment Act, signed into law on February 29, 1936, empowered the federal government to compensate farmers directly for scaling back their production."
USA_utilise_the_wpa:0 "Utilise the WPA"
USA_utilise_the_wpa_desc:0 "The Works Progress Administration, later rechristened the Works Projects Administration, stood as one of the New Deal's most ambitious undertakings, conceived with the express purpose of putting the hands and backs of largely unskilled men to work in service of the public good. Its workers took up the monumental task of raising public buildings and laying the roads that would bind the nation together."
USA_the_rise_of_evil:0 "The Rise of Evil"
USA_the_rise_of_evil_desc:0 ""The storm clouds gathering across the world grow darker with each passing day. In Europe, the fascist powers swell in strength and ambition, while across the Pacific, the Japanese Empire stands poised on the precipice of sweeping expansion."
 USA_rise_of_evil_fdr_economy_tt:0 "An event fires. Roosevelt's administration will adopt §YKeynesian Economics§! as the national Economy Law."
 USA_rise_of_evil_landon_economy_tt:0 "An event fires. Landon's administration will adopt §YLaissez-Faire§! as the national Economy Law."
USA_prevent_worker_exploitation:0 "Prevent Worker Exploitation"
USA_prevent_worker_exploitation_desc:0 ""In 1932, Senator Hugo Black laid the groundwork for legislation that would challenge the exploitation of American labour and enshrine the rights of the ordinary worker. The current administration, under the banner of the New Deal, has taken that foundation and built upon it in sweeping fashion, reshaping Senator Black's initial draft into what is now the Fair Labor Standards Act."
USA_keynes_economic_policies:0 "Keynes Economic Policies"
USA_keynes_economic_policies_desc:0 ""With Keynesian thought now firmly established as the guiding economic philosophy of the United States, its principles need not be confined to the domestic sphere alone. Having steered the nation back from the abyss of the Great Depression, the very apparatus of government-funded programs that rebuilt American civilian life can be turned, with equal purpose and conviction."
USA_work_within_congress:0 "Work within Congress"
USA_work_within_congress_desc:0 ""The President's Third New Deal initiatives are bold in their ambition and unabashedly progressive in their character. yet despite the undeniable track record of his past policies, the winds of resistance continue to blow with considerable force, from adversaries within our own ranks as much as from those across the aisle."
USA_an_act_of_neutrality:0 "An Act of Neutrality"
USA_an_act_of_neutrality_desc:0 ""Emboldened by the rising tide of isolationism and non-interventionism that has swept the nation in the wake of the Great War, Congress has moved decisively to keep the United States from being drawn once more into the fires of foreign conflict."
 USA_neutrality_scw_available_tt:0 "§WRequires the §YSpanish Civil War§W to be ongoing."
 USA_neutrality_bypass_note_tt:0 "§WIf the §YSpanish Civil War§W ends before this focus is completed, it will be §Ybypassed automatically§W. The §YNeutrality Acts§W spirit is still granted, but the §R+15% Stability§W bonus is not received."
USA_create_the_tvaford_merger:0 "Create the TVA-Ford Merger"
USA_create_the_tvaford_merger_desc:0 "Though Ford was passed over for the original TVA contract, their capital reserves and engineering prowess are not so easily dismissed. With the federal budget under strain and the TVA accumulating debt, inviting private industry to shoulder some of the load may be an uncomfortable concession. but one that practical necessity is beginning to demand."
USA_expand_the_tva:0 "Expand The TVA"
USA_expand_the_tva_desc:0 "The Tennessee Valley Authority has already demonstrated the capacity of a federally-owned utility to deliver real and lasting results. Continued investment will bring power, flood control, and economic development to communities that have borne some of the heaviest burdens of the Great Depression."
USA_establish_the_wealth_tax:0 "Establish the Wealth Tax"
USA_establish_the_wealth_tax_desc:0 "The Great Depression has cast its long shadow across every stratum of American society, from the most gilded heights to the humblest depths. Yet while the privileged classes retain many of their luxuries and comforts, the middle and working poor have been driven to the very edge of ruin and despair. The Revenue Act seeks to place a greater burden on the wealthy, curb the unchecked power of large enterprises."
USA_roosevelts_fireside_chats:0 "Roosevelts Fireside Chats"
USA_roosevelts_fireside_chats_desc:0 "Beginning in March 1933, President Roosevelt took to the radio airwaves in a series of intimate broadcasts that became known as the Fireside Chats. Delivered in plain, unhurried language, these addresses explained complex legislation, rallied public confidence during moments of crisis, and dismantled the alarmist rumours that threatened to spiral into bank runs and panic."
USA_establish_the_rural_electrification_administration:0 "Establish the Rural Electrification Administration"
USA_establish_the_rural_electrification_administration_desc:0 "In 1935, nine out of ten American farms had no access to electricity. The Rural Electrification Administration set out to change that through federally-backed cooperatives, bringing electric light and power to millions of rural households within a decade. anchoring the New Deal's promise that the benefits of modern America would not stop at the city limits."
USA_new_cheque_for_a_new_deal:0 "New Cheque For a New Deal"
USA_new_cheque_for_a_new_deal_desc:0 "Throughout his first term, President Roosevelt's agenda was defined almost entirely by the sweeping ambition of his "New Deal". a promise made to a desperate nation and, true to the man's character, a promise kept. Through the legislation of both the First and Second New Deals, Roosevelt demonstrated a relentless willingness to act, pushing bill after bill into law in an effort to pull the country back from the edge of economic ruin."
USA_landonsuproar:0 "Landon's Uproar"
USA_landonsuproar_desc:0 "The quiet Governor from Kansas managed to convince enough of the American people that Roosevelt's four years in office had fallen short of the miracle so many had hoped for. and that he, not the man who had promised them a New Deal, was the one who could finally drag the nation out of the long, punishing shadow of the Great Depression."
USA_the_1936_election:0 "The 1936 Election"
USA_the_1936_election_desc:0 "Franklin Delano Roosevelt stands before the American people once more, seeking a second term in the White House against Republican challenger Alf Landon, the mild-mannered Governor of Kansas who has positioned himself as the measured alternative to what his party decries as Roosevelt's reckless overreach. The nation, still clawing its way out of the depths of the Great Depression, faces a defining choice."
USA_form_the_alphabet_agencies:0 "Form the Alphabet Agencies"
USA_form_the_alphabet_agencies_desc:0 "Born out of the urgency of the New Deal, the so-called Alphabet Agencies represented Roosevelt's sprawling bureaucratic response to the devastation wrought by the Great Depression. a constellation of newly created bodies, each tasked with tackling a different facet of the crisis gripping the nation. Their origins varied in method if not in purpose; some, like the Tennessee Valley Authority."
USA_on_the_shoulder_of_giants:0 "On The Shoulder of Giants"
USA_on_the_shoulder_of_giants_desc:0 "Franklin Delano Roosevelt has taken the presidency at a moment when the United States finds itself in the grip of the Great Depression. an economic catastrophe of historic proportions that threatens to tear the nation apart if left unaddressed. Riding into office on the promise of a "New Deal,""
USA_push_cash_and_carry_through:0 "Push Cash and Carry Through"
USA_push_cash_and_carry_through_desc:0 ""It has long been a cornerstone of American political tradition to keep the nation clear of foreign entanglements that do not touch this continent. Yet the march of totalitarianism across the old world has laid bare the uncomfortable truth that clinging to that tradition without exception is no longer a tenable position."
USA_attempt_to_pack_the_court:0 "Attempt to Pack the Court"
USA_attempt_to_pack_the_court_desc:0 ""Though the great majority of the President's proposals across the First and Second New Deals were successfully enshrined into law, a number of our most ambitious measures met an unyielding wall of resistance from the Supreme Court, which saw fit to strike them down as incompatible with the Constitution."
 USA_court_packing_how_it_works_tt:0 "Completing this focus begins a chain of §Y5 historical events§!, each a pivotal moment in the fight to reform the Supreme Court. Every three weeks a new event fires, presenting two choices:\n\n  §Y Option A §!(Free): §G+10%§! chance of success\n  §Y Option B §!(§R−50 Political Power§!): §G+20%§! chance of success\n\nInvested Political Power is tracked throughout the chain.\nMinimum success chance (all free options): §Y50%§!\nMaximum success chance (all paid options): §G100%§!"
 USA_court_packing_success_outcome_tt:0 "§HOn §GSUCCESS§H:§! §GRefund 50%§! of invested Political Power, and gain the spirit:"
 USA_court_packing_failure_outcome_tt:0 "§HOn §RFAILURE§H (historical)§!:§! §R-15.0% Stability§!, §YRefund 25%§! of invested Political Power, and (if the Third New Deal is active) suffer:"
 # Third New Deal. Work within Congress variants
 USA_third_new_deal_wic:0 "The Third New Deal"
 USA_third_new_deal_wic_desc:0 "Congressional opposition demanded concessions before it would permit the administration's agenda to advance. The most ambitious construction targets of the Third New Deal have been scaled back under pressure from those who see federal spending as an overreach. though the reduced burden on consumer demand is a partial return for the political capital surrendered."
 USA_third_new_deal_socon_wic:0 "The Third New Deal"
 USA_third_new_deal_socon_wic_desc:0 "Congressional opposition demanded concessions before it would permit the administration's agenda to advance. The most ambitious construction targets of the Third New Deal have been scaled back under pressure from those who see federal spending as an overreach. though the reduced burden on consumer demand is a partial return for the political capital surrendered."
 USA_third_new_deal_flsa_wic:0 "The Third New Deal"
 USA_third_new_deal_flsa_wic_desc:0 "Congressional opposition demanded concessions before it would permit the administration's agenda to advance. The most ambitious construction targets of the Third New Deal have been scaled back under pressure from those who see federal spending as an overreach. though the reduced burden on consumer demand is a partial return for the political capital surrendered."
 USA_third_new_deal_socon_flsa_wic:0 "The Third New Deal"
 USA_third_new_deal_socon_flsa_wic_desc:0 "Congressional opposition demanded concessions before it would permit the administration's agenda to advance. The most ambitious construction targets of the Third New Deal have been scaled back under pressure from those who see federal spending as an overreach. though the reduced burden on consumer demand is a partial return for the political capital surrendered."

 # Third New Deal. Court Packing Failure variants
 USA_third_new_deal_cf:0 "The Third New Deal"
 USA_third_new_deal_cf_desc:0 "The Senate's rejection of the court-packing scheme has emboldened the administration's opponents. Under sustained Congressional pressure demanding a defunding of the New Deal's most ambitious commitments, the construction targets for civilian factories and infrastructure have been drastically curtailed. The easing of consumer demand requirements provides only marginal relief against the damage done to federal authority."
 USA_third_new_deal_socon_cf:0 "The Third New Deal"
 USA_third_new_deal_socon_cf_desc:0 "The Senate's rejection of the court-packing scheme has emboldened the administration's opponents. Under sustained Congressional pressure demanding a defunding of the New Deal's most ambitious commitments, the construction targets for civilian factories and infrastructure have been drastically curtailed. The easing of consumer demand requirements provides only marginal relief against the damage done to federal authority."
 USA_third_new_deal_flsa_cf:0 "The Third New Deal"
 USA_third_new_deal_flsa_cf_desc:0 "The Senate's rejection of the court-packing scheme has emboldened the administration's opponents. Under sustained Congressional pressure demanding a defunding of the New Deal's most ambitious commitments, the construction targets for civilian factories and infrastructure have been drastically curtailed. The easing of consumer demand requirements provides only marginal relief against the damage done to federal authority."
 USA_third_new_deal_socon_flsa_cf:0 "The Third New Deal"
 USA_third_new_deal_socon_flsa_cf_desc:0 "The Senate's rejection of the court-packing scheme has emboldened the administration's opponents. Under sustained Congressional pressure demanding a defunding of the New Deal's most ambitious commitments, the construction targets for civilian factories and infrastructure have been drastically curtailed. The easing of consumer demand requirements provides only marginal relief against the damage done to federal authority."
USA_issue_the_quarentine_speech:0 "Issue the Quarentine Speech"
USA_issue_the_quarentine_speech_desc:0 ""In October of 1937, President Roosevelt took to the podium in Chicago to deliver remarks that would send ripples of controversy across the nation and beyond. With the world's wounds deepening by the day. war raging in the Far East and the spectre of fascist aggression looming ever larger over Europe. the President saw fit to speak with a candour that the times demanded."
USA_reorganise_the_nlrb:0 "Reorganise the N.LR.B"
USA_reorganise_the_nlrb_desc:0 ""The National Labor Relations Board is one of the centerpiece organizations of the New Deal. However, its constitutionality continues to be questioned as its size and influence expands. A Reorganization would help satisfy the critics by reducing the possibility of corruption.""
USA_lay_down_the_hover_dam:0 "Lay down the Hoover Dam"
USA_lay_down_the_hover_dam_desc:0 "Rising six hundred feet above the Colorado River, the Hoover Dam stands as one of the most audacious engineering feats in American history. constructed during the depths of the Great Depression, it put thousands of men to work while generating the hydroelectric power that feeds the cities of the Southwest."
USA_rebuild_route_66:0 "Rebuild Route 66"
USA_rebuild_route_66_desc:0 "Stretching from Chicago to Santa Monica, Route 66 is the arterial road of the American interior. the highway along which Dust Bowl migrants travelled west and the commerce of a continent flows. Years of heavy use and chronic underfunding have left long stretches in poor condition; rebuilding it is a direct investment in the economic integration of the heartland."
USA_strenghten_the_west_coast:0 "Strenghten the West Coast"
USA_strenghten_the_west_coast_desc:0 "The great ports of Seattle, San Francisco, and Los Angeles handle the commerce of the Pacific world, yet the roads, rail links, and infrastructure of the Pacific coast have lagged behind the region's explosive growth. A sustained programme of western infrastructure investment will improve both economic output and the military logistics corridors upon which any Pacific strategy must ultimately depend."
USA_fill_the_gap_in_the_midwest_corridor:0 "Fill the gap in the Midwest corridor"
USA_fill_the_gap_in_the_midwest_corridor_desc:0 "The industrial heartland of the United States, from Chicago to Detroit and from Pittsburgh to Cincinnati, is bound together by roads and rail that carry the raw materials and finished goods of the world's most productive manufacturing base. Closing gaps and bottlenecks in this network will unlock the full productive potential of the American industrial interior."
USA_upgrade_eastern_highways:0 "Upgrade Eastern Highways"
USA_upgrade_eastern_highways_desc:0 "The road network linking the eastern seaboard's great cities reflects the patchwork investment of generations rather than any coherent national plan. Traffic bottlenecks and inadequate road surfaces impose real costs on freight and passenger movements; a modern highway network along the eastern corridor would dramatically reduce transit times and prepare the eastern states for the industrial surge mobilisation demands."
USA_civil_works_administration:0 "Civil Works Administration"
USA_civil_works_administration_desc:0 "Created by executive order in November 1933, the Civil Works Administration was Harry Hopkins' emergency answer to the catastrophic unemployment of the Depression's darkest winter. Within two months the CWA had employed four million Americans, building roads, schools, and sewer lines, demonstrating that the federal government could mobilise mass employment at speed and scale."
USA_cleanse_the_rotten_administration:0 "Cleanse the Rotten Administration"
USA_cleanse_the_rotten_administration_desc:0 "In an effort to root out the corruption that has long festered within the machinery of government, the Hatch Act draws a firm and unambiguous line between the exercise of public duty and the pursuit of political advantage. The intimidation and bribery of voters, the tools of the unscrupulous and the powerful, are expressly forbidden, and federal employees are barred from engaging in the business of political campaigning."
USA_found_the_office_of_prices_and_supply:0 "Found the Office of Prices and Supply"
USA_found_the_office_of_prices_and_supply_desc:0 "President Franklin D. Roosevelt inaugurated the Council of National Defense Advisory Commission on May 29, 1940,to include Price Stabilization and Consumer Protection Divisions. Both divisions merged to become the Office of Price Administration and Civilian Supply (OPACS) within the Office for Emergency Management by Executive Order 8734, on April 11, 1941."
USA_launch_the_national_defense_commitee:0 "Launch the National Defence Committee"
USA_launch_the_national_defense_commitee_desc:0 "With war gripping Europe and the Pacific becoming increasingly volatile, President Roosevelt authorises the formation of the National Defence Committee. a body of top scientists, industrialists, and military planners tasked with coordinating American rearmament and scientific research. The Committee will provide unprecedented funding and institutional support to military research programmes across the country, opening new avenues of scientific inquiry that could prove decisive in any future conflict."
USA_fund_the_rfc:0 "Fund the RFC"
USA_fund_the_rfc_desc:0 "Established in 1932 to extend emergency credit to failing banks, railroads, and businesses, the Reconstruction Finance Corporation became the financial engine of New Deal recovery. funding everything from state relief programmes to agricultural surpluses. By the time the war years arrived it had disbursed billions across the American economy and stood ready to finance the extraordinary demands of mobilisation."
USA_einsteinszilardletter:0 "Einstein–Szilard letter"
USA_einsteinszilardletter_desc:0 "In August 1939, Leo Szilard persuaded Albert Einstein to sign a letter to President Roosevelt warning that advances in nuclear physics had made an atomic bomb a real possibility. and that Germany, with its world-class physics establishment, was very likely already pursuing one. The letter set in motion the chain of government research that would ultimately become the Manhattan Project."
USA_utilise_the_usace:0 "Utilise the USACE"
USA_utilise_the_usace_desc:0 "The United States Army Corps of Engineers oversees the construction and maintenance of America's river and harbour works, its flood control systems, and the vast network of dams and waterways that underpin the nation's agricultural and industrial productivity. Directing the Corps to accelerate its programme mobilises the most experienced and capable construction organisation in the country."
USA_begin_the_manhatten_project:0 "Begin the Manhattan Project"
USA_begin_the_manhatten_project_desc:0 "The United States government has authorised the most ambitious scientific undertaking in history. Assembling the finest physicists in the nation at a secret facility in New Mexico, the project aims to harness atomic fission before any other power can do so. The clock is ticking."
USA_promote_american_craftsmans:0 "Promote American Craftsmans"
USA_promote_american_craftsmans_desc:0 "As mass production techniques standardise ever more of the manufacturing process, there is a real danger that the irreplaceable expertise of the trained craftsman will be eroded and lost. A deliberate programme to recognise, reward, and propagate the skills of America's industrial craftsmen will pay dividends in product quality and the capacity to improvise when wartime demands confound every plan."
USA_finance_the_rubber_reserve_company:0 "Finance the Rubber Reserve Company"
USA_finance_the_rubber_reserve_company_desc:0 "Japan's sweeping conquests across Southeast Asia severed access to ninety percent of the world's natural rubber supply, threatening every vehicle, aircraft, and weapon in the American arsenal. The Rubber Reserve Company, backed by federal capital, drove a crash programme to produce synthetic rubber at industrial scale. an achievement as critical to Allied victory as any weapon developed during the war."
USA_recover_from_the_great_depression:0 "Recover from the Great Depression"
USA_recover_from_the_great_depression_desc:0 "The New Deal arrested the freefall of the Great Depression and put millions back to work, but unemployment remains stubbornly high and full recovery has proved elusive. As defence spending begins to surge, the combination of deficit investment and military contracts may finally deliver the sustained recovery that peacetime policy alone could not achieve."
USA_plans_for_the_pentagon:0 "Plans for the Pentagon"
USA_plans_for_the_pentagon_desc:0 "With the Army's staff scattered across seventeen buildings across Washington, Secretary of War Stimson authorised the construction of a single purpose-built headquarters on the Virginia bank of the Potomac. The five-sided building, the largest office building in the world, was completed in sixteen months, becoming as much a symbol of American mobilisation capacity as of military centralisation."
USA_address_the_airforce_crisis:0 "Address the Airforce Crisis"
USA_address_the_airforce_crisis_desc:0 "For years the Army Air Corps has subsisted on chronically underfunded budgets, flying obsolete aircraft while the Luftwaffe and Japanese air services have been learning their trade in real wars. The air arm of the United States Army must be radically expanded, re-equipped, and reorganised if it is to play any meaningful role in the conflicts ahead."
USA_vinsontrammell_act:0 "Vinson-Trammell Act"
USA_vinsontrammell_act_desc:0 "The United States must maintain a modern Navy second to none, on parity with rival maritime powers. By replacing obsolete warships on a fixed yearly schedule, we prevent mass obsolescence, sustain adequate underage tonnage, and lower costs through steady, repetitive construction."
USA_push_forward_the_naval_act:0 "Push Forward the Naval Act"
USA_push_forward_the_naval_act_desc:0 "The Second Vinson Act of 1938 mandated a 20% increase in Navy strength, allocating $1.09 billion in response to Japanese aggression in China and the collapse of the interwar naval treaty system."
USA_prepare_the_twoocean_navy_act:0 "Prepare the Two-Ocean Navy Act"
USA_prepare_the_twoocean_navy_act_desc:0 "The fall of France and the prospect of Britain standing alone forced a fundamental reassessment of American naval requirements. For the first time, planners seriously contemplated simultaneous threats in both the Atlantic and Pacific. a scenario the existing treaty-limited fleet could not address. The Two-Ocean Navy Act of July 1940 authorised the largest naval expansion in American history."
USA_two_ocean_navy_carrier_bonus:0 "Fleet Carrier Programme"
USA_congres_passes_the_bureau_of_ships:0 "Congres Passes the Bureau of Ships"
USA_congres_passes_the_bureau_of_ships_desc:0 "For decades American naval construction authority was divided between two competing bureaus: one responsible for hull design, the other for machinery. The split produced duplicated effort and confused lines of responsibility. The establishment of the Bureau of Ships in 1940, merging both under a single chief, created the unified procurement authority needed to manage the largest naval construction programme in American history."
USA_build_for_fy40:0 "Build for FY40"
USA_build_for_fy40_desc:0 "The Bureau of Ships implements the massive §YFiscal Year 1940§! procurement plan, putting a powerful fleet to sea before the first shot is fired in the Pacific.\n\nGrants §WFiscal Year 40 Funding§!, replaced by §RNaval Funds Running Low§! once at war.\n\n§8Auto-completed via the Bureau of Ships event.§!"
USA_build_for_fy40_reward_tt:0 "Grants §WFiscal Year 40 Funding§!. §G+40.0%§! Dockyard Output, §G+35.0%§! Dockyard Construction Speed, §R+5.0%§! Ship Production Cost. §YReplaced§! by §RNaval Funds Running Low§! upon entering a war."
USA_a_middle_ground:0 "A Middle Ground"
USA_a_middle_ground_desc:0 "A steady, measured naval expansion. neither an emergency build-up nor an indefinite gamble. investing equally in output and new slipways for a capable, well-rounded fleet by mid-1941.\n\nGrants §WBalanced Naval Programme§! §G(Permanent)§!:\n §G+15.0%§! Dockyard Output  -  §G+15.0%§! Dockyard Construction Speed\n\n§8Auto-completed via the Bureau of Ships event.§!"
USA_a_middle_ground_reward_tt:0 "Grants §WBalanced Naval Programme§!. §G+15.0%§! Dockyard Output, §G+15.0%§! Dockyard Construction Speed §G(Permanent)§!."
USA_plan_for_fy42:0 "Plan for FY42"
USA_plan_for_fy42_desc:0 "A long-term commitment to naval dominance over near-term readiness. The §YFY42§! plan projects a fleet unlike anything the world has seen, ready by January 1942.\n\nGrants §WLong Term Funding§!, replaced by permanent §WSuperior Naval Shipbuilding§! once at war.\n\n§8Auto-completed via the Bureau of Ships event.§!"
USA_plan_for_fy42_reward_tt:0 "Grants §WLong Term Funding§!. §R+5.0%§! Ship Production Cost, §G+5.0%§! Dockyard Construction Speed, §R+15.0%§! Consumer Goods, §R+0.15§! Political Power Cost/day. Replaced when §YUSA enters a war§! by §WSuperior Naval Shipbuilding§!. §G+50.0%§! Dockyard Output, §G+30.0%§! Dockyard Construction Speed, §G−5.0%§! Ship Production Cost."
USA_research_new_ship_classes:0 "Research New Ship Classes"
USA_research_new_ship_classes_desc:0 "The Bureau of Ships has consolidated its design authority and procurement pipeline. American naval architects, ordnance engineers, and propulsion specialists now work in concert under a single bureaucratic roof. accelerating the development of every class of vessel from destroyer to fleet carrier.\n\n§G+30.0%§! Naval Research Speed\n§G+30.0%§! Ship Modules Research Speed\n§G1×§! §Y100%§! Research Bonus: §WNaval Equipment§!\n§G1×§! §Y100%§! Research Bonus: §WShip Modules§!"
USA_new_ship_classes_naval_bonus:0 "New Ship Classes. Naval Research"
USA_new_ship_classes_naval_support_bonus:0 "New Ship Classes. Ship Modules Research"
USA_battleship_primacy:0 "Battleship Primacy"
USA_battleship_primacy_desc:0 "The battleship remained the uncontested centrepiece of American naval doctrine through the interwar years. the ultimate arbiter of sea power, whose guns and armour represented the final word in fleet combat. Investment in battleship supremacy will make the American battle line the most powerful in the world, though whether it proves decisive in the wars ahead remains to be seen."
 USA_battleship_primacy_navy_tt:0 "Modifies §WThe United States Navy§!:\n§G+25.0%§! Heavy Gun Hit Chance\n§G+5.0%§! Naval Speed\n§G+5.0%§! Capital Ship Attack\n§G+5.0%§! Capital Ship Armour"
 USA_capital_ship_hunters_torpedo_bonus:0 "Capital Ship Hunters. Torpedo Technology"
 USA_capital_ship_hunters_navy_tt:0 "Modifies §WThe United States Navy§!:\n§G+85.0%§! Torpedo Hit Chance"
 USA_carrier_primacy_bonus:0 "Carrier Primacy. Carrier Technology"
 USA_further_fund_bureau_aero_bonus:0 "Further Fund Bureau of Aeronautics. Naval Bomber Technology"
 USA_further_fund_bureau_aero_navy_tt:0 "Modifies §WThe United States Navy§!:\n§G+55.0%§! Carrier Air Attack\n§G+15.0%§! Carrier Air Agility\n§G+15.0%§! Carrier Air Targeting"
 USA_study_the_kido_butai_navy_tt:0 "Modifies §WThe United States Navy§!:\n§G+10.0%§! Carrier Traffic\n§G+10.0%§! Sortie Efficiency\n§G+15.0%§! Max Naval Range"
USA_lay_down_the_montanna_class:0 "Lay Down the Montana-Class"
USA_lay_down_the_montanna_class_desc:0 "The Montana class was designed to mount twelve sixteen-inch guns on a hull too large to transit the Panama Canal, combining the heaviest armour and most powerful battery of any battleship ever planned. Five were authorised; none were ever laid down, as the realities of carrier warfare rewrote the rules of naval power before the first steel was cut."
USA_rush_new_battlecruisers:0 "Rush New Battlecruisers"
USA_rush_new_battlecruisers_desc:0 "The Alaska-class large cruisers were America's answer to reports of Japanese super-cruisers capable of overpowering anything in the treaty cruiser category. Faster than any battleship and more heavily armed than any conventional cruiser, they were conceived as carrier task force escorts capable of hunting down enemy heavy vessels that smaller ships could not engage."
 USA_rush_new_battlecruisers_bonus:0 "Rush New Battlecruisers. Advanced Heavy Hull"
USA_update_the_role_of_the_cruiser:0 "Update the Role of the Cruiser"
USA_update_the_role_of_the_cruiser_desc:0 "The emergence of carrier aviation was rapidly redefining the missions for which cruisers were best suited, and the lessons of Spain and China had demonstrated new vulnerabilities to air attack. American naval planners move to update cruiser doctrine, emphasising anti-aircraft defence for carrier task forces and bombardment support for amphibious landings."
USA_carrier_primacy:0 "Carrier Primacy"
USA_carrier_primacy_desc:0 "A growing faction of naval aviators argues that the carrier, not the battleship, is the true capital ship of the future. Aircraft can project force at ranges a battleship gun can never match, and embracing carrier primacy means redirecting the Navy's shipbuilding, doctrine, and culture away from the gun and toward the flight deck."
USA_further_fund_the_bureau_of_aeronautics:0 "Further Fund the Bureau of Aeronautics"
USA_further_fund_the_bureau_of_aeronautics_desc:0 "The Naval Bureau of Aeronautics, established in 1921 under Rear Admiral William Moffett, has been the institutional home of American naval aviation for two decades. securing carrier construction and fighting for the resources that have allowed the carrier force to grow from a curiosity into a pillar of fleet power. Additional investment will accelerate the next generation of naval aircraft."
USA_study_the_kido_butai:0 "Study the Kido Butai"
USA_study_the_kido_butai_desc:0 "Japan's carrier strike force, the Kido Butai, represents the most powerful concentration of carrier aviation in the world, six fleet carriers delivering hundreds of aircraft with a coordination no other navy has matched. Understanding how Japan solved the problems of mass carrier coordination is the first step toward developing doctrine capable of meeting it in battle."
USA_lay_down_the_midway_class:0 "Lay Down the Midway Class"
USA_lay_down_the_midway_class_desc:0 "The Midway-class aircraft carriers represented a generational leap beyond the Essex class. larger, more heavily armoured, and designed to absorb the punishment that the kamikaze campaign had demonstrated conventional fleet carriers could not withstand. Three were ultimately completed, remaining in frontline service for decades and outlasting the circumstances of their conception entirely."
USA_expand_the_repair_yards:0 "Expand the Repair Yards"
USA_expand_the_repair_yards_desc:0 ""To meet the work load, the number of workers in ship repair yards has been increased over 400 per cent since 1940. During the year ending April 1, hundreds of vessels have been armed with anti-submarine and anti-aircraft guns and have been provided with quarters for gun crews. In addition to this, thirty-one sabotaged Italian and German vessels that were seized in our ports were repaired and equipped for war operation at a cost of about $10,000,000. Sixty-five foreign-flag vessels that were requisitioned by our government were also armed and placed in good operating condition, as well as many of the 198 ships of the old, laid-up World War fleet."
USA_capital_ship_hunters:0 "Capital Ship Hunters"
USA_capital_ship_hunters_desc:0 "American submarines entered the war undermined by faulty torpedoes and cautious doctrine, but the Pacific campaign forced a radical reassessment. Freed from defective Mark XIV torpedoes after a protracted engineering scandal, the silent service became the most lethal anti-shipping force in the war. systematically dismantling Japan's merchant marine and the fleet oilers upon which the Imperial Navy depended."
USA_advanced_radar_and_fire_control_systems:0 "Advanced Radar and Fire Control Systems"
USA_advanced_radar_and_fire_control_systems_desc:0 "American surface ships carry fire control radar systems permitting accurate gunnery at ranges and in conditions of darkness that had previously rendered engagement impossible. Continued investment in radar integration and the fire control computers that translate raw data into accurate gun solutions will make the American battle fleet effectively lethal in any weather an enemy might choose."
USA_procure_the_liberty_ship:0 "Procure the Liberty Ship"
USA_procure_the_liberty_ship_desc:0 "The Liberty Ship, a simple standardised freighter with a welded hull, could be built by semi-skilled labour in a fraction of the time a conventional vessel required. American yards ultimately built over 2,700 of them, delivering cargo at a rate no submarine campaign could sink faster than industry could replace."
USA_propose_foward_naval_basing:0 "Propose Forward Naval Basing"
USA_propose_foward_naval_basing_desc:0 "A fleet operating thousands of miles from home requires forward bases: defended harbours, fuel depots, and repair facilities positioned close enough to the front to sustain continuous operations. Establishing and garrisoning these forward positions, from the Aleutians to Samoa, is the foundational precondition for any credible Pacific offensive strategy."
USA_start_the_creation_of_independant_airforce:0 "Start the Creation of Independant Airforce"
USA_start_the_creation_of_independant_airforce_desc:0 "A generation of airmen has struggled within the Army's bureaucratic structures to argue that strategic bombing can win a war without armies. The advocates of an independent air force believe only full institutional independence can give aviation the resources, doctrine, and freedom of action its potential demands. and the movement is gaining momentum."
USA_keep_the_army_air_corps:0 "Keep the Army Air Corps"
USA_keep_the_army_air_corps_desc:0 "Army ground commanders argue with force that air power divorced from ground support doctrine will chase grand strategic theories while the infantry bleeds beneath uncontested skies. Keeping aviation within the Army's command structure ensures that aircraft are deployed in direct support of ground operations. that the bomber and fighter exist to serve the soldier, not to replace him."
USA_establish_the_general_headquarter_air_force:0 "Establish the General Headquarter Air Force"
USA_establish_the_general_headquarter_air_force_desc:0 "The General Headquarters Air Force, established in 1935, placed all Army combat aircraft under a single operational headquarters for the first time. a semi-autonomous structure that gave aviation a unified chain of command capable of planning large-scale operations. It was a deliberate compromise between the full independence aviation advocates demanded and the complete ground subordination the Army preferred."
USA_give_power_to_the_bomber_mafia:0 "Give Power to the Bomber Mafia"
USA_give_power_to_the_bomber_mafia_desc:0 "The 'Bomber Mafia' of the Air Corps Tactical School developed a doctrine of breathtaking ambition: that precision bombers flying in daylight formation could systematically destroy an enemy nation's industrial infrastructure, collapsing its capacity to wage war without the need for a costly land campaign. This conviction would shape American military planning for a generation."
USA_offer_a_compromise:0 "Offer a Compromise"
USA_offer_a_compromise_desc:0 "A compromise position acknowledges the legitimate claims of both strategic bombing advocates and proponents of tactical ground support. Resources are allocated to both missions, and the Air Corps commits to a flexible, dual-capable force. accepting that an air force must be able both to attack deep enemy infrastructure and to support the soldiers below."
USA_buildforbigweek:0 "Build for "Big Week""
USA_buildforbigweek_desc:0 "Operation Argument, after the war dubbed Big Week, was a sequence of raids by the United States Army Air Forces and RAF Bomber Command from 20 to 25 February 1944, as part of the Combined Bomber Offensive against Nazi Germany. The objective of Operation Argument was to destroy aircraft factories in central and southern Germany in order to defeat the Luftwaffe before Dday"
USA_promote_combined_heavy_aircraft_operations:0 "Promote Combined Heavy Aircraft Operations"
USA_promote_combined_heavy_aircraft_operations_desc:0 "The Combined Bomber Offensive was built on the logic that RAF night bombing and USAAF daylight strikes, operating in coordination, would keep the Luftwaffe occupied around the clock and prevent the Germans from concentrating against either force alone. Promoting combined operations means investing in the joint planning infrastructure that allows two allied air forces to fight as a single instrument."
USA_theherosofthethemightyeighth:0 "The Heroes of 'The Mighty Eight'"
USA_theherosofthethemightyeighth_desc:0 "Seventeen Medals of Honor went to Eighth Air Force personnel during the war. By war's end, they had been awarded a number of other medals to include 220 Distinguished Service Crosses, and 442,000 Air Medals. Many more awards were made to Eighth Air Force veterans after the war that remain uncounted. There were 261 fighter aces in the Eighth Air Force during World War II. Thirty-one of these aces had 15 or more aircraft kills apiece. Another 305 enlisted gunners were also recognized as aces."
USA_napalm_research_breakthrough:0 "Napalm Research Breakthrough"
USA_napalm_research_breakthrough_desc:0 "In 1942, a Harvard research team led by Louis Fieser developed a revolutionary incendiary compound that clung to surfaces and burned at temperatures no water could extinguish. napalm. Applied against the highly flammable wooden construction of Japanese cities, it gave the Army Air Forces a weapon that would redefine strategic bombardment before the war's end."
USA_form_the_usaaf:0 "Form the USAAF"
USA_form_the_usaaf_desc:0 "On 20 June 1941, the Army Air Forces were established as a unified air arm, giving aviation direct access to the War Department at a level the old Air Corps had never enjoyed. Under General Henry Arnold, the AAF would grow from a modest peacetime establishment to the largest air force in history. over two million men and eighty thousand aircraft."
USA_clairechennaultsexperiance:0 "Claire Chennault's Experiance"
USA_clairechennaultsexperiance_desc:0 ""Clair Chennault has seen more combat than anyone else in the Air Force today, however limited that experience is. While serving with the Flying Tigers in China, he engaged in aerial combat with the Japanese and sent back interesting after action reports outlining his own theories on air warfare. He has stressed the significance of commanding the airspace over a battlefield."
USA_model_after_the_4th_fighter_group:0 "Model After the 4th Fighter Group"
USA_model_after_the_4th_fighter_group_desc:0 "The first squadron to destroy 300 enemy aircraft (334)\nChosen to provide fighter escort for the first England-to-Russia Shuttle bombing mission\nFlew 416 operational missions (293 in Mustangs)"
USA_side_with_the_buccaneer:0 "Side with The Buccaneer"
USA_side_with_the_buccaneer_desc:0 "As assistant air attaché to France, General George Kenney has played a critical role. He has witnessed firsthand the groundbreaking theories developed by Europe's great minds, such as Ernst Udet. He's seen the infamous Stuka and has returned home preaching the gospel of dive bombing. He believes that dive bombers have the potential to be a devastating weapon."
USA_the_perfect_stikers:0 "Strikers"
USA_the_perfect_stikers_desc:0 "The fighter-bomber emerged as one of the most versatile weapons of the war. escorting heavy bombers to their targets, then descending to strafe bridges, rail yards, and supply columns with an accuracy and ferocity that dedicated attack aircraft could not match. The P-47 Thunderbolt and P-51 Mustang proved particularly devastating in this dual role."
USA_double_down_on_fighter_armaments:0 "Double Down on Fighter Armaments"
USA_double_down_on_fighter_armaments_desc:0 "Early encounters exposed uncomfortable gaps in the firepower of American fighters. German cannon could destroy a heavy bomber in a single burst, while American pilots often needed multiple passes to bring an opponent down. Concentrating firepower through additional gun mounts and higher-calibre weapons will give American pilots the decisive advantage they need in aerial combat."
USA_a_fully_decentralised_airforce:0 "A Fully Decentralised Airforce"
USA_a_fully_decentralised_airforce_desc:0 "Rather than concentrating air power under a monolithic strategic command, a fully decentralised air force distributes aviation assets directly to the ground commanders who need them, giving each army its own organic air support. This model prioritises responsiveness over strategic mass. ensuring that every commander who needs air cover gets it, rather than waiting on a distant headquarters."
USA_achieve_victory_through_airpower:0 "Achieve Victory Through Airpower"
USA_achieve_victory_through_airpower_desc:0 "Air power's most committed advocates hold that by systematically destroying an enemy nation's industrial infrastructure and petroleum supply from altitude, a strategic air campaign can collapse its capacity and will to fight without the terrible cost of a land invasion. Whether this conviction can be vindicated against a determined, heavily defended enemy is the question the next great war will answer."
USA_expand_the_usmc:0 "Expand the USMC"
USA_expand_the_usmc_desc:0 "The United States Marine Corps has spent a generation perfecting the doctrine, vessels, and equipment needed for opposed amphibious assault. a mission most military establishments regarded as suicidal. As the Pacific war draws nearer, expanding the Corps is a strategic priority: the island-hopping campaign that will carry American arms to Japan's doorstep will demand capabilities only the Marines possess."
USA_the_us_army:0 "The US Army"
USA_the_us_army_desc:0 "The United States Army of the late 1930s was a force ill-matched to the scale of the conflicts ahead. fewer than 200,000 men, obsolete equipment, ranked seventeenth in the world. Its cadre of capable officers and tradition of improvisation were genuine assets, but the army that would plant its flag in Berlin and Tokyo was years of expansion and hard combat away."
USA_analyse_the_scw:0 "Analyse The SCW"
USA_analyse_the_scw_desc:0 "The Spanish Civil War was the first major test of the new weapons and doctrines developed since the Armistice, with every major military establishment sending observers to study it. The conclusions about close air support, artillery lethality, and armoured warfare would directly shape the doctrines deployed in the far greater conflict that followed."
USA_analyse_the_french_defeat:0 "Analyse The French Defeat"
USA_analyse_the_french_defeat_desc:0 "The fall of France stunned the world: the finest army on the continent broken in six weeks by a German offensive exploiting a gap in Allied thinking rather than any superiority in numbers. The lesson was stark: modern armoured forces, moving in concert with air support faster than any defender could respond, had transformed land warfare entirely."
 USA_analyse_french_defeat_tt:0 "§WUpgrades the §YUnited States Army§W spirit from §RUndertrained, Underfunded§W to §GAn Army Learning§W. Requires §YAnalyse The SCW§W to have been completed first."
USA_service_extension_act:0 "Service Extension Act"
USA_service_extension_act_desc:0 "When the Selective Training and Service Act was passed in 1940, draftees were limited to one year of service. By the summer of 1941, with the international situation deteriorating and a newly trained Army facing mass demobilisation, Congress was pressed to extend their terms. passing the Service Extension Act by a single, decisive vote of 203 to 202."
USA_createthewomensarmycorps:0 "Create the Women's Army Corps"
USA_createthewomensarmycorps_desc:0 "General Douglas MacArthur called the WACs "my best soldiers", adding that they worked harder, complained less and were better disciplined than men. Many generals wanted more of them and proposed to draft women but it was realized that this "would provoke considerable public outcry and Congressional opposition", and so the War Department declined to take such a drastic step. General Dwight D. Eisenhower praised the WACs by saying that, during the Second World War, women's contributions in efficiency, skill, spirit and determination were immeasurable."
USA_finish_the_final_army_reforms:0 "Finish the final Army Reforms"
USA_finish_the_final_army_reforms_desc:0 "General McNair's exhaustive evaluation of the Louisiana Maneuvers produced a roadmap to transform a Depression-era garrison force into an army capable of fighting the Wehrmacht and Imperial Japanese Army simultaneously. The reforms streamlined unit structures, replaced the square division with the triangular, overhauled logistics, and reformed officer promotion to push talented younger men into senior commands."
USA_finish_the_final_army_reforms_tt:0 "§GRemoves§! the §ROutdated, Undertrained, Underfunded§! spirit (any tier active).\n\nUpgrades the §WUnited States Army§! with the lessons of the Louisiana Maneuvers:\n+ §G25.0%§! Army Experience Gain\n+ §G25.0%§! General Promotion Cost\n+ §G10.0%§! Max Planning"
USA_initalise_the_armour_branch:0 "Initalise the Armour Branch"
USA_initalise_the_armour_branch_desc:0 "It was created provisionally in 1940 as Armored Force under the Chief of the Armored Force, Brigadier General Adna R. Chaffee, Jr. and took control of all tank units in infantry and cavalry units.\nI Armored Corps (United States) was established in 1940, and was successively commanded by Adna R. Chaffee Jr., Charles L. Scott, and George S. Patton Jr. The corps fought during Operation Torch in North Africa, but then upgraded in status to become the United States Seventh Army on 10 July 1943"
USA_develop_the_sherman_series:0 "Develop the Sherman Series"
USA_develop_the_sherman_series_desc:0 "The M4 Sherman became the Allied armoured workhorse. not the best tank in any engagement, but producible in quantities that overwhelmed German industrial capacity and simple enough to keep far more in the field than any heavier vehicle could claim. Successive upgrades aimed to address its mounting deficiencies against the Panther and Tiger."
USA_invest_into_the_transportation_corps:0 "Invest Into The Transportation Corps"
USA_invest_into_the_transportation_corps_desc:0 "Modern industrial warfare consumes materiel at unprecedented rates, and the ability to move it from factory to front line is as decisive as any weapon. Investment in the Transportation Corps' vehicle fleet, rail operations, and port management paid dividends in every theatre. ensuring American forces were among the best-supplied fighting organisations in history."
USA_give_pershing_full_support:0 "Give Pershing Full Support"
USA_give_pershing_full_support_desc:0 "By 1944 the Sherman's 75-millimetre gun was inadequate against the frontal armour of the Panther and Tiger, and the Ordnance Department accelerated work on a heavier tank. The M26 Pershing, mounting a ninety-millimetre gun, arrived in Europe in the war's final months, confirming that America had at last fielded a true heavy tank."
USA_expand_for_global_operations:0 "Expand for Global Operations"
USA_expand_for_global_operations_desc:0 "The scale of American military commitment by mid-1944 was without precedent. armies fighting simultaneously in France, Italy, and across thousands of miles of Pacific ocean, dependent on supply lines stretching back to the American continent. Maintaining this global commitment required an army whose logistics and communications were designed for operations on a truly planetary scale."
USA_prepare_for_a_large_scale_invasion:0 "Prepare for a Large Scale Invasion"
USA_prepare_for_a_large_scale_invasion_desc:0 "Planning the invasion of France required crossing the Channel against fortified beaches, landing sufficient forces to hold a beachhead against armoured counter-attack, and building the logistics infrastructure to sustain an advance across a continent. all while deceiving the enemy about the landing site. The planning for Operation Overlord became the definitive template for large-scale amphibious invasion in modern warfare."
USA_train_for_an_island_campaign:0 "Train for an Island Campaign"
USA_train_for_an_island_campaign_desc:0 "The island-hopping campaign required opposed amphibious assaults against fortified atolls, followed by brutal close-quarters fighting through jungle, cave systems, and reinforced bunkers against defenders ordered to die rather than surrender. American forces on Tarawa, Peleliu, Iwo Jima, and Okinawa paid in blood for every tactical lesson learned and then integrated."
USA_rushthefirstmbts:0 "Rush the First MBT's"
USA_rushthefirstmbts_desc:0 "The appearance of the German Panther forced a reassessment of American armoured doctrine, which had resisted heavier tanks on logistical grounds. Rushing the first generation of heavy tanks into production meant accepting greater logistical complexity in exchange for a gun and armour package finally capable of engaging the Wehrmacht's best machines on equal terms."
USA_streamline_the_sherman_family:0 "Streamline the Sherman Family"
USA_streamline_the_sherman_family_desc:0 "The Sherman's great burden was the extraordinary proliferation of variants and field modifications that accumulated as the Army attempted to address its evolving deficiencies. Streamlining the Sherman family. standardising production around the most capable configurations with consistent spare parts and maintenance procedures. reduces the logistical burden on forward workshops and keeps more tanks in the field."
USA_shatter_the_panzers_5th_generation:0 "Shatter the Panzers 5th Generation"
USA_shatter_the_panzers_5th_generation_desc:0 "The Panther and Tiger combined firepower, protection, and sophistication in a way that genuinely threatened Allied armoured formations relying on earlier-generation equipment. Breaking their dominance required better anti-tank munitions, improved fire control, tactical doctrines exploiting known vulnerabilities, and an American tank capable of engaging at ranges where its gun could penetrate."
USA_pentagon_army_tt:0 "Upgrades the §WUnited States Army§! with the centralised command structure of the new Pentagon headquarters:\n+ §G5.0%§! Max Planning (§G+15.0%§! total after Final Army Reforms)\n+ §G15.0%§! Command Power Gain"
USA_womens_army_corps_tt:0 "Upgrades the §WUnited States Army§! by opening service roles to women, expanding the available manpower pool:\n+ Conscription Factor: §R-50.0%§! -> §G-35.0%§!"
USA_the_us_army_doctrine:0 "Interwar Doctrine Review"
USA_the_us_army_army_tt:0 "Upgrades the §WUnited States Army§! with the first wave of interwar reform and modernisation:\n+ §G5.0%§! Training Time"
USA_initalise_armour_branch_army_tt:0 "Upgrades the §WUnited States Army§! as the Armored Force is formally established:\n+ Army Armour Attack: §R-15.0%§! -> §R-10.0%§! (§G+5.0%§! adjustment)"
USA_shatter_panzers_army_tt:0 "Upgrades the §WUnited States Army§! with the armoured doctrines of the Sherman and Pershing generations:\n+ Army Armour Attack: §R-10.0%§! -> §G+5.0%§! (§G+15.0%§! adjustment)\n+ §G7.5%§! Mechanised Attack\n+ §G7.5%§! Mechanised Defence"
USA_transportation_corps_army_tt:0 "Upgrades the §WUnited States Army§! with an overhaul of the transportation and logistics network:\n+ §G10.0%§! Supply Consumption"
USA_timeontarget_army_tt:0 "Upgrades the §WUnited States Army§! with the Time-on-Target fire doctrine:\n+ §G10.0%§! Artillery Attack\n+ §G5.0%§! Artillery Defence\n+ §G5.0%§! Breakthrough"
USA_fifth_army_army_tt:0 "Upgrades the §WUnited States Army§! with the combat lessons of the Fifth Army's Mediterranean campaign:\n+ §G5.0%§! Special Forces Cap"
USA_expand_usmc_army_tt:0 "Upgrades the §WUnited States Army§! with the expanded USMC establishment:\n+ §G5.0%§! Special Forces Cap\n+ §G25.0%§! Marine Special Forces Cap Contribution"
USA_prepare_large_scale_invasion_army_tt:0 "Upgrades the §WUnited States Army§! with large-scale amphibious assault planning doctrine:\n- §R50.0%§! Invasion Preparation Speed\n+ §G7.5%§! Invasion Penalty\n+ §G10.0%§! Naval Invasion Planning Speed"
USA_train_island_campaign_army_tt:0 "Upgrades the §WUnited States Army§! with intensive island-assault training:\n+ §G50.0%§! Invasion Preparation Speed\n+ §G6§! Naval Invasion Plan Capacity\n+ §G72§! Extra Marine Supply Grace (hours)"
USA_first_ssf_army_tt:0 "Upgrades the §WUnited States Army§! with the hard-won adaptability of the First Special Service Force:\n+ §G20.0%§! Hot Climate Acclimatisation Gain\n+ §G20.0%§! Cold Climate Acclimatisation Gain\n+ §G5.0%§! Terrain Penalty Reduction"
USA_army_rangers_army_tt:0 "Upgrades the §WUnited States Army§! with the doctrine and mountain-warfare expertise of the Army Rangers:\n+ §G7.5%§! Army Organisation\n+ §G25.0%§! Mountaineer Special Forces Cap Contribution\n+ §G7.5%§! Mountaineers Attack"
USA_commision_the_m29_tt:0 "Grants the §WM29 Weasel§! technology:\n+ §G25.0%§! Mountaineer Movement (all terrain)\n+ §G25.0%§! Marine Movement (all terrain)"
USA_procure_little_rock_island:0 "Procure Little Rock Island"
USA_procure_little_rock_island_desc:0 "As the Pacific campaign extended toward the Japanese home islands, every island and atoll that could serve as a staging post, airstrip, or fuel depot became strategically significant. Securing Little Rock Island adds another link in the chain of forward operating bases without which the final approach to Japan cannot be sustained."
USA_offer_invasion_advisors:0 "Offer Invasion Advisors"
USA_offer_invasion_advisors_desc:0 "American forces have accumulated irreplaceable experience across amphibious landings from North Africa to the Pacific. a body of practical knowledge about planning and executing large-scale assaults that no Allied partner can match. Offering experienced invasion advisors to partners undertaking their own contested landings exports that expertise, multiplying Allied amphibious capability across every theatre."
USA_perfect_the_timeontarget_system:0 "Perfect the Time-on-Target System"
USA_perfect_the_timeontarget_system_desc:0 "Time-on-target. the simultaneous arrival of shells from batteries across a wide front, calculated to impact a single target at the same moment. denies enemy soldiers the warning that a conventional barrage provides, concentrating maximum destructive effect into a single instantaneous burst. Perfecting the system required the communications, coordination, and training to execute with precision under the chaos of real battle."
USA_learn_from_the_fifth_army:0 "Learn from the Fifth Army"
USA_learn_from_the_fifth_army_desc:0 "he United States Fifth Army was one of the principal formations of the U.S. Army in the Mediterranean during World War II, and was the first American field army ever to be activated outside of the United States.It was officially activated on 5 January 1943 at Oujda, French Morocco and made responsible for the defence of Algeria and Morocco. It was also given the responsibility for planning the American part of the invasion of mainland Italy"
USA_first_special_service_force:0 "First Special Service Force"
USA_first_special_service_force_desc:0 "The §YFirst Special Service Force§!. the legendary §YBlack Devils§!. was an elite American-Canadian commando unit. From the cliffs of Monte la Difensa to the Anzio beachhead and the liberation of Rome, they earned a fearsome reputation for daring night raids and mountain assaults that shattered German defences others could not break."
USA_army_rangers:0 "Army Rangers"
USA_army_rangers_desc:0 "US Army Rangers were elite, specialized light infantry who spearheaded Allied invasions and executed high-risk missions in Europe and the Pacific. Key successes included scaling the cliffs at Pointe du Hoc on D-Day, capturing crucial positions in North Africa and Italy, and liberating Allied POWs, earning a reputation for elite military excellence."
USA_commision_the_m29:0 "Commision the M29"
USA_commision_the_m29_desc:0 "The M29 Weasel is a World War II tracked vehicle designed for operation in snow.Built by Studebaker, Weasels were also used in sandy, muddy, and desert terrains, including towing loads over terrain wheeled vehicles could not negotiate as in the U.S. Marine invasions of Iwo Jima and Okinawa"
USA_dennounce_the_nye_comitee:0 "Dennounce the Nye Comitee"
USA_dennounce_the_nye_comitee_desc:0 "The Nye Committee spent two years propagating the thesis that American entry into the World War had been engineered by munitions manufacturers and bankers with a financial stake in Allied victory. the 'merchants of death.' Its historical claims were far more tendentious than its popular reception suggested, and denouncing them publicly means contesting the isolationist narrative directly."
USA_look_towards_jp_morgan:0 "Look towards J.P Morgan"
USA_look_towards_jp_morgan_desc:0 "The House of Morgan's financing of Britain in 1914-1918 demonstrated that private capital could be mobilised in service of rearmament and allied assistance in ways that avoided the political conflicts direct government expenditure would provoke. Looking toward J.P. Morgan means channelling Wall Street's financial power into the national security apparatus at a moment when public spending alone cannot meet the bill."
USA_cancel_deficit_spending:0 "Cancel Deficit Spending"
USA_cancel_deficit_spending_desc:0 "The New Deal's fiscal philosophy. that the government must spend its way out of depression, even at the cost of sustained budget deficits. divided American opinion from its inception. Landon's administration holds that deficit spending is economically unsound and morally corrosive; cancelling it will restore business confidence and return the federal budget to balance."
USA_sell_off_government_control_of_the_tva:0 "Sell off Government Control of the TVA"
USA_sell_off_government_control_of_the_tva_desc:0 "The Tennessee Valley Authority's defenders hail it as proof that government can deliver cheap power where private enterprise refused; its opponents denounce it as creeping socialisation of the electric power industry. Selling off government control returns the utility to the private sector. while raising uncomfortable questions about the cheap electricity the region's industries depend upon."
USA_stopthepwasspending:0 "Stop the PWA's Spending"
USA_stopthepwasspending_desc:0 "The Public Works Administration has channelled billions into major construction projects: dams, bridges, hospitals, and public buildings. To fiscal conservatives it represents exactly the kind of extravagant expenditure that has distorted the American economy and crowded out private investment. Stopping its spending signals that the era of government as builder-of-last-resort is over."
USA_offer_subsidies_to_big_business:0 "Offer Subsidies to Big Business"
USA_offer_subsidies_to_big_business_desc:0 "Where the New Deal treated American big business as the problem, taxing its profits and regulating its practices, Landon's administration offers a fundamentally different relationship. Direct subsidies to large corporations, structured to incentivise domestic investment and employment, operate on the supply-side logic that private enterprise, properly supported, allocates capital more efficiently than any government programme."
USA_offer_subsidies_to_small_business:0 "Offer Subsidies to Small Business"
USA_offer_subsidies_to_small_business_desc:0 "The small business owner occupies a central place in the mythology of American capitalism, representing the individual enterprise that Republican tradition claims to champion. Direct subsidies through the RFC provide the credit access that Depression conditions have effectively cut off from the small operator who lacks adequate collateral. reviving a sector as much political as it is economic."
USA_reconcile_with_domestic_corporations:0 "Reconcile with Domestic Corporations"
USA_reconcile_with_domestic_corporations_desc:0 "Opens the Corporate Relations decision panel. spend Political Power to build relations with America's major industrial firms, then sign production contracts that grant sustained industrial bonuses: faster factory construction, cheaper civilian factories, and improved output. Each firm begins at Agitated and requires investment before contracts become available. Years of federal investigations and punitive taxation have poisoned Washington's relationship with big business. this focus begins the process of repairing it."
USA_appoint_dupont_to_the_tva:0 "Appoint Dupont to the TVA"
USA_appoint_dupont_to_the_tva_desc:0 "The du Pont family's industrial empire, built on the chemistry of explosives and synthetic materials, possesses engineering capabilities the Tennessee Valley Authority conspicuously lacks. Appointing du Pont executives to lead the TVA's industrial development arm would inject the commercial dynamism and chemical expertise needed to transform the Authority from a power company into a genuine industrial development agency."
USA_utilise_tva_profits:0 "Utilise TVA Profits"
USA_utilise_tva_profits_desc:0 "The Tennessee Valley Authority has grown into a financially self-sustaining enterprise generating substantial revenues from electricity sales across its seven-state service region. Directing those profits back into the Authority's own expansion programme would fund new dam construction and industrial development without requiring fresh Congressional appropriations."
USA_chrysler_sponsored_roadways:0 "Chrysler Sponsored Roadways"
USA_chrysler_sponsored_roadways_desc:0 "Chrysler Corporation has a powerful self-interested stake in the quality of American roads. more roads and better roads mean more cars sold and more revenue for Detroit. Corporate sponsorship of roadway construction advances the national highway agenda without drawing purely on federal funds, a public-private partnership that suits both the company's commercial interests and the country's infrastructure needs."
USA_give_north_american_aviation_military_contracts:0 "Give North American Aviation Military Contracts"
USA_give_north_american_aviation_military_contracts_desc:0 "North American Aviation's recurring military contracts offer Washington a discreet path around the Neutrality Acts. each contract cycle quietly places new factory capacity across the country under the guise of legitimate commercial enterprise, expanding America's military-industrial base without the political cost of open rearmament."
USA_preventthebonusarmy:0 "Prevent the "Bonus Army""
USA_preventthebonusarmy_desc:0 "In 1932, tens of thousands of World War veterans descended on Washington to demand early payment of their service bonuses, and the Hoover administration's response, routing them out with cavalry and tear gas, was a public relations catastrophe. Preventing a recurrence means meeting veterans' demands proactively before the same humiliation visits Landon's administration."
USA_contracts_towards_big_gas:0 "Contracts Towards Big Gas"
USA_contracts_towards_big_gas_desc:0 "The petroleum industry supplies not merely fuel for the nation's transport system, but the aviation gasoline, lubricants, and chemical feedstocks upon which every branch of the military depends. Directing federal procurement contracts toward the major oil companies creates a stable revenue stream incentivising domestic exploration and refinery investment, ensuring petroleum capacity grows in step with military and industrial demand."
USA_secured_domestic_economic_growth:0 "Secured Domestic Economic Growth"
USA_secured_domestic_economic_growth_desc:0 "Tax relief, corporate reconciliation, and targeted subsidies have begun to yield a cautious but genuine recovery in business investment and a slow decline in unemployment. Securing that growth means maintaining the conditions that produced it. fiscal responsibility, predictable regulation, and a government that sees private enterprise as a partner rather than an adversary."
USA_civil_construction_corps:0 "Civil Construction Corps"
USA_civil_construction_corps_desc:0 "Drawing on the precedent of the Civilian Conservation Corps, the Civil Construction Corps deploys federal labour to build the roads, bridges, and utility connections the private market has been too depressed to fund. Structured around infrastructure projects with clear long-term returns, it trains workers in practical construction skills while delivering real assets to the communities that host them."
USA_continued_tax_breaks_for_big_business:0 "Continued Tax Breaks for Big Business"
USA_continued_tax_breaks_for_big_business_desc:0 "Roosevelt's Revenue Act of 1935 imposed steep increases on high incomes and large corporate earnings, producing howls of protest from the business community. Landon's administration maintains and extends tax relief on the argument that capital freed from heavy taxation will be reinvested in productive enterprise. generating more economic activity than the punitive New Deal rates ever could."
USA_december71941adatewhichwillliveininfamy:0 "December 7 1941 a date which will live in infamy..."
USA_december71941adatewhichwillliveininfamy_desc:0 "At 7:55 on a quiet Sunday morning, 353 Japanese aircraft fell upon the Pacific Fleet at anchor in Pearl Harbor. sinking or damaging eighteen warships, destroying 188 aircraft, and killing 2,403 Americans in less than two hours. The next day, Roosevelt asked Congress for a declaration of war and the United States entered the Second World War."
USA_day_of_infamy_available_tt:0 "Japan has attacked Pearl Harbor"
USA_war_productions_board:0 "War Productions Board"
USA_war_productions_board_desc:0 "In 1942–1945, WPB supervised the production of $183 billion worth of weapons and supplies, about 40 percent of the world output of munitions. The UK, the USSR, and other allies produced an additional 30 percent, while the Axis produced only 30 percent. One fourth of the US output was warplanes; one fourth was warships. Meanwhile, the civilian standard of living was about level."
USA_transform_ford_and_gm:0 "Transform Ford and GM"
USA_transform_ford_and_gm_desc:0 "Ford's Willow Run plant eventually produced a complete B-24 Liberator bomber every hour. General Motors reconfigured its vast network of assembly plants overnight to produce tanks, aircraft engines, and artillery shells in quantities no other economy could approach. Transforming the automotive giants into war manufacturers was an act of industrial improvisation done in months rather than the years planners had thought it would require."
 USA_transform_gm_upgrade_tt:0 "§WUpgrades the §YGeneral Motors§W industrial concern to §YGeneral Motors (War Production)§W. Replaces the base concern with an improved version granting §G+15%§W Factory Output. If General Motors is already hired, the upgrade is applied automatically."
USA_office_of_war_mobilisation:0 "Office of War Mobilisation"
USA_office_of_war_mobilisation_desc:0 "By mid-1943, competing wartime agencies had created a bureaucratic tangle no single department could manage alone. The Office of War Mobilization, established under former Supreme Court Justice James Byrnes, cut through it with sweeping authority to coordinate all domestic war production. earning Byrnes the unofficial title of 'Assistant President' as he mediated the conflicts threatening to undermine the mobilisation."
USA_expand_detroit_arsnel_tank_plant:0 "Expand Detroit Arsenal Tank Plant"
USA_expand_detroit_arsnel_tank_plant_desc:0 "The Detroit Arsenal Tank Plant, constructed in 1940 by Chrysler Corporation, was purpose-built for mass-producing military tanks at speeds no traditional armaments manufacturer could achieve. Chrysler applied automobile production line techniques to Sherman assembly with results that astonished military planners. at its peak, the Arsenal produced tanks faster than the Army could crew them."
USA_lockheedsadvanceddevelopmentprograms:0 "Lockheed's Advanced Development Programs"
USA_lockheedsadvanceddevelopmentprograms_desc:0 "Lockheed's Advanced Development Programs (ADP) during WWII, officially born in 1943, created the XP-80 Shooting Star, America's first jet fighter, in just 143 days. Led by Clarence "Kelly" Johnson, this small, specialized team—later famous as Skunk Works—operated with high autonomy to quickly develop advanced, secret military aircraft, laying the groundwork for rapid engineering innovation."
USA_issue_war_bonds:0 "Issue War Bonds"
USA_issue_war_bonds_desc:0 "The Treasury's war bond programme raised over 185 billion dollars through the sale of Series E bonds to Americans at every income level. from factory workers buying fifty-dollar bonds through payroll deduction to wealthy individuals purchasing tens of thousands at once. The bonds raised money for the war while mopping up excess consumer spending that would otherwise have driven wartime inflation."
USA_war_powers_act:0 "War Powers Act"
USA_war_powers_act_desc:0 "The First War Powers Act, signed eleven days after Pearl Harbor, transferred sweeping legislative authority to the executive branch for the duration of the war. empowering the President to reorganise agencies, accelerate procurement, and allocate resources with a flexibility peacetime law would never permit. A Second Act followed in March 1942, further expanding presidential authority over the wartime economy."
USA_office_of_war_information:0 "Office Of War Information"
USA_office_of_war_information_desc:0 "The Office of War Information, established in June 1942 under broadcast journalist Elmer Davis, consolidated the government's scattered propaganda activities into a single coordinated agency. The OWI produced pamphlets, posters, radio broadcasts, and newsreels designed to sustain public morale, encourage sacrifice, and promote bond purchases."
USA_manifest_destiny:0 "Manifest Destiny"
USA_manifest_destiny_desc:0 "The conviction that the United States is destined to extend its influence across the world resurfaces in wartime not as territorial conquest but as global responsibility. the idea that an America of unprecedented power and democratic virtue has both the right and the obligation to shape the postwar world in its own image."
USA_total_peacetime_support_for_the_allies:0 "Total Peacetime Support for the Allies"
USA_total_peacetime_support_for_the_allies_desc:0 "Willkie was a forceful and outspoken advocate of aid to the Allies of World War II, especially the United Kingdom. His support of giving all aid to the British "short of declaring war" won him the support of many Republicans on the East Coast of the United States, who disagreed with their party's isolationist leaders in Congress."
USA_support_from_the_cio:0 "Support from the CIO"
USA_support_from_the_cio_desc:0 "The Congress of Industrial Organizations had become one of the most powerful political organisations in the Democratic coalition, delivering millions of votes in every election cycle. Securing the CIO's active support for the war effort means bringing organised industrial labour into partnership with the government and ensuring that wartime production is not disrupted by the labour strife that plagued the 1930s."
USA_good_neighbor_policy:0 "Good Neighbour Policy"
USA_good_neighbor_policy_desc:0 "A cornerstone of Willkie's foreign policy, the Good Neighbour Policy reaffirms American commitment to non-intervention and mutual respect across the Western Hemisphere. In practice, it means investing directly in the industrial capacity of allied and friendly nations. British Columbia, Baja California, and Pernambuco each receive a wave of American-backed civilian construction, deepening economic ties and cementing the hemisphere as a unified bloc."
USA_good_neighbor_policy_civs_tt:0 "§WBuilds §Y5 Civilian Factories§W in each of the following states:\n §YBritish Columbia§W (Canada)\n §YBaja California§W (Mexico)\n §YPernambuco§W (Brazil)"
USA_operation_torch:0 "Operation Torch"
USA_operation_torch_desc:0 "The first major US amphibious operation in the Mediterranean, landing in Morocco and Algeria to push German and Italian forces toward Tunisia."
USA_arcadia_conference:0 "Arcadia Conference"
USA_arcadia_conference_desc:0 "held in Washington, D.C., from December 22, 1941, to January 14, 1942. President Roosevelt of the United States and Prime Minister Churchill of the United Kingdom attended the conference. Major decisions included making the defeat of Germany the highest war priority and the establishment of a Combined Chiefs of Staff to coordinate US and British military planning. Representatives of the Allies adopted the Declaration by United Nations, which committed them to make no separate peace with the enemy, and to employ their full resources until victory."
 USA_begin_the_lend_lease_act:0 "Begin the Lend-Lease Act"
 USA_begin_the_lend_lease_act_desc:0 "With Britain fighting alone against Nazi Germany and American public opinion still wary of direct involvement, Roosevelt has found a way to keep democracy's arsenal open without sending troops. The Lend-Lease Act, signed into law in March 1941, allows the United States to loan, lease, or transfer war material to any nation whose defence the President deems vital to American security. bypassing the cash-and-carry restrictions that had hamstrung Allied procurement. It is not a declaration of war. But it is a declaration of intent."
USA_executive_office_of_the_president:0 "Executive Office of the President"
USA_executive_office_of_the_president_desc:0 "The Brownlow Committee concluded that 'the President needs help'. and that the administrative apparatus available to an executive responsible for millions of employees was wholly inadequate. The Executive Office of the President, established in 1939, created a formal institutional structure around the presidency for the first time, transforming it from a personal operation into a functioning executive institution."
USA_kaiserrine_pass:0 "Kaiserrine Pass"
USA_kaiserrine_pass_desc:0 "In February 1943, Rommel's forces drove through the passes of the Western Dorsal mountains in Tunisia, routing the US II Corps and pushing them back fifty miles. the most humiliating American defeat of the war. The disaster exposed grave deficiencies in command and tactics; Eisenhower replaced Fredendall with Patton, and the survivors emerged as battle-hardened veterans."
USA_operation_husky:0 "Operation Husky"
USA_operation_husky_desc:0 "The Allied invasion of Sicily, marking the first entry onto the Italian homeland and prompting the downfall of Mussolini."
USA_operation_avalanche:0 "Operation Avalanche"
USA_operation_avalanche_desc:0 "US Fifth Army landed at Salerno"
USA_operation_dragoon:0 "Operation Dragoon"
USA_operation_dragoon_desc:0 "The invasion of Southern France, which linked up with forces pushing up from Italy."
USA_operatation_overlord:0 "Operatation Overlord"
USA_operatation_overlord_desc:0 "The massive Allied invasion of Normandy, France. (DDAY)"
USA_operation_manna:0 "Operation Manna"
USA_operation_manna_desc:0 "Greece has suffered under Axis occupation since 1941. Now Allied forces move to restore its freedom. landing across Attica, the Peloponnese, Crete, the Dodecanese and the Aegean Islands to drive out the last German and Italian garrisons and return the Eastern Mediterranean to Allied hands."
USA_victory_in_africa:0 "Victory in Africa"
USA_victory_in_africa_desc:0 "The last Axis forces in Africa have been expelled. From Morocco to Egypt, the Mediterranean's southern shore belongs to the Allies. a strategic foundation from which to strike at the underbelly of Europe."
USA_control_the_phillippines:0 "Control The Philippines"
USA_control_the_phillippines_desc:0 "MacArthur has returned. From Leyte Gulf to Manila Bay, American forces are driving the Japanese from every island in the archipelago. fulfilling the pledge made on the beaches of Bataan."
USA_operation_iceberg:0 "Operation Iceberg"
USA_operation_iceberg_desc:0 "The road to Tokyo runs through a thousand miles of contested ocean. From Guam to Wake Island, Saipan to Palau, American forces must wrest each island from fanatical Japanese defenders at terrible cost. but every atoll taken brings the Pacific Fleet one step closer to striking range of the Japanese home islands."
USA_operation_causeway:0 "Operation Causeway"
USA_operation_causeway_desc:0 "As American forces prepared for the final advance on Japan, an intense strategic debate erupted over the route of approach. Operation Causeway proposed seizing Formosa rather than liberating the Philippines, arguing a Formosa base would cut Japan's supply lines more completely. The debate was ultimately resolved in MacArthur's favour and Causeway was shelved."
USA_break_the_initative:0 "Break the Initative"
USA_break_the_initative_desc:0 "Through the first year of the Pacific war, Japan held the strategic initiative, dictating the tempo of operations and forcing the Allies into a reactive posture. Breaking that initiative demanded offensive operations that would compel Japanese forces to respond to American moves. The battles of Midway and Guadalcanal marked the turning point. Japan never regained it."
USA_prepare_invasion_regions:0 "Prepare Invasion Regions"
USA_prepare_invasion_regions_desc:0 "The planning for Operation Downfall divided the assault on Japan into two massive sequential operations targeting Kyushu and then the Kanto plain outside Tokyo. Each region required months of hydrographic surveys, intelligence on Japanese defences, and the pre-positioning of hundreds of thousands of tons of supplies. with casualty estimates running into the hundreds of thousands."
USA_operation_downfall:0 "Operation Downfall"
USA_operation_downfall_desc:0 "Operation Downfall, the planned invasion of the Japanese home islands, called for over five million Allied troops in two sequential operations targeting Kyushu and then Tokyo. Japanese planners had stationed over two million defenders on Kyushu alone. The atomic bombs of August 1945 rendered it unnecessary, sparing casualties that planners estimated would exceed every previous Pacific campaign combined."
