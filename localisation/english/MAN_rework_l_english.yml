l_english:
 MAN_industrial_behemoth:0 "Industrial Behemoth of the East"
 MAN_industrial_behemoth_desc:0 "Manchukuo is to become the industrial heart of the Empire — whatever the cost in blood, treasure and coerced labor."
 MAN_old_tax_system:0 "The Old Tax System"
 MAN_old_tax_system_desc:0 "The new state inherited the antiquated, graft-ridden tax apparatus of the old Fengtian clique. Revenue trickles in through a maze of warlord-era levies and corrupt collectors, starving the government of funds."
 MAN_multinational_state:0 "Multinational State"
 MAN_multinational_state_desc:0 "Han, Manchu, Mongol, Korean and Japanese all live under the banner of the 'Concordia of Nationalities' — but in truth there is little shared loyalty to the new regime, and every community pulls in its own direction."
 MAN_influence_of_japanese_corporations:0 "Influence of Japanese Corporations"
 MAN_influence_of_japanese_corporations_desc:0 "The Japanese zaibatsu and the South Manchuria Railway Company run Manchukuo's economy for the benefit of the homeland. Goods, capital and industry flow east to the overlord on terms set in Tokyo."
 MAN_dream_of_a_great_pan_asian_nation_state:0 "Dreams of a Great Pan-Asian Nation State"
 MAN_dream_of_a_great_pan_asian_nation_state_desc:0 "To its true believers, Manchukuo is the prototype of a new Asia — a modern, harmonious state that will lead the continent into the future. That faith drives the bureaucracy to extraordinary efforts."
 MAN_south_manchuria_railway_company:0 "South Manchuria Railway Company"
 MAN_south_manchuria_railway_company_desc:0 "The Mantetsu is far more than a railway: a colossal state-backed conglomerate that builds, surveys and administers across Manchuria. Its engineering arm can be turned to any construction project the state demands."
 MAN_mange_concern:0 "Mange Concern"
 MAN_mange_concern_desc:0 "The Manchurian Industrial Development Company (Mangyo) was created to concentrate Manchukuo's heavy industry under a single holding company. Its vast construction division throws up factories, mines and dams across the territory."
 MAN_first_five_year_plan_cat:0 "The First Five-Year Plan"
 MAN_first_five_year_plan_cat_desc:0 "Drafted by the Kwantung Army's planners and executed by Mangyo and Mantetsu, the first Five-Year Plan will turn Manchuria into an industrial base — at breakneck speed and ruinous human cost."
 MAN_second_five_year_plan_cat:0 "The Second Five-Year Plan"
 MAN_second_five_year_plan_cat_desc:0 "The second plan abandons all pretense: every furnace, mine and assembly line now serves the war machine."
 MAN_eco_spirit_changed_tt: "Modify §YIndustrial Behemoth of the East§! by:"
 MAN_fyp_tab_unlocked_tt: "§GUnlocks the §YIndustrial Behemoth of the East§G decision tab — the First Five-Year Plan§!"
 MAN_syp_tab_unlocked_tt: "§GUnlocks the §YSecond Five-Year Plan§G decisions§!"
 MAN_mantetsu_founded_tt: "§GThe §YSouth Manchuria Railway Company (Mantetsu)§G is founded and can be developed§!"
 MAN_mangyo_founded_tt: "§GThe §YManchurian Industrial Development Company (Mangyō)§G is founded and can be developed§!"
 MAN_fyp_progress_20_tt: "§GFirst Five-Year Plan progress: +20%§!"
 MAN_syp_progress_20_tt: "§GSecond Five-Year Plan progress: +20%§!"
 MAN_behemoth_risk_tt: "§RRisk of an industrial accident§!"
 MAN_behemoth_high_risk_tt: "§RHigh risk of an industrial accident§!"
 MAN_second_fyp_unlocked_tt: "§GThe Second Five-Year Plan is now available§!"
 MAN_fyp_showa_steel: "Expand the Showa Steel Works"
 MAN_fyp_showa_steel_desc: "The blast furnaces of Anshan are the largest in Asia outside Japan. The plan calls for their output to double."
 MAN_fyp_fushun_fuel: "Fushun Coal Liquefaction Plant"
 MAN_fyp_fushun_fuel_desc: "The open-pit mine at Fushun feeds a new coal liquefaction works — synthetic fuel for an empire without oil."
 MAN_fyp_fushun_fuel_tt: "§GSynthetic Refinery Construction Speed: +10%§!"
 MAN_fyp_benxihu: "The Benxihu Coal and Iron Company"
 MAN_fyp_benxihu_desc: "The coal seams and iron works at Benxi are driven ever deeper and ever harder. The miners whisper that the pits are death traps."
 MAN_fyp_benxihu_tt: "§GResource Gain Efficiency: +2%§!"
 MAN_fyp_dowa_auto: "The Dowa Automobile Plant"
 MAN_fyp_dowa_auto_desc: "Mukden's Dowa works will assemble trucks for the army and tractors for the colonization companies."
 MAN_fyp_dowa_auto_tt: "§GProduction Efficiency Gain: +2%§!"
 MAN_fyp_mamc: "The Manchuria Aeroplane Manufacturing Company"
 MAN_fyp_mamc_desc: "MAMC of Harbin will license-build aircraft for the Kwantung Army — the first step toward a Manchurian aviation industry."
 MAN_fyp_sungari_dams: "Dam the Sungari"
 MAN_fyp_asia_express: "The Asia Express"
 MAN_fyp_asia_express_desc: "The Asia Express streaks from Dairen to Hsinking at 130 km/h — the fastest train in Asia and a rolling advertisement for the new state. Extending the line means laying first-class track the length of the Mantetsu mainline."
 MAN_fyp_asia_express_tt: "§GInfrastructure Construction Speed: +5%§!"
 MAN_fyp_sungari_dams_desc: "The colossal dams at Fengman and Shuifeng will electrify all Manchuria. Tens of thousands of laborers toil in the gorges; many will not return."
 MAN_fyp_sungari_dams_tt: "§GCivilian Factory Construction Speed: +5%§!"
 MAN_fyp_emergency_quotas: "Emergency Production Quotas"
 MAN_fyp_emergency_quotas_desc: "Lengthen shifts, conscript labor, and ignore every safety regulation. The plan's targets will be met."
 MAN_fyp_emergency_quotas_tt: "§GConstruction Speed: +3%§!, §RConsumer Goods: +0.5%§!"
 MAN_syp_anshan_expansion: "Anshan at Full Capacity"
 MAN_syp_anshan_expansion_desc: "New rolling mills and a second ring of furnaces push the Showa Steel Works beyond its design limits."
 MAN_syp_dowa_tank: "The Dowa Tank Plant"
 MAN_syp_dowa_tank_desc: "Dowa's assembly halls are converted to produce armor for the Kwantung Army."
 MAN_syp_light_metals: "The Manchurian Light Metals Society"
 MAN_syp_light_metals_desc: "Aluminum for airframes, magnesium for incendiaries — the light metals combine feeds the air war."
 MAN_syp_steel_rolling: "Massive Increase in Steel Rolling"
 MAN_syp_steel_rolling_desc: "Every mill runs around the clock. Quotas rise monthly; the workers' rations do not."
 MAN_syp_steel_rolling_tt: "§GFactory Output: +3%§!, §GProduction Efficiency Cap: +2%§!, §RConsumer Goods: +0.5%§!"
 MAN_syp_expand_mamc: "Expand MAMC"
 MAN_syp_expand_mamc_desc: "Harbin's aircraft works grow into a true arsenal, assembling fighters for the homeland's defense."
 MAN_syp_expand_mamc_tt: "§GMilitary Factory Construction Speed: +5%§!"
 MAN_syp_agriculture: "Focus on Agriculture"
 MAN_syp_agriculture_desc: "A rare concession to reality: soybeans, wheat and rice quotas are eased, and the countryside breathes again."
 MAN_syp_agriculture_tt: "§GConsumer Goods: -0.5%§!, §GStability: +1%§!"
 man_behemoth.1.t: "The First Five-Year Plan Concludes"
 man_behemoth.1.d: "Against every prediction — and over a mountain of corpses and broken machinery — the first Five-Year Plan has met its targets. Manchuria's furnaces light the night sky. The planners are already drafting the second plan."
 man_behemoth.1.a: "The behemoth stirs"
 man_behemoth.1.tt: "§GFactory Output: +5%§!"
 man_behemoth.2.t: "The Second Five-Year Plan Concludes"
 man_behemoth.2.d: "Manchuria now out-produces most of Europe. What was frontier scrubland fifteen years ago is a landscape of furnaces, dams and assembly lines — the Industrial Behemoth of the East."
 man_behemoth.2.a: "The behemoth marches"
 man_behemoth.2.tt: "§GFactory Output: +5%§!, §GProduction Efficiency Cap: +3%§!"
 man_behemoth.31.t: "Accident at the Works"
 man_behemoth.31.d: "A gas explosion tears through a night shift. The bodies are carried out in silence; the quota is unchanged by morning."
 man_behemoth.31.a: "The plan must continue"
 man_behemoth.32.t: "Disaster at the Works"
 man_behemoth.32.d: "Catastrophe — a chain of explosions levels an entire plant, killing thousands of workers. The censors suppress the story, but the smoke can be seen for fifty kilometers."
 man_behemoth.32.a: "Bury them and rebuild"
 man_behemoth.32.tt: "§RA Civilian Factory is destroyed in Manchuria§!"
 MAN_fyp_kirin_aluminium: "Kirin Aluminium Deposits"
 MAN_fyp_kirin_aluminium_desc: "Shale surveys in Kirin province promise alumina for the light metals industry."
 MAN_fyp_chahar_ores: "Chahar Ore Surveys"
 MAN_fyp_chahar_ores_desc: "Geologists comb the Chahar frontier for tungsten and coal seams."
 MAN_fyp_liaotung_iron: "Liaotung Iron Surveys"
 MAN_fyp_liaotung_iron_desc: "New iron workings open along the Liaotung ridge to feed Anshan's furnaces."
 MAN_fyp_oil_surveys: "Oil Surveys on the Manchurian Plain"
 MAN_fyp_oil_surveys_desc: "The Empire is desperate for crude. Drilling teams probe the Manchurian basin — most experts insist there is nothing down there."
 MAN_fyp_oil_surveys_tt: "§YA small chance to strike oil§!"
 MAN_fyp_dairen_dockyards: "The Dairen Dockyards"
 MAN_fyp_dairen_dockyards_desc: "Expand the shipyards of Dairen to service the merchant traffic of the Kwantung Leased Territory."
 MAN_fyp_settler_workforce: "Japanese Settler Workforce"
 MAN_fyp_settler_workforce_desc: "Trained workers and foremen from the Home Islands settle in the new industrial cities — and take every skilled position from the locals."
 MAN_fyp_settler_workforce_tt: "§GProduction Efficiency Gain: +2%§!"
 MAN_fyp_mantetsu_research: "The Mantetsu Research Unit"
 MAN_fyp_mantetsu_research_desc: "The South Manchuria Railway's famed research department is expanded into a full scientific institute."
 MAN_fyp_industrial_studies: "Industrial Studies Commission"
 MAN_fyp_industrial_studies_desc: "Engineers tour the plants of Japan, Germany and America, returning with notebooks full of methods to copy."
 MAN_syp_mantetsu_mainline: "Double-Track the Mantetsu Mainline"
 MAN_syp_mantetsu_mainline_desc: "The arteries of Manchuria are doubled, signaled, and fortified — the largest railway project in Asia."
 MAN_syp_mantetsu_mainline_tt: "§GInfrastructure Construction Speed: +5%§!"
 MAN_syp_powder_company: "The Manchurian Powder Company"
 MAN_syp_powder_company_desc: "Explosives, propellants and small-arms ammunition — manufactured at speed, by conscripts, with predictable results."
 MAN_syp_aviation_research: "Aviation Research Programme"
 MAN_syp_aviation_research_desc: "MAMC's engineers move from license assembly to original design work."
 MAN_syp_mass_labor: "Mass Labor Conscription"
 MAN_syp_mass_labor_desc: "Every able-bodied man within reach is assigned a quota. The construction sites never sleep — and never stop burying."
 MAN_syp_mass_labor_tt: "§GConstruction Speed: +5%§!, §RConsumer Goods: +0.5%§!"
 man_behemoth.33.t: "Oil on the Manchurian Plain"
 man_behemoth.33.d: "Against the unanimous opinion of the Empire's geologists, a survey rig on the Nen river plain has struck oil. The strategic implications are staggering."
 man_behemoth.33.a: "The Empire will drink deep"
