l_english:
 SAF_support_the_policy_of_appeasement:0 "Emergency National Cabinet"
 SAF_support_the_policy_of_appeasement_desc:0 "The old structure cannot manage a global crisis. A compact wartime cabinet will set the priorities for every department."
 SAF_war_measures_act:0 "War Measures Act"
 SAF_war_measures_act_desc:0 "Emergency legislation unlocks national mobilization and gives each ministry a clear wartime mandate."

 SAF_political_reconstruction:0 "Political Reconstruction Office"
 SAF_political_reconstruction_desc:0 "The political apparatus must be rebuilt to prevent paralysis between competing blocs."
 SAF_commonwealth_alignment:0 "Commonwealth Alignment Line"
 SAF_commonwealth_alignment_desc:0 "Leaning into the imperial framework offers immediate security and diplomatic leverage."
 SAF_sovereign_mandate:0 "Sovereign Mandate Line"
 SAF_sovereign_mandate_desc:0 "A stronger independent mandate gives Pretoria room to bargain and pursue local priorities."
 SAF_parliamentary_settlement:0 "Parliamentary Settlement"
 SAF_parliamentary_settlement_desc:0 "Even rival factions can be bound into a workable constitutional settlement for the war effort."
 SAF_constitutional_compromise:0 "Constitutional Compromise"
 SAF_constitutional_compromise_desc:0 "A final compromise reduces internal friction and lets policy flow through stable institutions."

 SAF_emergency_workers:0 "Emergency Workers Scheme"
 SAF_emergency_workers_desc:0 "A direct labor mobilization program can stabilize output and keep strategic sectors running."
 SAF_gold_and_steel_board:0 "Gold and Steel Board"
 SAF_gold_and_steel_board_desc:0 "A board dominated by mining and steel interests prioritizes immediate military throughput."
 SAF_state_power_commission:0 "State Power Commission"
 SAF_state_power_commission_desc:0 "A state-directed commission focuses on durable civilian capacity and long-term resilience."
 SAF_national_industrial_plan:0 "National Industrial Plan"
 SAF_national_industrial_plan_desc:0 "Both heavy industry and state planning are merged into one coordinated national program."
 SAF_cape_supply_hubs:0 "Cape Supply Hubs"
 SAF_cape_supply_hubs_desc:0 "Infrastructure and depot planning around the Cape secures national logistics under pressure."

 SAF_defence_reform_staff:0 "Defence Reform Staff"
 SAF_defence_reform_staff_desc:0 "The armed forces require a modern general staff before any doctrine can succeed."
 SAF_cape_corps_revival:0 "Cape Corps Revival"
 SAF_cape_corps_revival_desc:0 "A territorial manpower-heavy model emphasizes garrison strength and homeland depth."
 SAF_professional_field_force:0 "Professional Field Force"
 SAF_professional_field_force_desc:0 "A smaller professional core emphasizes training, command quality, and sustained combat value."
 SAF_mobile_columns:0 "Mobile Columns Doctrine"
 SAF_mobile_columns_desc:0 "Motorized columns and rapid redeployment offer flexibility across vast African theaters."
 SAF_army_integration_command:0 "Army Integration Command"
 SAF_army_integration_command_desc:0 "Competing concepts are unified into one command system that can actually fight jointly."
 SAF_modern_battle_plan:0 "Modern Battle Plan"
 SAF_modern_battle_plan_desc:0 "Staff coordination and support arms are integrated into a coherent modern operational doctrine."

 SAF_air_planning_board:0 "Air Planning Board"
 SAF_air_planning_board_desc:0 "A central planning board allocates scarce aircraft, pilots, and fuel with strategic discipline."
 SAF_interceptor_command:0 "Interceptor Command"
 SAF_interceptor_command_desc:0 "Fighter concentration protects key industry, ports, and troop concentrations from enemy air raids."
 SAF_tactical_support_wing:0 "Tactical Support Wing"
 SAF_tactical_support_wing_desc:0 "Close support doctrine ties the air arm directly to ground operations and breakthrough timing."
 SAF_common_air_doctrine:0 "Common Air Doctrine"
 SAF_common_air_doctrine_desc:0 "Air superiority and tactical support are merged into one practical doctrine for mixed operations."
 SAF_airfield_network:0 "Airfield Network"
 SAF_airfield_network_desc:0 "A robust network of fields and support facilities gives the air arm strategic endurance."

 SAF_coastal_command:0 "Coastal Command"
 SAF_coastal_command_desc:0 "The navy's first duty is to secure the Cape route and deny easy access to hostile raiders."
 SAF_convoy_defence_fleet:0 "Convoy Defence Fleet"
 SAF_convoy_defence_fleet_desc:0 "Escort-heavy doctrine prioritizes merchant protection and anti-submarine screening."
 SAF_raider_patrol_group:0 "Raider Patrol Group"
 SAF_raider_patrol_group_desc:0 "Aggressive patrol groups seek to disrupt hostile logistics before they can threaten the Cape."
 SAF_cape_sea_doctrine:0 "Cape Sea Doctrine"
 SAF_cape_sea_doctrine_desc:0 "Defensive escort logic and offensive patrol logic are fused into a tailored regional doctrine."
 SAF_naval_logistics_bureau:0 "Naval Logistics Bureau"
 SAF_naval_logistics_bureau_desc:0 "A dedicated bureau improves fleet maintenance cycles, supply control, and sustained operations."

