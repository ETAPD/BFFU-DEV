 SAF_special_forces_command:0 "Special Forces Command"
 SAF_special_forces_command_desc:0 "Special forces are a South African specialty, and a dedicated command is established to train and deploy elite units for deep raids, reconnaissance, and strike across the African theater."
 SAF_commando_training_schools:0 "Commando Training Schools"
 SAF_commando_training_schools_desc:0 "Commando training is a South African specialty, and dedicated schools are established to train troops in the art of survival, stealth, and strike in the harsh African terrain."
 SAF_long_range_patrol_groups:0 "Long Range Patrol Groups"
 SAF_long_range_patrol_groups_desc:0 "Long range patrol groups are a South African specialty, designed to operate across the open desert and veld. These fast-moving units conduct reconnaissance, screen advances, and strike at vulnerable flanks in the harsh African terrain."
 SAF_armored_car_program:0 "Armored Car Program"
 SAF_armored_car_program_desc:0 "Armored cars are a South African specialty, designed for speed and endurance across the harsh African terrain. These vehicles are lightly armored but highly mobile, perfect for reconnaissance and hit-and-run tactics in the desert."
 SAF_desert_recon_columns:0 "Desert Recon Columns"
 SAF_desert_recon_columns_desc:0 "Desert recon columns are a South African specialty, designed to operate across the open desert and veld. These fast-moving units conduct reconnaissance, screen advances, and strike at vulnerable flanks in the harsh African terrain."
 SAF_armored_screen_doctrine:0 "Armored Screen Doctrine"
 SAF_armored_screen_doctrine_desc:0 "Armored screens are a key part of mobile warfare in the African theater. This doctrine emphasizes the use of light armored vehicles to protect flanks, screen advances, and conduct reconnaissance in the open desert and veld."
 SAF_mobile_recon_tactics:0 "Mobile Recon Tactics"
 SAF_mobile_recon_tactics_desc:0 "Mobile recon is a South African specialty, and new tactics are developed to maximize the effectiveness of fast-moving patrols across the desert and veld."
 SAF_desert_jackal_armoured_cars:0 "Desert Jackal Armoured Cars"
 SAF_desert_jackal_armoured_cars_desc:0 "Desert Jackal armoured cars are a South African specialty, designed for speed and endurance across the harsh African terrain. These vehicles are lightly armored but highly mobile, perfect for reconnaissance and hit-and-run tactics in the desert."
 SAF_army_signals_school:0 "Army Signals School"
 SAF_army_signals_school_desc:0 "Army communications are critical in the vast African theater. A dedicated signals school trains operators in the latest radio and encryption technology to maintain command and control across the veld."
 SAF_integrated_supply_command:0 "Integrated Supply Command"
 SAF_integrated_supply_command_desc:0 "Integrated supply and logistics command improves the army’s ability to sustain operations across the vast African theater."
 SAF_airborne_training_detachments:0 "Airborne Training Detachments"
 SAF_airborne_training_detachments_desc:0 "Airborne forces are a powerful tool for rapid response and deep strikes. Specialized training detachments prepare troops for the unique challenges of airborne operations in the African theater."
 SAF_bush_warfare_instructors:0 "Bush Warfare Instructors"
 SAF_bush_warfare_instructors_desc:0 "Bush warfare is a South African specialty. Instructors are sent to train troops in the art of survival, stealth, and strike in the harsh African terrain."
 SAF_south_african_special_forces:0 "South African Special Forces"
 SAF_south_african_special_forces_desc:0 "The legacy of the commandos endures, but resources are scarce. Only a select number of elite units can be maintained, each one carefully chosen and highly trained."
