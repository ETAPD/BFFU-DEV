 #CAPFOCUSSES
 SAF_capitulated:0 "The Union Falls"
 SAF_capitulated_desc:0 "The Union of South Africa has collapsed under Axis pressure. Enemy banners now fly over the veld, and the government has been forced into submission."
 
 SAF_sabotage_the_occupiers:0 "Sabotage The Occupiers"
 SAF_sabotage_the_occupiers_desc:0 "The occupation is a bitter pill, but the spirit of resistance endures. Saboteurs strike at supply lines, communication networks, and enemy infrastructure across the country."

 SAF_reorganizing_the_army:0 "Reforming the Union Defence Force"
 SAF_reorganizing_the_army_desc:0 "With Pretoria in chaos and command shattered, the Union Defence Force must be rebuilt from the ground up. Loyal officers and hardened commandos rally to restore discipline and order."

 SAF_rebuilding_the_civillian_industry:0 "Rekindling the Home Front"
 SAF_rebuilding_the_civillian_industry_desc:0 "From Cape Town’s docks to the mines of the Rand, the civilian economy lies in ruin. A united national effort begins to restore industry, transport, and the lifeblood of the Union."

 SAF_rebuilding_the_civillian_industry_2:0 "Forging the Union’s Recovery"
 SAF_rebuilding_the_civillian_industry_2_desc:0 "The rebuilding continues as factories return to life and supply lines stretch once more across the veld. The Union stands determined to reclaim its economic strength."

 SAF_rebuilding_the_military_industry:0 "Rearming the Union"
 SAF_rebuilding_the_military_industry_desc:0 "South Africa’s war industry has been crippled. Workshops, arsenals, and training grounds must be restored to supply the Union Defence Force once more."

 SAF_rebuilding_the_military_industry_2:0 "Arsenal of the South"
 SAF_rebuilding_the_military_industry_2_desc:0 "With renewed industry and determination, South Africa transforms into a vital arsenal, producing arms and equipment to drive back its enemies across the continent."

 SAF_special_forces:0 "Commando Revival"
 SAF_special_forces_desc:0 "Drawing on the legacy of the Boer commandos, elite units are reformed to strike swiftly across the African bush, masters of mobility and surprise."

 SAF_improve_doctrine:0 "Adapt the Veld Doctrine"
 SAF_improve_doctrine_desc:0 "Modern war demands new thinking. South Africa refines its doctrine to blend mechanized warfare with the harsh realities of the African terrain."

 SAF_copy_uk:0 "British Military Tradition"
 SAF_copy_uk_desc:0 "The Union looks to Britain, adopting tried and tested command structures and doctrine to rebuild a disciplined and coordinated fighting force."

 SAF_copy_germany:0 "Study Axis Tactics"
 SAF_copy_germany_desc:0 "Lessons are drawn from the enemy itself. German methods of maneuver warfare are studied to strengthen South Africa’s ability to fight and survive."

 SAF_improve_special_forces:0 "Elite Commando Training"
 SAF_improve_special_forces_desc:0 "South Africa’s commandos are honed into elite fighters, equipped and trained for deep raids, reconnaissance, and swift strikes across the African theater."

 SAF_retaking_saf:0 "Liberation of the Union"
 SAF_retaking_saf_desc:0 "From exile, the rightful government prepares to reclaim South Africa. Forces gather, allies are courted, and plans are laid to drive the Axis from African soil."

 SAF_country_reinstated:0 "The Union Restored"
 SAF_country_reinstated_desc:0 "The Union of South Africa stands free once more. With the enemy expelled, the nation turns to rebuilding its शासन, unity, and future after years of occupation."

 SAF_help_from_allies:0 "Commonwealth Assistance"
 SAF_help_from_allies_desc:0 "Aid flows in from across the Commonwealth and beyond. Supplies, advisors, and matériel help rebuild South Africa’s strength in the wake of war."

 SAF_payback_time:0 "Vengeance on the Axis"
 SAF_payback_time_desc:0 "The scars of occupation run deep. South Africa now turns outward, preparing to strike back against the Axis and reclaim its honor on the battlefield."
#ideas
SAF_heavy_anti_tank:0 "Heavy Anti-Tank"
SAF_heavy_anti_tank_desc:0 "South African forces develop specialized anti-tank weapons to counter enemy armor. These powerful guns are designed to penetrate the toughest tanks, giving infantry a fighting chance against mechanized threats."
#ideas
 SAF_vehicle_speed_breakthrough_spirit:0 "Spirit of the Veld"
 SAF_vehicle_speed_breakthrough_spirit_desc:0 "Across the burning sands and open veld, South African crews learn to master speed and endurance. Their vehicles are driven to the brink, striking fast before the enemy can react."

 SAF_mech_motorized_reduction:0 "Machines of the Dust"
 SAF_mech_motorized_reduction_desc:0 "In the harsh African theater, every drop of fuel and every vehicle counts. South African formations are adapted to fight lean, relying on mobility and ingenuity over excess machinery."

 SAF_sf_cap:0 "Limited Commando Corps"
 SAF_sf_cap_desc:0 "The legacy of the commandos endures, but resources are scarce. Only a select number of elite units can be maintained, each one carefully chosen and highly trained."

 SAF_equipment_reduction:0 "Scarcity of Arms"
 SAF_equipment_reduction_desc:0 "Years of occupation have left the Union short on weapons and matériel. Soldiers must fight with what they have, making every rifle and round count."

 SAF_sf_stats:0 "Hardened Commandos"
 SAF_sf_stats_desc:0 "Though few in number, South Africa’s commandos are veterans of the bush and desert. Their skill, discipline, and resilience make them a formidable force in any engagement."

 SAF_retaking_homeland:0 "Liberation of the Homeland"
 SAF_retaking_homeland_desc:0 "From foreign shores, the exiled leadership prepares for the great return. Plans are laid, troops are gathered, and the dream of a free South Africa burns bright."

 SAF_sf_cap_flat:0 "Reorganization of the Commandos"
 SAF_sf_cap_flat_desc:0 "The structure of the Union Defence Force is reshaped, placing strict limits on elite formations. This ensures that scarce manpower is spread where it is needed most."

 SAF_exiled:0 "Union Government in Exile"
 SAF_IOG_the_government_in_exile_dynamic_desc:0 "Driven from their homeland, South Africa’s leaders continue the struggle abroad. From distant capitals, they maintain authority and prepare for the day of liberation."

 SAF_exiled_2:0 "Exiles United"
 SAF_IOG_the_government_in_exile_dynamic_desc_2:0 "Across the Commonwealth and beyond, South African exiles rally to the cause. Support is gathered, forces are trained, and the will to reclaim the Union grows stronger."

 SAF_payback:0 "Reckoning with the Axis"
 SAF_IOG_the_government_in_exile_dynamic_desc_payback:0 "The occupation will not go unanswered. South Africa steels itself for vengeance, preparing to strike back and restore its honor through force of arms."

 SAF_effective_labor_1:0 "Effective Labor"
 SAF_effective_labor_2:0 "Effective Labor"
 SAF_effective_labor_3:0 "Effective Labor"
#characters
 SAF_lion_king:0 "The Lion King"