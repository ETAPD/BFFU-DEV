l_english:

 # Decision Category
 USA_flood_control_cat:0 "Flood Control"
 USA_flood_control_cat_desc:0 "Federal efforts to contain the damage wrought by the Ohio River flood, restore the affected states, and rebuild the region's industrial capacity."

 # Provide Care Immediately (Landon)
 USA_landon_provide_care_immediately:0 "Provide Care Immediately"
 USA_landon_provide_care_immediately_desc:0 "The Landon administration can commit federal emergency funds to clear the Ohio Valley's flood damage at once, bypassing the phased recovery programme. Levee repairs, debris clearance, and infrastructure remediation will be completed in a single coordinated push. The affected states will be relieved immediately — though the administration's business partners have made clear that the federal reconstruction contracts of Acts IV and V are a step too far."

 # Rush the Flood Control Acts
 USA_rush_flood_control:0 "Rush the Flood Control Acts"
 USA_rush_flood_control_desc:0 "Emergency federal funds can be committed to dramatically accelerate the pace of flood recovery across the Ohio Valley. By fast-tracking procurement, deploying additional Army Corps of Engineers battalions, and cutting bureaucratic approval delays, each remaining Flood Control Act will complete sixty days ahead of schedule. The surge of confidence from swift federal action will further strengthen national resolve."

 # Flood Control Act I
 USA_flood_control_act_1:0 "Flood Control Act I"
 USA_flood_control_act_1_desc:0 "Emergency levee repairs and the deployment of the Army Corps of Engineers to the worst-hit stretches of the Ohio River. Pumping operations are underway in Louisville, Cincinnati, and Huntington. The first phase of federal intervention has brought the immediate crisis under control, though the scale of destruction demands a sustained commitment."

 # Flood Control Act II
 USA_flood_control_act_2:0 "Flood Control Act II"
 USA_flood_control_act_2_desc:0 "With the floodwaters receding, federal contractors have begun clearing debris from rail lines, roads, and factory floors across Pennsylvania, Kentucky, Indiana, Illinois, and West Virginia. Temporary bridges are going up, power is being restored precinct by precinct, and displaced families are beginning the slow return to their homes."

 # Flood Control Act III
 USA_flood_control_act_3:0 "Flood Control Act III"
 USA_flood_control_act_3_desc:0 "The final remediation phase sees permanent flood barriers raised along the most vulnerable stretches of the Ohio, and the remaining damage to state infrastructure addressed. The affected states have been cleared of flood damage. The work of reconstruction can now begin in earnest."

 # Flood Control Act IV
 USA_flood_control_act_4:0 "Flood Control Act IV"
 USA_flood_control_act_4_desc:0 "Federal investment pours into the flood-affected region. New industrial facilities are rising from the mud, funded by Washington and built by American workers. This first wave of reconstruction contracts is putting tens of thousands back to work and laying the foundations of a stronger industrial base than existed before the disaster."

 # Flood Control Act V
 USA_flood_control_act_5:0 "Flood Control Act V"
 USA_flood_control_act_5_desc:0 "The final phase of the federal reconstruction programme brings the last tranche of investment to bear across the Ohio Valley. With new factories completed and communities rebuilt, the region emerges from the disaster stronger than it entered it — a testament to what coordinated federal action can achieve when American workers are given the tools and the mandate to build."

