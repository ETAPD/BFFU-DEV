l_english:
 # ==========================================
 # Lend-Lease Act. Decision Category
 # ==========================================
 USA_lend_lease_cat:0 "Lend-Lease Act"

 # ==========================================
 # Shared tooltip. "not same country twice"
 # ==========================================
 USA_lend_lease_not_same_country_tt:0 "Cannot supply the same nation consecutively. rotate Lend-Lease support across all three partners first. §Y(This restriction lifts once all partners have reached Tier III.)§!"

 # ==========================================
 # Focus completion tooltip
 # ==========================================
 USA_begin_lend_lease_unlocks_tt:0 "Passes the §WLend-Lease Act§!, opening a new decision category.\n\nThe §WUSA§! may now dispatch escalating shipments of military materiel to three Allied partners:\n• §WUnited Kingdom§!. §RSupply the United Kingdom§!\n• §WFrance§!. §RSupply France§!\n• §WSoviet Union§!. §RSupply the Soviet Union§!\n\nEach recipient has §Wthree tiers§! that unlock sequentially. The same partner §Rcannot be supplied consecutively§! until all three reach Tier III."

 # ==========================================
 # UNITED KINGDOM
 # ==========================================
 USA_lend_lease_ENG_tier1:0 "Supply the United Kingdom. Tier I"
 USA_lend_lease_ENG_tier1_desc:0 "Authorise the first wave of §WLend-Lease§! shipments to Britain. Convoys depart over the next §Ysix months§!, carrying infantry weapons, squad arms, support equipment, field radios, and supply trucks drawn from American stockpiles.\n\n§RFirst-time deployment only.§! Tier II unlocks upon delivery."
 USA_lend_lease_ENG_tier1_tooltip:0 "After §Y180 days§!:\n• §G+10 000§! Infantry Equipment (latest tier)\n• §G+4 000§! Squad Weapons (latest tier)\n• §G+5 000§! Support Equipment\n• §G+3 000§! Radios\n• §G+2 000§! Trucks\n\n§RWhile active: §W-10%§! Factory Output"

 USA_lend_lease_ENG_tier2:0 "Supply the United Kingdom. Tier II"
 USA_lend_lease_ENG_tier2_desc:0 "Expand the Lend-Lease pipeline to Britain. A substantially larger convoy package departs over the next §Ysix months§! as American production ramps up and convoy routes are better established.\n\n§RUnlocks Tier III on delivery.§!"
 USA_lend_lease_ENG_tier2_tooltip:0 "After §Y180 days§!:\n• §G+15 000§! Infantry Equipment (latest tier)\n• §G+6 000§! Squad Weapons (latest tier)\n• §G+7 500§! Support Equipment\n• §G+4 500§! Radios\n• §G+3 000§! Trucks\n\n§RWhile active: §W-15%§! Factory Output"

 USA_lend_lease_ENG_tier3:0 "Supply the United Kingdom. Tier III"
 USA_lend_lease_ENG_tier3_desc:0 "Sustain the §Wfull Lend-Lease pipeline§! to Britain at maximum capacity. American factories are now fully oriented toward Allied supply. Repeat as many times as needed to keep British forces equipped.\n\n§YRepeatable§!. may be taken again after each delivery."
 USA_lend_lease_ENG_tier3_tooltip:0 "After §Y180 days§!:\n• §G+20 000§! Infantry Equipment (latest tier)\n• §G+8 000§! Squad Weapons (latest tier)\n• §G+10 000§! Support Equipment\n• §G+6 000§! Radios\n• §G+4 000§! Trucks\n\n§RWhile active: §W-20%§! Factory Output\n\n§Y(Repeatable)§!"

