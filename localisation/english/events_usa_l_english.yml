 # usa.500 — Hidden 1940 election gateway
 usa.500.a:0 "The election approaches."

 # usa.501 — Roosevelt: An Unprecedented Third Term
 usa.501.t:0 "An Unprecedented Third Term"
 usa.501.d:0 "For a hundred and fifty years, no American president has sought a third term — a tradition born of George Washington's own restraint and enshrined in the unwritten constitution of the Republic. Franklin Roosevelt is about to break it.\n\nWith Europe at war and Asia in flames, Roosevelt has concluded that this is no time to change horses. His Republican challenger, Wendell Willkie, has mounted a spirited campaign — but the American people, uneasy with the world beyond their shores, have returned the man they know. On the fifth of November, the returns come in from across the nation: Roosevelt wins.\n\nFor the first time in history, a president will serve a third term."
 usa.501.a:0 "Four more years."

 # usa.502 — Willkie's Ascension
 usa.502.t:0 "Willkie Breaks the Streak"
 usa.502.d:0 "Alf Landon gave the Republicans four years of steady opposition — dignified, principled, and ultimately unsuccessful. Now, as the 1940 election draws near, Landon has stepped aside, clearing the way for a new kind of Republican: Wendell Willkie, former Democrat, utility executive, and political outsider who swept the convention floor on the sixth ballot.\n\nWillkie's campaign is energetic and internationalist, pitched at the great middle of American politics that Roosevelt has long dominated. And on the fifth of November, it proves enough. The Roosevelt coalition, fraying at the edges after seven years in power, cannot hold. Willkie wins.\n\nThe New Deal era ends. A new page turns."
 usa.502.a:0 "A new era begins."
 # usa.1004 - Operation Torch: Patton & Bradley Take the Field
 usa.1004.t:0 "Operation Torch: America's Generals Take the Field"
 usa.1004.d:0 "American forces have landed across Morocco and Algeria. General Patton's Western Task Force drives on Casablanca — the fiercest armored commander in the American arsenal is at last fully committed to battle, his reputation to be forged under the North African sun. Eisenhower has also confirmed a second assignment: Omar Bradley moves from staff officer to field general, bringing his keen strategic mind directly to the front."
 usa.1004.a:0 "Let the generals prove themselves."

 # usa.1005 - Control The Philippines: MacArthur's Return
 usa.1005.t:0 "I Have Returned"
 usa.1005.d:0 "General MacArthur wades ashore at Leyte Gulf and delivers his promised words to the Filipino people. The liberation of the Philippines - wrested back from Japanese occupation after years of island-hopping and sacrifice - vindicates MacArthur's long campaign and restores American honour in the Pacific. His strategic mastery, forged under fire, has reached a new peak."
 usa.1005.a:0 "People of the Philippines — I have returned."

 # --- Moved from bruh_usa (election-result + join-allies events) ---
 usa.1006.t:0 "You have Joined the Allies"
 usa.1006.d:0 "You are in the allies now because either Germany, Italy, or Japan has gone to war with the UK, France, Poland, or the Czechs.\n\nThis is so the USA can watch whats going on, but they won't be able to join any wars still."
 usa.1006.a:0 "Okay"
