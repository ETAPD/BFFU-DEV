l_english:

 # usa.200 — Hidden election resolution event
 usa.200.t:0 "Election Results"
 usa.200.a:0 "The people have spoken."

 # Shared election score tooltips
 usa_election_score_roosevelt_tt:0 "Roosevelt gains a campaign point."
 usa_election_score_landon_tt:0 "Landon gains a campaign point."

 # usa.201 — The Literary Digest Poll
 usa.201.t:0 "The Literary Digest Poll"
 usa.201.d:0 "The 1936 Literary Digest poll was a famous political polling disaster that incorrectly predicted Republican Alf Landon would defeat incumbent President Franklin D. Roosevelt in a landslide. Despite drawing from over 2.4 million returned ballots, the poll severely overestimated Landon's support, prompting the magazine to go out of business shortly after the election."
 usa.201.a:0 "A flawed forecast!"
 usa.201.b:0 "A sign of changing times!"

 # usa.202 — National Conventions
 usa.202.t:0 "The National Conventions"
 usa.202.d:0 "The Republican National Convention convened in Cleveland on June 9th, nominating Kansas Governor Alf Landon and newspaper publisher Frank Knox on the first ballot. It was a ticket the GOP hoped would unite the party's conservative and moderate wings. Two weeks later, Democrats gathered in Philadelphia, where President Roosevelt accepted his renomination before a crowd of over one hundred thousand. His speech denouncing the §W'economic royalists'§! who had hijacked American prosperity electrified the hall and set the tone for a bruising autumn campaign. The battle lines for November are drawn."
 usa.202.a:0 "Roosevelt's 'economic royalists' speech ignites the base!"
 usa.202.b:0 "Landon and Knox — a unity ticket for constitutional America!"

 # usa.203 — Landon delivers a major address at Chautauqua
 usa.203.t:0 "Landon's Chautauqua Address"
 usa.203.d:0 "On August 26th, Governor Landon delivered a major policy address at the Chautauqua Institution in New York, outlining his vision for a balanced federal budget, reduced regulatory burden, and a restoration of constitutional governance. Broadcast live on national radio to millions of listeners, it was Landon's most prominent moment on the campaign trail thus far. Roosevelt's campaign moved swiftly to counter, framing the address as a defence of privilege over the needs of working Americans."
 usa.203.a:0 "Roosevelt shuts down the critiques."
 usa.203.b:0 "Landon draws blood — Roosevelt on edge?"

 # usa.219 — Supreme Court Strikes Down the AAA
 usa.219.t:0 "Supreme Court Strikes Down the New Deal"
 usa.219.d:0 "On January 6th, the Supreme Court ruled six to three that the Agricultural Adjustment Act was unconstitutional. The decision in §IUnited States v. Butler§! stripped the federal government of its primary tool for stabilising farm prices and incomes, sending shockwaves through rural America. Midwestern farmers face ruin, millions in relief dollars are frozen, and the administration must now find a new path forward. Landon's allies are already crowing that the Constitution has triumphed over executive overreach."
 usa.219.a:0 "Congress will find new avenues for agricultural relief."
 usa.219.b:0 "The Constitution has been vindicated at last."

 # usa.220 — The Townsend Plan
 usa.220.t:0 "The Old-Age Pension Question"
 usa.220.d:0 "Dr. Francis Townsend's movement for a guaranteed federal pension of $200 per month for every American over sixty has gathered an estimated 25 million signatures on petitions to Congress. Though the Townsend Plan was voted down in the House in April, the movement's energy has not dissipated. Millions of elderly Americans and their families are watching closely to see which candidate truly offers them security in their final years. Roosevelt points to the Social Security Act as his answer. Landon calls it sound thinking done wrong: too expensive, fiscally reckless, and a promise Washington cannot keep."
 usa.220.a:0 "The Social Security Act is the real answer for American workers."
 usa.220.b:0 "Two hundred dollars a month is economic fantasy."

 # usa.221 — Father Coughlin's Union Party
 usa.221.t:0 "The Radio Priest Enters the Fray"
 usa.221.d:0 "Father Charles Coughlin, the Catholic priest whose radio broadcasts reach tens of millions, has formally endorsed Representative William Lemke of North Dakota for president on the newly formed Union Party ticket. Backed also by remnants of Huey Long's Share Our Wealth movement and Dr. Townsend's pension crusade, the Union Party poses an unexpected wild card in November. For Roosevelt, the question is whether this third-party challenge will drain working-class votes from the Democrats. For Landon, the opportunity is to consolidate the anti-Roosevelt majority, if he can."
 usa.221.a:0 "The fringe cannot divide what unity has built."
 usa.221.b:0 "Let Coughlin's followers find a home in the Republican cause."

 # usa.222 — September Campaign Swing
 usa.222.t:0 "The Final Stretch Begins"
 usa.222.d:0 "With November now weeks away, both campaigns have shifted into their highest gear. Roosevelt launches a whistle-stop tour of the industrial heartland, drawing large crowds in Pittsburgh, Cincinnati, Detroit, and Chicago. Workers, veterans, and families who lived through the Depression credit the New Deal with their survival. Governor Landon, meanwhile, takes his campaign by rail across the midwest and northeast, hammering a message of fiscal discipline, constitutional order, and an end to bureaucratic excess. The nation is making up its mind."
 usa.222.a:0 "The working families of America are with us!"
 usa.222.b:0 "We shall carry this fight to every corner of the Republic."

 # usa.207 — Hidden Ohio Flood autocomplete
 usa.207.a:0 "An act of nature."

 # usa.208 — Floods Hit Ohio
 usa.208.t:0 "Floods Hit Ohio"
 usa.208.d:0 "Beginning in January 1937, weeks of continuous rainfall across the Ohio River watershed sent the river surging far beyond its banks. From Pittsburgh to Cairo, cities and towns along one of America's great inland waterways disappeared beneath churning brown water. Louisville, Cincinnati, Evansville, and Huntington were inundated; nearly a million Americans fled their homes, and the American Red Cross declared it the greatest peacetime disaster in the nation's history. Factories, warehouses, bridges, and miles of rail lay ruined beneath the flood. Pennsylvania, Kentucky, Indiana, Illinois, and West Virginia face a long and costly road to recovery."
 usa.208.a:0 "Mobilise relief efforts immediately."

 # usa.204 — The Fair Labour Standards Act
 usa.204.t:0 "The Fair Labour Standards Act"
 usa.204.d:0 "Passed in 1938, the Fair Labour Standards Act establishes a federal minimum wage, caps the standard working week, and restricts child labour across industries engaged in interstate commerce. It is the New Deal's most direct intervention in the conditions of American labour — and a signal to organised workers across the country that Washington stands behind them."
 usa.204.a:0 "Unions Empowered!"

 # usa.205 — Gearing the Economy (Roosevelt — Keynesianism)
 usa.205.t:0 "Gearing the Economy"
 usa.205.d:0 "With the shadows of conflict lengthening across Europe and Asia, President Roosevelt has moved to place the full weight of federal authority behind the mobilisation of American industry. Under the new economic framework, government expenditure will drive military and naval production to levels the private sector alone could never sustain. Civilian factory construction yields to the demands of rearmament, while the ability to rapidly redirect industrial capacity ensures that America can respond to any escalation. This is not merely a policy — it is a declaration that the United States is preparing."
 usa.205.a:0 "America will be the arsenal of democracy."

 # usa.206 — Gearing the Economy (Landon — Laissez-Faire)
 usa.206.t:0 "Gearing the Economy"
 usa.206.d:0 "President Landon has staked his economic legacy on a simple conviction: that government interference holds America back. By rolling back federal regulation, cutting bureaucratic overhead, and freeing capital to seek its own level, private enterprise is being unleashed to drive growth at a pace no New Deal programme could match. Investment pours into construction and industry across the board, and the frictionless conversion of factory capacity reflects the confidence of a market finally free to act. It is not Washington that will carry America forward — it is the ambition of its people."
 usa.206.a:0 "Let the market lead the way."

 # usa.209 — The Judicial Procedures Reform Bill
 usa.209.t:0 "The Judicial Procedures Reform Bill"
 usa.209.d:0 "On February 5th, 1937, the President unveiled a proposal that stunned Washington and the nation alike. Under the Judicial Procedures Reform Bill, a new justice would be appointed to the Supreme Court for each sitting member over the age of seventy — potentially adding up to six new justices to the bench. The President framed the proposal as a measure to reduce the burden on ageing justices. His opponents called it what it was: an attempt to pack the Court with loyalists and bring the judiciary to heel. The battle for the bill has begun."
 usa.209.a:0 "Take to the airwaves."
 usa.209.b:0 "Secure Capitol Hill."

 # usa.210 — The Hughes Letter
 usa.210.t:0 "The Chief Justice Responds"
 usa.210.d:0 "Chief Justice Charles Evans Hughes has submitted a letter to the Senate Judiciary Committee that strikes at the heart of the President's case. Point by point, Hughes demolishes the administration's claim that the Court is overburdened and falling behind on its caseload. The figures, he writes, tell a different story: the Court is current in its work. The letter lands like a legal brief — authoritative, precise, and devastating. Washington is rattled. The bill's opponents have found their ammunition."
 usa.210.a:0 "A brazen political intrusion."
 usa.210.b:0 "Commission a counter-report."

 # usa.211 — The Switch in Time
 usa.211.t:0 "The Switch in Time"
 usa.211.d:0 "In a ruling that will echo through constitutional history, Justice Owen Roberts has sided with the liberal bloc in West Coast Hotel Co. v. Parrish, upholding a Washington state minimum wage law that a similar court majority would have struck down only a year before. Opponents of the court-packing scheme seize on the shift: if Roberts has already moved, they argue, there is no need to expand the bench. Supporters of the bill read it differently — as proof that sustained political pressure works. The fight over the Court continues, but the ground has shifted."
 usa.211.a:0 "The Court is already adapting."
 usa.211.b:0 "Press the political advantage."

 # usa.212 — Van Devanter Retires
 usa.212.t:0 "A Vacancy at Last"
 usa.212.d:0 "Justice Willis Van Devanter — one of the four conservatives who have blocked progressive legislation at every turn — has announced his retirement from the Supreme Court. The President now holds a vacancy to fill without expanding the bench. Supporters of the bill take it as vindication; opponents argue that the vacancy proves court-packing is unnecessary. In the Senate, wavering votes are suddenly worth a great deal more."
 usa.212.a:0 "Accept the retirement as progress."
 usa.212.b:0 "Use the vacancy as leverage."

 # usa.213 — Robinson's Final Campaign
 usa.213.t:0 "Robinson's Final Campaign"
 usa.213.d:0 "Senate Majority Leader Joseph Robinson has staked his personal prestige, and with it his long-promised seat on the Supreme Court, on shepherding the Judicial Procedures Reform Bill to passage. He works the floor with relentless energy, trading promises and favours in a bid to hold the coalition together. But the opposition is organised, the public is ambivalent, and Robinson is a man pushing against the tide. The outcome rests on the next few weeks of manoeuvre."
 usa.213.a:0 "Trust Robinson to close the deal."
 usa.213.b:0 "Flood the floor with resources."

 # usa.214 — The Court's Verdict
 usa.214.t:0 "The Court's Verdict"
 usa.214.d.success:0 "The Judicial Procedures Reform Bill has cleared the Senate. The bench will be expanded. The conservative bloc that has fought the administration's agenda at every step has been broken, and a new era of judicial alignment with the executive will begin. The gamble has paid off — the Court has been brought to heel."
 usa.214.d.failure:0 "The Senate has voted seventy to twenty to recommit the bill to committee — a crushing and deliberate rebuke. The Judicial Procedures Reform Bill is dead. The President overplayed his hand, and the Senate has made clear that no man, not even the President of the United States, stands above the Constitution. The Court stands, and the administration is diminished."
 usa.214.a:0 "The verdict has been rendered."
 usa_214_reprioritise_failure_tt:0 "The §YThird New Deal§! has already been wound down — the rebuke falls on the §YReprioritised New Deal§! funds rather than reviving the programme."

 # usa.215 — The Quarantine Speech
 usa.215.t:0 "The Quarantine Speech"
 usa.215.d:0 "Standing before a crowd of fifty thousand in Chicago on October 5th, 1937, President Roosevelt delivers words that no American President has dared speak in years. He calls on the peace-loving nations of the world to act together — to 'quarantine' the aggressors whose lawless violence threatens the foundations of civilised society. The analogy is deliberate: just as a community isolates the sick to prevent the spread of disease, so too must the world isolate those nations whose aggression poisons the international order.\n\n The speech is met with applause in the hall and fury in the press. The isolationists, the America Firsters, the editorials from a hundred city papers — all erupt with the same charge: the President is dragging America toward another foreign war. The White House telephone boards light up. But the words are spoken, and they cannot be taken back."
 usa.215.a:0 "The die is cast."

 # usa.302 — Congress Grows Restless (warning, ~mid-October 1938)
 usa.302.t:0 "Congress Grows Restless"
 usa.302.d:0 "Rumblings from Capitol Hill have reached the White House. A growing faction within Congress is voicing concern over the mounting costs of Roosevelt's New Deal agenda — the sustained level of civilian spending, they argue, cannot continue indefinitely without consequence. Whispers of fiscal restraint are growing louder, and the administration has been warned that a reckoning is coming.\n\nThe President will soon be forced to make a difficult choice about the future of his signature domestic programme. Two paths are being discussed: doubling down on civilian investment and accepting the fiscal consequences, or redirecting the flow of federal funds toward the military-industrial base that a darkening world increasingly demands."
 usa.302.a:0 "We will address this matter when it arrives."

 # usa.303 — Defund the New Deal (~mid-November 1938)
 usa.303.t:0 "Defund the New Deal"
 usa.303.d:0 "The bills are coming due. Years of expansive civilian spending under the New Deal have strained the federal budget to its limits, and Congressional opposition has reached a fever pitch. Critics from both parties are demanding that Roosevelt make a choice: double down on civilian investment and accept the fiscal consequences, or redirect the flow of federal funds toward the military-industrial base that a darkening world increasingly demands. The President can delay no longer."
 usa.303.a:0 "Stretch the Coffers — sustain the New Deal at all costs."
 usa.303.b:0 "Reprioritise New Deal Funds — redirect spending to the military."

 # usa.304 — Deficit Spending expires: player acknowledgment
 usa.304.t:0 "The Coffers Run Dry"
 usa.304.d:0 "The emergency injection of federal spending has run its course. The burst of civilian and infrastructure investment that bought the New Deal another season has now expired, and the reckoning Congress demanded has arrived. With the books no longer able to sustain the old level of domestic ambition, the administration is redirecting what remains toward the war industries. Military factory output and naval construction will take priority. The New Deal is not dead — but its most expansive chapter is closed."
 usa.304.a:0 "Redirect the funds. America must prepare."

 # usa.217 — The Liberty League Dinner (January 25, 1936)
 usa.217.t:0 "The Liberty League Dinner"
 usa.217.d:0 "At Washington's Mayflower Hotel, some two thousand of America's wealthiest gather beneath crystal chandeliers to hear the 1928 Democratic nominee Al Smith deliver a broadside against the sitting President. The American Liberty League, funded by the Du Ponts, the Mellons, and a roll-call of Wall Street's finest, has bankrolled the evening. Smith is blunt: the New Deal, he declares, smells of the same carbolic acid as European socialism. The men at these tables, he promises, will not rest until the Constitution is restored.\n\n Roosevelt's operatives are delighted. The White House begins circulating lists of the dinner's patrons — titans of industry, bankers, the men the country blames for Black Tuesday. The question of whose side Alf Landon is on has never felt more pointed."
 usa.217.a:0 "The party of organised money stands revealed."
 usa.217.b:0 "Constitutional liberty must be restored."

 # usa.218 — FDR's Madison Square Garden Rally (October 31, 1936)
 usa.218.t:0 "\"I Welcome Their Hatred\""
 usa.218.d:0 "Three days before America goes to the polls, President Roosevelt stands before twenty thousand roaring supporters at Madison Square Garden — with tens of thousands more packed into the streets outside. He does not speak in the cautious language of a man seeking a second term. He speaks like a man who has already won.\n\n\"Government by organised money,\" he tells the crowd, \"is just as dangerous as Government by organised mob.\" He names his enemies — the forces of selfishness, of lust for power, of financial monopoly and reckless banking — and he does not flinch. \"I welcome their hatred,\" he declares. The building shakes with the response.\n\n The speech is a gamble. Its combative, almost revolutionary edge thrills his base. Whether it wins the middle ground or merely confirms every fear the Republican press has stoked about an imperious President will not be known until Tuesday."
 usa.218.a:0 "The crowd roars — Roosevelt's defiance electrifies the nation."
 usa.218.b:0 "Divisive rhetoric — moderates recoil at the combative tone."

 # usa.216 — The Nye Committee Rebuked (Landon)
 usa.216.t:0 "The Nye Committee Rebuked"
 usa.216.d:0 "The Senate Munitions Investigating Committee — popularly known as the Nye Committee — has been formally dissolved. Senator Nye's three-year investigation into whether munitions manufacturers and international bankers conspired to drag America into the Great War is over. Wall Street breathes easy. The arms producers who operated under the shadow of congressional scrutiny are free once more, and their lobbyists have wasted no time returning to the corridors of power.\n\n The Landon administration has been clear: American industry is a partner, not a suspect. The government will no longer second-guess the men who build the guns. But freedom from oversight comes at a price — corporate contracts will be fat and profitable, and the cost of equipping the nation's military will climb with them. The merchants of death are open for business."
 usa.216.a:0 "American industry stands vindicated."

 # usa.400 — Louisiana Maneuvers: Phase I
 usa.400.t:0 "The Louisiana Maneuvers: Phase I"
 usa.400.d:0 "The first phase of the Louisiana Maneuvers has begun. Across the swamps and forests of Louisiana, tens of thousands of American soldiers are practising combined arms operations for the first time in a generation. General Lesley McNair's evaluation teams are embedded at every level of command, cataloguing the successes and, far more often, the failures of an army starved for years of resources, training, and modern doctrine.\n\nThe reports are sobering. Officers struggle to read maps. Radio communications collapse at every echelon. Logistics chains seize up within hours of a simulated advance. Supply convoys arrive at the wrong grid references; artillery fires on its own troops; armoured columns stall at crossroads for want of a simple decision. And yet the manoeuvres are working as intended. The Army has not been shown how far it has fallen — it has been forced to see it for itself."
 usa.400.a:0 "The army must learn from its mistakes."
 usa.400.b:0 "Commission a full evaluation report. [100 PP, 50 Army XP]"

 # usa.411 — Louisiana Maneuvers: Phase II
 usa.411.t:0 "The Louisiana Maneuvers: Phase II"
 usa.411.d:0 "The second phase of the manoeuvres has opened in earnest. Two corps, designated Red and Blue, face one another across hundreds of miles of Louisiana terrain in the largest peacetime military exercise in American history. For the first time, armoured formations operate independently as exploitation forces rather than as infantry support — and the results are revelatory.\n\nOfficers who performed poorly in Phase I have been quietly rotated out. Those who show tactical initiative — who push beyond their orders, adapt to unexpected situations, and keep their men moving — are being earmarked for accelerated promotion. Among the standouts is a tanker from the Second Armored who, ignoring a stalled radio net, drives his column forty miles into the enemy rear before a ceasefire call halts the exercise. Observers note his name: Patton."
 usa.411.a:0 "Note the lessons and move on."
 usa.411.b:0 "Press the evaluation teams for every detail. [100 PP, 50 Army XP]"

 # usa.402 — Louisiana Maneuvers: Lessons Learned
 usa.402.t:0 "The Louisiana Maneuvers: Lessons Learned"
 usa.402.d:0 "The Louisiana Maneuvers are complete. General McNair's final assessment is blunt: the United States Army has a great deal of work to do. Supply echelons cannot keep pace with modern armoured advances. Divisional commanders await orders from above rather than exercising initiative. Doctrine and training are misaligned with the realities of mechanised warfare.\n\nBut the exercises have also produced something invaluable — a generation of officers tested under near-realistic conditions, a clear-eyed accounting of the army's deficiencies, and hard-won lessons that now sit on every corps commander's desk in the country. General Marshall has reviewed the full findings. The reforms are ready to be enacted."
 usa.402.a:0 "Begin the final reforms."

 # usa.403 — General Promotion Popup (fires when Option B chosen in usa.400 or usa.411)
 usa.403.t:0 "The Louisiana Maneuvers: An Officer Noted"
 usa.403.d:0 "Your evaluation teams have completed their assessment. Among all the officers observed during the manoeuvres, [lm_promoted_general.GetName] has distinguished themselves in a manner that cannot be overlooked — decisive under pressure, clear-headed when communications broke down, and acutely aware of the logistical demands on their formation. Three new skills have been formally allocated based on the full field report."
 usa.403.a:0 "Note the promotion."

