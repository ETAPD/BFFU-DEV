 # usa.307 — Dispute Over CWA Direction
 usa.307.t:0 "Dispute Over CWA Direction"
 usa.307.d:0 "With the Civil Works Administration now fully authorised and funded, a sharp disagreement has erupted within its leadership. The agency's engineers and industrial planners argue that the CWA's purpose is to build — to drive efficient construction of dockyards and heavy works that translate directly into productive capacity. The social workers and community organisers, however, insist the CWA exists to put people back to work and rebuild American society from the ground up: factories and output are secondary to wages, welfare, and the morale of working men and women.\n\nThe administration cannot satisfy both factions. A direction must be chosen."
 usa.307.a:0 "The engineers are right — the CWA must build capacity."
 usa.307.b:0 "The social workers are right — the CWA must serve the people."

 # usa.305 — Rubber Reserve Activated
 usa.305.t:0 "The Rubber Reserve Company Springs to Life"
 usa.305.d:0 "With America now at war, the Rubber Reserve Company, funded years ago to secure a domestic supply of synthetic rubber, activates its network of refineries across Kentucky, Louisiana, and Texas. Workers pour into the new plants as government contracts flood in, and stockpiles of synthetic rubber begin to accumulate at a pace never before seen on American soil.\n\nThis reserve will sustain the war machine through the critical opening months, but the plants were built as an emergency measure, not a permanent fixture. In three months' time, when the initial rush is past and industry has found its footing, the reserve programme will be wound down."
 usa.305.a:0 "The rubber reserve secures our war production."

 # usa.306 — Rubber Reserve Dismantled
 usa.306.t:0 "The Rubber Reserve Stands Down"
 usa.306.d:0 "Three months have passed since the Rubber Reserve Company activated its emergency production programme. American industry has adapted: private synthetic rubber production has expanded, rationing programmes are in effect, and the initial wartime supply crunch has eased. The government-run reserve plants in Kentucky, Louisiana, and Texas are being transferred or decommissioned, their emergency stockpiles drawn down as permanent industrial capacity takes their place."
 usa.306.a:0 "American industry stands on its own."

 # USA_naval.1 — The Future of the United States Navy
 USA_naval.1.t:0 "The Future of the United States Navy"
 USA_naval.1.d:0 "The Bureau of Ships is now operational, with consolidated authority over design, construction, and procurement across all naval shipbuilding. But with appropriations committees already debating the next round of spending, a fundamental question demands an answer: how should America build?\n\nThe advocates of an immediate programme argue that war may come before the decade is out — that the fleet must be ready before a trigger is pulled in the Pacific. Those who counsel a balanced path see steady, sustainable growth as wiser than a forced march that empties the treasury. And the long-term planners argue that no improvised build-up can match the output of a properly capitalised, fully expanded shipbuilding industry — however long it takes to achieve.\n\nThe decision will shape American naval power for a generation."
 USA_naval.1.a:0 "Build for FY40 — Immediate fleet readiness. The fleet sails before the first shot is fired."
 USA_naval.1.b:0 "A Middle Ground — Balanced, sustainable expansion. Output and capacity, in equal measure."
 USA_naval.1.c:0 "Plan for FY42 — The long view. Invest now; dominate later."

