 # GÖRING - Pick Branch Event
 GER_inner_circle_goring.00.t: "Göring's Path"
 GER_inner_circle_goring.00.desc: "Hermann Göring has ascended to the inner circle. The Reich must now decide where his ambitions shall be directed. Shall he bend his will toward mastering the German economy through the Four Year Plan, or toward expanding the might of the Luftwaffe in the skies above Europe?"
 GER_inner_circle_goring.00.a: "The Four Year Plan - Economy"
 GER_inner_circle_goring.00.b: "The Luftwaffe - Air Power"

 # Tooltips shown in the event options
 GER_inner_circle_goring_eco_tt: "Göring will oversee the Four Year Plan"
 GER_inner_circle_goring_air_tt: "Göring will expand the Luftwaffe"

 # Placeholder focus names (replace when you have real focus names)
 GER_placeholder_1: "Expand the Luftwaffe"
 GER_placeholder_1_desc: "Göring turns his considerable ambition toward expanding the reach and power of the Luftwaffe."
 GER_placeholder_2: "Air Supremacy"
 GER_placeholder_2_desc: "With the foundations laid, Göring pushes to establish Germany's dominance over European skies."

 # GÖRING ideas
 GER_goring_four_year_plan_architect: "Architect of the Four Year Plan"
 GER_goring_four_year_plan_architect_desc:a "Göring has taken personal charge of the Four Year Plan, directing industrial investment and factory output with an iron hand. His ambition drives production forward."
 GER_goring_air_minister_four_year_plan:0 "Luftwaffe Supreme Commander"
 GER_goring_air_minister_four_year_plan_desc:0 "Göring has turned his energy toward the Luftwaffe, overseeing procurement and production of fighters and bombers to ensure German air dominance over Europe."