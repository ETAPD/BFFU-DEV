 ##############################################
 # Decision Category                          #
 ##############################################

 USA_corporate_relations:0 "Corporate Relations"
 USA_corporate_relations_desc:0 "Negotiate contracts with America's industrial titans to secure economic bonuses for the New Business Deal. Build relations first, then sign contracts. Only two may be active at once, and each expires after one year."

 ##############################################
 # Build Relations Decisions                  #
 ##############################################

 USA_build_relations_kaiser:0 "Build Relations: Kaiser's Industries"
 USA_build_relations_kaiser_desc:0 "Cultivate closer ties with Henry Kaiser's construction and shipbuilding empire. Improves relations standing, unlocking better contract terms when negotiating."

 USA_build_relations_ford_chrysler:0 "Build Relations: Ford / Chrysler"
 USA_build_relations_ford_chrysler_desc:0 "Engage Detroit's two largest automakers in preliminary discussions with the Landon administration. Improves relations standing, unlocking better vehicle-production contract terms."

 USA_build_relations_gm_dupont:0 "Build Relations: GM / DuPont"
 USA_build_relations_gm_dupont_desc:0 "Open government channels with General Motors and DuPont's chemical research divisions. Improves relations standing, unlocking better research and efficiency contract terms."

 USA_build_relations_jpmorgan:0 "Build Relations: J.P. Morgan"
 USA_build_relations_jpmorgan_desc:0 "Open discreet back-channel communications with Morgan banking officials. Improves relations standing, unlocking better financial contract terms. Requires: Look Towards J.P. Morgan."

 ##############################################
 # Negotiate / Contract Decisions             #
 ##############################################

 USA_negotiate_with_kaiser:0 "Negotiate Contract: Kaiser's Industries"
 USA_negotiate_with_kaiser_desc:0 "Sign a federal contract with Kaiser's Industries. The terms offered depend on current relations standing. The contract is binding for one year, after which it must be renegotiated.\n\n§YAgitated§!: +5% construction speed. Kaiser crews build §Y1 Civilian Factory§! in a random state.\n§WNeutral§!: +10% construction speed. Kaiser crews build §Y2 Civilian Factories§! in random states.\n§GFriendly§!: +15% construction speed. Kaiser crews build §Y3 Civilian Factories§! in random states."
 USA_kaiser_contract_civ_1_tt:0 "Kaiser's crews have broken ground on §Y1 Civilian Factory§! in a randomly selected American state."
 USA_kaiser_contract_civ_2_tt:0 "Kaiser's crews have broken ground on §Y2 Civilian Factories§! across randomly selected American states."
 USA_kaiser_contract_civ_3_tt:0 "Kaiser's crews have broken ground on §Y3 Civilian Factories§! across randomly selected American states."

 USA_negotiate_with_ford_chrysler:0 "Negotiate Contract: Ford / Chrysler"
 USA_negotiate_with_ford_chrysler_desc:0 "Sign a federal production contract with Ford and Chrysler. The terms depend on current relations standing. Expires after one year.\n\n§YAgitated§!: -2.5% motorised & mechanised IC cost.\n§WNeutral§!: -5% motorised & mechanised IC cost.\n§GFriendly§!: -10% motorised & mechanised IC cost."

 USA_negotiate_with_gm_dupont:0 "Negotiate Contract: GM / DuPont"
 USA_negotiate_with_gm_dupont_desc:0 "Sign a research-cooperation agreement with General Motors and DuPont. Terms depend on current relations standing. Expires after one year.\n\n§YAgitated§!: +2.5% research speed, +2.5% factory efficiency.\n§WNeutral§!: +5% research speed, +5% factory efficiency.\n§GFriendly§!: +10% research speed, +7.5% factory efficiency."

 USA_negotiate_with_jpmorgan:0 "Negotiate Contract: J.P. Morgan"
 USA_negotiate_with_jpmorgan_desc:0 "Secure a credit arrangement with the Morgan banking house. Terms depend on current relations standing. Expires after one year.\n\n§YAgitated§!: +0.05 political power/day, -2% consumer goods.\n§WNeutral§!: +0.10 political power/day, -5% consumer goods.\n§GFriendly§!: +0.15 political power/day, -12.5% consumer goods."

 ##############################################
 # Contract Ideas: Kaiser's Industries       #
 ##############################################

 ##############################################
 # Focus Tooltips                             #
 ##############################################

 USA_reconcile_with_domestic_corporations_corp_tt:0 "Opens the §YCorporate Relations§! decision panel. Spend §YPolitical Power§! to raise §YRelations§! with each firm, then sign contracts for sustained industrial bonuses:\n §GFaster factory and civilian construction\n Cheaper civilian factories\n Improved factory output§!\n §WSets §YKaiser's Industries§W, §YFord/Chrysler§W, and §YGM/DuPont§W relations to §YAgitated§W. Each firm requires §R25 Political Power§W investment before contracts become available§!"

 USA_look_towards_jp_morgan_corp_tt:0 "Sets §YJ.P. Morgan§! relations to §YAgitated§!:\n §WNegotiations unlocked in the §YCorporate Relations§! panel\n §R25 Political Power§W required to build relations before signing a contract§!"

 USA_look_towards_jp_morgan_nbd_tt:0 "Upgrades §YThe New Business Deal§!:\n £construction_speed_civfactory_texticon §WCivilian Factory construction speed:§! §Y+40.0%§!\n £consumer_goods_texticon §WConsumer Goods Factories factor:§! §Y+10.0%§!\n §WIf not yet active, the upgrade applies automatically when §YCancel Deficit Spending§! completes.§!"

 ##############################################
 # Contract Ideas: Kaiser's Industries       #
 ##############################################

 USA_kaiser_contract_1:0 "Kaiser Contract (Basic)"
 USA_kaiser_contract_1_desc:0 "A preliminary federal contract with Kaiser's Industries at §YAgitated§! standing. Kaiser crews are constructing §Y1 Civilian Factory§! on behalf of the federal government. While the contract holds, all construction proceeds at an accelerated pace."

 USA_kaiser_contract_2:0 "Kaiser Contract (Standard)"
 USA_kaiser_contract_2_desc:0 "A full federal contract with Kaiser's Industries at §WNeutral§! standing. Kaiser's construction brigades have broken ground on §Y2 Civilian Factories§! across the country. Federal backing drives meaningful improvements to national construction speed."

 USA_kaiser_contract_3:0 "Kaiser Contract (Premium)"
 USA_kaiser_contract_3_desc:0 "A comprehensive partnership with Kaiser's Industries at §GFriendly§! standing. Three new §Y3 Civilian Factories§! are rising across the American heartland. Kaiser's empire operates as a direct instrument of federal industrial policy."

 ##############################################
 # Contract Ideas: Ford / Chrysler           #
 ##############################################

 USA_ford_chrysler_contract_1:0 "Ford-Chrysler Agreement (Basic)"
 USA_ford_chrysler_contract_1_desc:0 "A preliminary production agreement with Ford and Chrysler. Minor reductions in vehicle equipment costs."

 USA_ford_chrysler_contract_2:0 "Ford-Chrysler Agreement (Standard)"
 USA_ford_chrysler_contract_2_desc:0 "A full production contract with Detroit's automakers. Vehicle costs are meaningfully reduced as production lines are aligned with federal needs."

 USA_ford_chrysler_contract_3:0 "Ford-Chrysler Agreement (Premium)"
 USA_ford_chrysler_contract_3_desc:0 "A comprehensive partnership with Ford and Chrysler. With full trust, Detroit's factories are deeply integrated into the national production plan."

 ##############################################
 # Contract Ideas: GM / DuPont               #
 ##############################################

 USA_gm_dupont_contract_1:0 "GM-DuPont Partnership (Basic)"
 USA_gm_dupont_contract_1_desc:0 "A preliminary research cooperation agreement with General Motors and DuPont. Modest improvements to research speed and factory efficiency."

 USA_gm_dupont_contract_2:0 "GM-DuPont Partnership (Standard)"
 USA_gm_dupont_contract_2_desc:0 "A full research-cooperation agreement with GM and DuPont. Federal planners gain meaningful access to corporate R&D resources."

 USA_gm_dupont_contract_3:0 "GM-DuPont Partnership (Premium)"
 USA_gm_dupont_contract_3_desc:0 "A comprehensive industrial partnership with GM and DuPont. Research laboratories and production facilities operate in close coordination with Washington."

 ##############################################
 # Contract Ideas: J.P. Morgan               #
 ##############################################

 USA_jpmorgan_contract_1:0 "Morgan Capital Compact (Basic)"
 USA_jpmorgan_contract_1_desc:0 "A preliminary credit arrangement with J.P. Morgan. Modest improvement to political power generation."

 USA_jpmorgan_contract_2:0 "Morgan Capital Compact (Standard)"
 USA_jpmorgan_contract_2_desc:0 "A full credit arrangement with the Morgan banking house. Political power generation improves and consumer goods pressure eases slightly."

 USA_jpmorgan_contract_3:0 "Morgan Capital Compact (Premium)"
 USA_jpmorgan_contract_3_desc:0 "A comprehensive financial partnership with J.P. Morgan. With full trust established, Morgan capital flows freely into federal coffers."

 ##############################################
 # Contract Expiry Events                     #
 ##############################################

 usa_corp.1.t:0 "Kaiser Contract Expired"
 usa_corp.1.d:0 "The federal contract with Kaiser's Industries has run its course. Henry Kaiser's construction operations return to their standard commercial footing. Washington may renegotiate new terms at any time."
 usa_corp.1.a:0 "We will consider new terms."

 usa_corp.2.t:0 "Ford-Chrysler Agreement Expired"
 usa_corp.2.d:0 "The production agreement with Ford and Chrysler has lapsed. Detroit's automakers resume normal operations. A new contract can be negotiated when convenient."
 usa_corp.2.a:0 "Noted. Detroit remains open to business."

 usa_corp.3.t:0 "GM-DuPont Partnership Expired"
 usa_corp.3.d:0 "The research cooperation agreement with General Motors and DuPont has concluded. Laboratories return to purely commercial priorities. Renegotiation remains available."
 usa_corp.3.a:0 "We will revisit this partnership."

 usa_corp.4.t:0 "Morgan Capital Compact Expired"
 usa_corp.4.d:0 "The credit arrangement with J.P. Morgan has lapsed. Federal financing must return to standard terms. A new compact can be arranged through the Corporate Relations panel."
 usa_corp.4.a:0 "The markets will adjust."