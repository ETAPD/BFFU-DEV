l_english:
speech.1.t:0 "Enable Speeches?"
speech.1.desc:0 "Makes you hear hitler and stalin cope"
speech.1.a:0 "Yes I want my Larp"
speech.1.b:0 "No Sir"

speech.2.t:0 "Germany Launches a Summer Offensive"
speech.2.d:0 "German High Command has launched a massive summer offensive known as Fall Blau (Case Blue). Following months of regrouping after the harsh winter, Axis forces have surged forward once more, driving deep into southern Soviet territory with speed and precision."
speech.2.a:0 "Oh no..."
speech.2.b:0 "Hans Where's the Flamethrower?"
speech.2.c:0 "Za Rodina!"

speech.3.t:0 "Germany Launches Operation Citadel"
speech.3.d:0 "In a gamble for dominance, Adolf Hitler unleashes Operation Citadel, a colossal two-pronged assault as Walter Model drives south from Orel and Hermann Hoth surges north from Belgorod to crush the Kursk salient in a titanic encirclement—only to collide headlong with the deeply entrenched defenses prepared by Georgy Zhukov, igniting one of the most ferocious and initiative battles ever fought on the Eastern Front. The German wehrmacht however, realizes this is one of the last offensives."
speech.3.a:0 "..."

speech.4.t:0 "Soviets Launch Operation Bagration"
speech.4.d:0 "the Soviet Union has launched Operation Bagration, a blow aimed at the destruction of German Army Group Centre and the liberation of occupied territories across Belarus. Marking one of the largest offensives of the war, the assault demonstrates the full coordination of the Red Army as it shifts decisively onto the offensive. Soviet forces have already shattered forward German lines, exploiting weak points with armored spearheads and mechanized units. Entire divisions of the Wehrmacht are reported to be encircled, with key cities falling in rapid succession as the Red Army advances westward."
speech.4.a:0 "The Red Army is Unstopable"

speech.5.t:0 "Endsieg"
speech.5.d:0 "Under the command of Adolf Hitler, all remaining civilians resources are being mobilized for a decisive stand. The Volkssturm—composed of elderly men and young boys—has been deployed alongside the remnants of the Wehrmacht and SS divisions, tasked with defending the Reich’s heartland against advancing Allied armies. Yet The Final Victory Is Within Reach!"
speech.5.a:0 "The Rush For Berlin, Has Begun."
speech.5.b:0 "Für Das Vaterland!"

speech.6.t:0 "Soviet Winter Offensive!"
speech.6.d:0 "In a stunning reversal amid the freezing depths of winter, Soviet forces have launched a massive counteroffensive against German armies stalled at the gates of Moscow, marking the first major strategic setback for the Wehrmacht. The offensive has shattered the myth of German invincibility, as Soviet resistance transforms into determined counterattack. While fierce fighting continues and casualties mount on both sides, the momentum has shifted—if only temporarily—in favor of the Red Army."
speech.6.a:0 "Home by christmas..."
speech.6.b:0 "The Ruskies are putting up Resistance"
speech.6.c:0 "URA URA URA!!"

speech.7.t:0 "Germany Launches Operation Typhoon"
speech.7.d:0 ""
speech.7.a:0 "..."

speech.8.t:0 "Danzig Or War"
speech.8.d:0 "The German ultimatum, “Danzig or War,” has brought Europe to the edge of catastrophe, as Adolf Hitler demands the return of the Free City of Danzig and territorial concessions from Poland, insisting that German grievances must be resolved—by force if necessary.Backed by mounting German mobilization, Berlin declares that the status of Free City of Danzig is intolerable, framing the demand as both a national and strategic necessity. Diplomatic channels are rapidly collapsing, as Polish authorities reject the ultimatum, refusing to yield sovereignty under threat. Europe is preparing for War."
speech.8.a:0 "The Fog is coming"
speech.8.b:0 "We will crush them at once."

speech.9.t:0 "Operation Barbarossa"
speech.9.d:0 "the largest military invasion in history, as millions of Axis troops surged across the border into the Soviet Union in a massive bid for conquest and annihilation. The German plan called for a swift and overwhelming offensive along a vast front stretching from the Baltic to the Black Sea, divided into three main army groups: to the north, forces drove toward Leningrad; in the center, powerful armored formations advanced toward Moscow; and in the south, armies pushed into Ukraine, seeking its rich resources and strategic depth.                                                                                                                   We have only to kick in the door and the whole rotten structure will come crashing down. -Adolf Hitler"
speech.9.a:0 "If we do not crush Russia, then Germany is lost."
speech.9.b:0 "Oh God"

speech.10.t:0 "Japanese Total War in China"
speech.10.d:0 "Chinese authorities claim that the 'breaking point' has been reached in regards to our 'unwarranted aggressions' towards China! Our demands for reparations have been refused, and there are reports of Japanese nationals coming under attack in Shanghai. If we needed an excuse to deal decisively with the Chinese, this is it! Only God knows how many casualties Japan will take and how long this will go on. As the conflict expands, the international community watches with growing concern, aware that this war in Asia may become a critical front in a wider global front already beginning to take shape."
speech.10.a:0 "Tenno Heika Banzai!"

speech.11.t:0 "Tora! Tora! Tora!"
speech.11.d:0 "Just before the first bombs dropped on Pearl Harbor, Commander Mitsuo Fuchida, leader of the air attack, called out, "Tora! Tora! Tora!" ("Tiger! Tiger! Tiger!"), a coded message which told the entire Japanese navy that they had caught the Americans totally by surprise. In addition to the air assault on Battleship Row, the Japanese had launched five midget submarines. These midget subs, which were approximately 78 1/2 feet long and 6 feet wide and held only a two-man crew, were to sneak into Pearl Harbor and aid in the attack against the battleships. However, all five of these midget subs were sunk during the attack on Pearl Harbor."
speech.11.a:0 "Tenno Heika Banzai!"
speech.11.b:0 "They're coming south"

speech.12.t:0 "Battle Of El-Alamein Begins"
speech.12.d:0 "Following months of maneuver warfare across Libya and Egypt, the Axis forces under Erwin Rommel—often referred to as the “Desert Fox”—launched repeated attempts to break through Allied defensive lines established near the railway hub of El Alamein. However, his advance was increasingly constrained by extended supply lines, fuel shortages, and mounting Allied resistance."
speech.12.a:0 "Decisive Battle For Africa"

speech.13.t:0 "Germany Launches Operation Sonnenblume"
speech.13.d:0 "Operation Sonnenblume (“Sunflower”) was the rapid German intervention in North Africa following the collapse of Italian forces in Libya, marking the arrival of the first elements of the German Afrika Korps under Erwin Rommel. Upon arrival, Rommel quickly exceeded his initial defensive mandate, reorganizing Axis forces into a highly mobile desert fighting force. Exploiting speed, surprise, and aggressive maneuver warfare, German and Italian units launched counterattacks that pushed British and Commonwealth forces back across Libya, recapturing key positions including Benghazi."
speech.13.a:0 "The Battle Begins"

speech.14.t:0 "Britain Launches Operation Compass"
speech.14.d:0 "Operation Compass was the first major Allied offensive of the Western Desert Campaign, launched by British and Commonwealth forces against the Italian Tenth Army in North Africa. Designed as a limited raid, it rapidly evolved into a sweeping advance that shattered Italian positions in Libya. The offensive began after months of border skirmishes along the Egyptian–Libyan frontier. Under the command of Archibald Wavell and led in the field by Richard O'Connor, British forces launched a surprise attack on fortified Italian camps at Sidi Barrani."
speech.14.a:0 "The Battle Begins"

speech.15.t:0 "Unternehmen Wacht am Rhein"
speech.15.d:0 "In a desperate bid to reverse the tide of war, Adolf Hitler has unleashed Unternehmen Wacht am Rhein, the largest German offensive of the Western Front—a colossal gamble through the frozen Ardennes forest aimed at splitting the Allied armies, capturing the vital port of Antwerp, and forcing a negotiated peace. With over 400,000 troops, 1,400 tanks, and 2,600 artillery pieces, the Wehrmacht surges forward under the cover of fog and snow, catching the Allies off guard in one of the harshest winters on record. As American and British forces scramble to contain the breakthrough, the Battle of the Bulge erupts into a ferocious struggle for survival, where every inch of ground is contested in brutal close-quarters combat."
speech.15.a:0 "The Battle for D-day begins."