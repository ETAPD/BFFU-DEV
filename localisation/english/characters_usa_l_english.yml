 office_of_war_mobilization:0 "Office of War Mobilization"
 office_of_war_mobilization_desc:0 "Baruch's Office coordinates the full might of American industrial production, cutting through bureaucratic delays to accelerate military factory and dockyard construction while squeezing greater output from every plant."
 construction_juggernaut:0 "Construction Juggernaut"
 construction_juggernaut_desc:0 "Kaiser's industrial empire builds fast, but his demands on Washington are steep. Civilian factories and infrastructure rise at an extraordinary pace, though the political capital required to keep his operation running strains the administration's resources."
 head_of_us_treasury:0 "Head of US Treasury"
 head_of_us_treasury_desc:0 "Morgenthau's grip on the Treasury funnels resources directly into the war effort, dramatically reducing the share of industry consumed by civilian goods and freeing capacity for guns, ships, and planes."
 secretary_of_commerce:0 "Secretary of Commerce"
 secretary_of_commerce_desc:0 "Roper steers the nation's commercial engines toward domestic development, accelerating the construction of civilian factories and infrastructure — though his peacetime priorities come at the cost of military production."
 lion_of_idaho:0 "The Lion of Idaho"
 lion_of_idaho_desc:0 "Borah's thunderous isolationism commands respect across the aisle. His voice steadies the nation's resolve at home, but his uncompromising opposition to foreign entanglements quietly erodes America's appetite for war."
 secretary_of_state:0 "Secretary of State"
 secretary_of_state_desc:0 "Stimson's steady hand at the helm of diplomacy projects American authority abroad and bolsters confidence at home, generating greater political capital and steadily building the nation's stability."
 deputy_president:0 "The Deputy President"
 deputy_president_desc:0 "Hopkins operates as Roosevelt's indispensable right hand, wielding presidential authority to cut through red tape and drive the New Deal's agenda forward — accelerating civilian construction and infrastructure while steadily shoring up national morale."
 mr_republican:0 "Mr. Republican"
 mr_republican_desc:0 "Taft is the undisputed standard-bearer of the Republican Party — his name synonymous with conservative principle and political discipline. His presence in the administration commands loyalty from the party faithful and keeps the machinery of government well-oiled with political capital."
 secretary_of_the_interior:0 "Secretary of the Interior"
 secretary_of_the_interior_desc:0 "Krug's stewardship of America's vast natural heritage and public resources instills a quiet confidence in the nation's long-term foundations, bolstering stability and keeping the wheels of government turning with measured political momentum."
 usa_thomas_dewey:0 "Thomas Dewey"
 the_gang_buster:0 "The Gang Buster"
 the_gang_buster_desc:0 "Dewey's relentless prosecution of organized crime built a reputation for ruthless efficiency and iron discipline. His presence in the administration signals that America means business — at home and abroad."

 bradley_theorist_mastery_tt:0 "£GFX_doctrine_mastery Army Mastery Gain: §G+0.3§! daily"
 bradley_theorist:0 "Army Doctrine Theorist"
 bradley_theorist_desc:0 "Bradley's systematic approach to combined arms warfare elevates the entire American military doctrine, accelerating mastery gain across every branch of land combat."