 manchukou_opium.1.t: "The Shanghai Gates"
 manchukou_opium.1.desc: "Through middlemen in the International Settlement, Manchukuo's opium monopoly has quietly opened a channel into the vast Chinese market. The customs ledgers say soybeans; the strongboxes say otherwise. The revenue flowing back to Hsinking is staggering."
 manchukou_opium.1.a: "The ledgers balance themselves"
 manchukou_opium.2.t: "Medicine for the Führer"
 manchukou_opium.2.desc: "A discreet European buyer has placed a standing order for refined opiates of the highest pharmaceutical grade, routed through Berlin. Our chemists are flattered by the exacting standards. Whoever the end customer is, he pays in hard currency and never haggles."
 manchukou_opium.2.a: "We do not ask who needs it"
 manchukou_opium.3.t: "Tokyo Night"
 manchukou_opium.3.desc: "The pleasure quarters of Tokyo and Osaka have developed a taste for Manchurian product. Home Islands police look the other way — half the distribution network carries Kwantung Army paperwork. The profits return to Manchukuo's development budget, minus the usual commissions."
 manchukou_opium.3.a: "What the Diet doesn't know won't hurt it"
 manchukou_opium.4.t: "Trans-Pacific Trade"
 manchukou_opium.4.desc: "American narcotics agents have intercepted another shipment in San Francisco — the third this year traced to Dairen. The State Department protests; our trade office expresses astonishment that such criminality could occur. The other seven shipments arrived without incident."
 manchukou_opium.4.a: "Astonishing indeed"
 manchukou_opium.5.t: "Matsuoka's Candies"
 manchukou_opium.5.desc: "A scandal brews: crates labeled as confectionery on a Mantetsu manifest proved to be packed with opium bricks. The press is told it was a clerical error. The clerks responsible receive quiet promotions."
 manchukou_opium.5.a: "A clerical error, nothing more"
 manchukou_opium.6.t: "Questions of Profitability"
 manchukou_opium.6.desc: "The Opium Monopoly Bureau presents its annual report. Revenues are immense, but the Bureau's directors press for a decision: expand the trade along the new rail corridors and accept the risks, or consolidate what we hold and bank the profits quietly."
 manchukou_opium.6.a: "Expand along the railways"
 manchukou_opium.6.b: "Consolidate and bank the profits"
 manchukou_banditry.0.t: "The Communist Hunter"
 manchukou_banditry.0.desc: "After the recent skirmishes along the Soviet border, a legend has spread among our gendarmes: a Japanese sergeant they call the 'Communist Hunter.' They say that with a squad of no more than six men he has captured or destroyed hundreds of partisans. One story tells how, searching a farmhouse in Tangyuan county, he made the owner confess to hiding communists in the cellar with nothing but a short conversation and one unexpected question — though some soldiers note that one communist woman still managed to escape.\n\nIt is no more than an army legend, but such an image of our soldiers — as hunters of partisans — is worth cultivating, to terrify and demoralize the enemy."
 manchukou_banditry.0.a: "What was the question he asked?"
 manchukou_banditry.1.t: "Raid into Northern Xing'an"
 manchukou_banditry.1.desc: "The sweep of northern Xing'an is complete. The mounted bandit bands that preyed on the herding communities of the steppe were run down by columns of national army cavalry operating from Hailar. Losses among the local population were regrettable, but the region is quiet."
 manchukou_banditry.1.a: "The steppe is quiet again"
 manchukou_banditry.2.t: "Raid into Eastern Xing'an"
 manchukou_banditry.2.desc: "The clearing of eastern Xing'an has ended in success. The volcanic ridges of the Greater Khingan, blanketed in conifer taiga, had long sheltered bandit groups of every stripe. Having scouted the locations of their bases, mountain units trained by Kwantung Army inspectors caught the bands resting in their camps and dealt with them on the spot."
 manchukou_banditry.2.a: "The Khingan mountains will be a grave for those who fled"
 manchukou_banditry.3.t: "Raid into Northern Lungkiang"
 manchukou_banditry.3.desc: "The town of Anda has been a significant railway junction since 1913. Officers of the national army learned from the local administration that train-robbing bands were the great plague of the district. A plan was drawn: a train disguised as an ordinary freight run, packed with soldiers, was sent down the line. The plan worked. The mounted bandits who closed in on their expected prize met a wall of fire and were routed; the survivors were arrested and delivered to Anda."
 manchukou_banditry.3.a: "The railway is safe at last"
 manchukou_banditry.4.t: "Raid into Southern Xing'an"
 manchukou_banditry.4.desc: "Tongliao, wrapped in the broad arteries of the great Liao river, has long suffered bands that plunder the small riverside villages. Learning why the military train had come, the Mongol administration gave every assistance in trapping and destroying the bands, and the local garrison was reinforced with national army units."
 manchukou_banditry.4.a: "The Liao's current will carry away the bandits' sins"
 manchukou_banditry.5.t: "Raid into Jehol"
 manchukou_banditry.5.desc: "Jehol was cleared of Chinese nationalists by the Kwantung Army back in March 1933. That has not stopped certain pro-Kuomintang bands from skulking at a distance from fortified Chengde and conducting subversion. Beyond reinforcing the border garrisons, our command has run numerous small raids, gathering intelligence from local police and villagers. Scattered bands may still roam the forests, but they will cause no serious trouble now."
 manchukou_banditry.5.a: "The Kuomintang dogs have no business here"
 manchukou_banditry.6.t: "Raid into Western Xing'an"
 manchukou_banditry.6.desc: "Western Xing'an enjoys broad Mongol autonomy under the Hung Yen Bureau. Despite the rights our government has extended, certain Mongol madmen failed to appreciate the gesture and organized themselves into bands under the slogan of 'liberation from the invaders.' Joint operations with the Mongol armed police of Kailu have trapped and destroyed the bands, which should bring stability to the region."
 manchukou_banditry.6.a: "The Mongols have again proven themselves a worthy nation of our state!"
 manchukou_banditry.7.t: "Successful Advance"
 manchukou_banditry.7.desc: "Our units have fought their way onto positions previously held by the partisans. Resistance in this sector was weak, and the bandits are unlikely to organize a swift counterattack. We should take the time to hold this ground."
 manchukou_banditry.7.a: "Excellent — the staff has proven its professionalism again"
 manchukou_banditry.8.t: "Failed Advance"
 manchukou_banditry.8.desc: "Our advance has failed. After repelling our attack, organized communist groups counterattacked and pushed us off our positions. We must regroup before trying again."
 manchukou_banditry.8.a: "Fortune turned against us this time"
 manchukou_banditry.9.t: "Raid Successful"
 manchukou_banditry.9.desc: "A mobile raid caught the enemy by surprise on the march. Most were killed or taken prisoner; the ragged remainder scattered into the countryside. The prisoners should be delivered to the nearest controlled settlements for interrogation."
 manchukou_banditry.9.a: "A lightning attack ground the rabble to powder"
 manchukou_banditry.10.t: "Raid Ambushed"
 manchukou_banditry.10.desc: "Our mounted column was ambushed and shot up on its way to the raid. To preserve the remaining men, the order was given to withdraw to safe lines, regroup, and make good the losses."
 manchukou_banditry.10.a: "We must prepare our operations more carefully"
 manchukou_banditry.11.t: "The Trap Worked"
 manchukou_banditry.11.desc: "The ambush organized by our infantry and engineers worked perfectly. A large partisan column, suspecting nothing, was surrounded and completely neutralized. The location is now compromised, however, and it will take time to prepare a new trap."
 manchukou_banditry.11.a: "Another success for our army"
 manchukou_banditry.12.t: "The Trap Discovered"
 manchukou_banditry.12.desc: "The concealed positions we prepared for a surprise attack were discovered. Fighting from awkward ground, our soldiers managed to withdraw — with heavy losses. Next time the organization must be tighter."
 manchukou_banditry.12.a: "Failure is not defeat. We will prepare better"
 manchukou_banditry.13.t: "Units Entrenched"
 manchukou_banditry.13.desc: "Finding favorable ground, units of the national army have dug in, establishing fire positions and observation points. The partisans will find it hard to dislodge them, which tips the balance slightly in our favor."
 manchukou_banditry.13.a: "The enemy's territory shrinks — glory to our heroes!"
 manchukou_banditry.14.t: "Sudden Partisan Counterattack"
 manchukou_banditry.14.desc: "As the national army soldiers were digging in, a partisan group appeared as if from nowhere and caught them in the open, shooting most of them down. Worse, the enemy appreciated the choice of ground and entrenched there themselves. It will take real effort to dig them out."
 manchukou_banditry.14.a: "We must prepare our operations more carefully"
 manchukou_banditry.15.t: "The Russian Tigers"
 manchukou_banditry.15.desc: "In 1935 the authorities began reorganizing the Russian guard detachments into forest police units, protecting the timber concessions from Honghuzi and partisan attack. Given the Russians' combat experience, volunteers were committed to the operational zone — with immediate results: some fifty Russian policemen under Colonel Fyodorov attacked a Chinese band six hundred strong and routed it through surprise and discipline.\n\nThe Russian detachments have since been enlarged three- or four-fold and rearmed with machine guns, submachine guns and grenade launchers, and a military-police academy with a six-month course has opened at Handaohezi station to train Russian cadres."
 manchukou_banditry.15.a: "Perhaps this race deserves more in our country than mercenary work?"
 manchukou_banditry.16.t: "Project 'Datun'"
 manchukou_banditry.16.desc: "Japanese instructors have proposed the creation of fortified villages — 'datun' — into which the population of outlying hamlets suspected of partisan sympathies would be temporarily concentrated. In engineering terms a datun is a large village isolated behind ditches, fences and wire, under our army's guard.\n\nThe method is heavy-handed, but it may prove effective against the partisans. The isolation of the peasantry will tell on other spheres of state life — but in these dangerous times, it is probably justified."
 manchukou_banditry.16.a: "Extreme, perhaps, but necessary measures"
 manchukou_banditry.17.t: "The Battle of Pochonbo"
 manchukou_banditry.17.desc: "The wave of banditry has spread beyond Manchuria. Last night a partisan detachment of some two hundred men crossed the Yalu from our territory and burst into the Korean border town of Pochonbo. They seized the police station, killed the policemen, freed the prisoners, took control of the administration, the post office and the forestry office — and burned them. By the time Japanese reinforcements arrived, the raiders had withdrawn into Manchuria.\n\nRumor among the locals names the commanders as the notorious Choe Hyon and a certain Kim Il Sung. The raid has been reported in the Japanese and foreign press alike — never before have partisans pierced the closely guarded Japanese-Manchurian border. Such successes will only feed their morale."
 manchukou_banditry.17.a: "Kim Il Who?"
 manchukou_banditry.18.t: "The Loss of Linkou"
 manchukou_banditry.18.desc: "The bandit disturbances are gathering scale. Enemy formations under generals Li Zhaolin, Zhao Shangzhi and Li Yanlu, after a series of coordinated raids, have taken the town of Linkou in Mudanjiang province. Regular and police units of the Manchurian and Kwantung armies were driven from the town; the partisans control the checkpoints and are building fortifications.\n\nThe loss is a serious strategic defeat — the town now screens what is probably the largest partisan base on the lower Sungari. Even if we retake it, the bandits will have trained fresh recruits in their camps."
 manchukou_banditry.18.a: "The town must be retaken immediately!"
 manchukou_banditry.19.t: "The Battle of Yilan"
 manchukou_banditry.19.desc: "Early this morning the small garrison of Yilan was attacked without warning. The town, with its direct communications to nearby Harbin, is of great strategic value for operations into the partisan heartland. Well-organized bands under Zhou Baozhong caught the soldiers preparing for anti-bandit raids completely by surprise, pushed into the town and killed more than three hundred Kwantung Army men.\n\nManchurian army units are still fighting in the streets and reinforcements are moving from Harbin, but the initiative is plainly lost, and the planned raids will never take place."
 manchukou_banditry.19.a: "The bandits have grown completely savage"
 manchukou_banditry.20.t: "Murder of an Officer"
 manchukou_banditry.20.desc: "Tragic news from the operational zone. A high-ranking Kwantung Army instructor was assassinated in the night — saboteurs slipped past the sentries into the camp, strangled the officer, and vanished as quietly as they came. Until Tokyo sends a replacement, the unit will be in some disarray."
 manchukou_banditry.20.a: "Court-martial the sentries! How was this allowed?"
 manchukou_banditry.21.t: "Bridge Demolished"
 manchukou_banditry.21.desc: "Last night one of the main railway bridges collapsed under the weight of a passing ammunition train. The rescue operation was complicated by the subsequent detonation of the cargo; the train crew has not been found and is presumed dead. Military intelligence has dispatched investigators to determine why so solid a structure failed. Witnesses speak of a small group of men seen in the valley the day before. Their whereabouts are unknown."
 manchukou_banditry.21.a: "Intercept the saboteurs before they get far"
 manchukou_banditry.22.t: "Sabotage at a Factory"
 manchukou_banditry.22.desc: "Reports arrive of a great fire at one of our factories. The firefighters expect to master the blaze by nightfall, but the damage is severe — the fire began, not by chance, precisely where the most flammable materials were stored. Intelligence has opened an investigation; arson cannot be ruled out, even this far from the centers of the uprising."
 manchukou_banditry.22.a: "The terrorist cell must be hunted down"
 manchukou_banditry.23.t: "Sabotage at an Arms Plant"
 manchukou_banditry.23.desc: "Reports arrive of a great fire at one of our military factories. The firefighters expect to master the blaze by nightfall, but the damage is severe — the fire began, not by chance, precisely where the munitions components were stored. Intelligence has opened an investigation; arson cannot be ruled out, even this far from the centers of the uprising."
 manchukou_banditry.23.a: "The terrorist cell must be hunted down"
 manchukou_banditry.24.t: "Munitions Depot Explosion"
 manchukou_banditry.24.desc: "The fighting reaches ever further into the rear. This evening a monstrous explosion destroyed one of our ammunition depots. The inquiry concludes that accident or negligence is improbable — the blast was almost certainly planned."
 manchukou_banditry.24.a: "Screen the surviving depot workers — the instigators may be among them!"
 manchukou_banditry.25.t: "Railway Demolished"
 manchukou_banditry.25.desc: "Last night a train carrying ammunition, medical supplies and civilian specialists was attacked the moment it left the most heavily guarded stretch of line. The raid began with the demolition of the locomotive; small but well-armed groups then poured fire into the bewildered escort, which could offer no proper resistance. The guards were wiped out, the civilians taken prisoner, and whatever the raiders could not carry away was burned."
 manchukou_banditry.25.a: "The train guards must be reinforced"
 manchukou_banditry.26.t: "Unrest in the Army"
 manchukou_banditry.26.desc: "Despite the discipline instilled by Japanese advisors, enemy propaganda has begun to produce desertions from the national army. It is mostly the newly raised units of former Honghuzi and Chinese peasants who run — but every deserter strengthens the partisans and carries them valuable intelligence. Serious work is needed to stem the flow, for our own safety."
 manchukou_banditry.26.a: "Desertion, alas, is the lot of young armies"
 manchukou_banditry.27.t: "Enemy Intelligence at Work"
 manchukou_banditry.27.desc: "Our fears of Soviet assistance to the partisans have reached a new level. The military cadres lent by the Soviets are evidently coordinating the rebels' hastily trained intelligence service. Documents recently captured in a partisan headquarters, fixing the location of one of their largest groups, proved to be forgeries — and the location a trap. Only a fraction of our police force fought its way back to safety."
 manchukou_banditry.27.a: "Such things deserve more careful handling"
 manchukou_banditry.28.t: "Agitation in the Countryside"
 manchukou_banditry.28.desc: "Despite constant counter-partisan measures in the towns, agitational posters and slogans appear in the streets faster than our men can remove them. In the countryside the partisans carve their slogans into trees and fences. The tide of propaganda is plainly swaying the undecided toward the partisans. Perhaps our approach to the problem needs rethinking."
 manchukou_banditry.28.a: "They are not as simple as they seemed"
 manchukou_banditry.29.t: "Partisan Activization"
 manchukou_banditry.29.desc: "According to our foreign intelligence, the provincial CCP leadership has convened, in the inaccessible county of Tangyuan, a joint congress of all the so-called 'anti-Japanese armies, partisan detachments and patriotic organizations of Manchuria.' The congress is discussing the formation of a 'Northeast Anti-Japanese United Army' — most likely under the notorious communist bandit Yang Jingyu.\n\nIn the south of the country, meanwhile, a local rising of ragged men calling themselves the Young China Party gathers pace.\n\nProposals are being made to strengthen state security — perhaps a 'Three-Year Pacification Plan,' including a unified anti-partisan headquarters."
 manchukou_banditry.29.a: "A sensible idea"
 manchukou_banditry.30.t: "The CCP's Instructional Letter"
 manchukou_banditry.30.desc: "Our intelligence has obtained dated but interesting information. On 3 June 1935 Wang Ming, head of the CCP delegation to the Comintern, circulated an 'Instructional Letter' to the party organizations of Manchuria, proposing a united anti-Japanese front of the whole people regardless of party, class or nation — the very purpose of the 'Northeast Anti-Japanese United Army.'\n\nBut Zhao Shangzhi, one of the bandit leaders, distrusts the Central Committee's representatives and disputes the Letter's line. A joint session of the Zhuhe and Tangyuan county committees has condemned the Letter's spirit as rightist and elected Feng Zhongyun secretary of a self-proclaimed 'Provisional Provincial Committee of North Manchuria,' sending its own envoys to Moscow.\n\nThe conclusion: the communist bands on our territory will not submit directly to the CCP and have built their own autonomous organizations. One day they may reconcile — but until then, the advantage is ours."
 manchukou_banditry.30.a: "The rebels' quarrels will be their undoing"
 manchukou_banditry.31.t: "The March West"
 manchukou_banditry.31.desc: "Grim news from the eastern regions. Along the Sungari the rebels have surged into sudden activity; the territories they temporarily control are spreading and knitting together despite the selfless struggle of our police.\n\nIntelligence concludes that the 'Provisional Provincial Committee of North Manchuria' has after all come to terms with the local CCP — hence this 'March West.' The scattered rebel districts are estimated to hold ten to fifteen thousand fighters: the largest outbreak since 1933-34, and one they have clearly prepared for with care.\n\nThe organization of the anti-partisan headquarters must be accelerated at once. The Kwantung Army police and our gendarmes can no longer contain the organized onslaught. The communists are seizing small strongpoints — to let them consolidate would be a catastrophic error threatening our national security!"
 manchukou_banditry.31.a: "Confirm the headquarters command and begin planning operations"
