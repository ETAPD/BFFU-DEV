l_english:
 ### Yugoslav Focus Tree Localisation ###
 
 # Croatian Path Focuses
 YUG_dissolve_yugoslavia:0 "The End of Yugoslavia"
 YUG_dissolve_yugoslavia_desc:0 "The Yugoslav experiment has failed. Croatia must chart its own course, free from Serbian domination. We will dissolve the artificial union and establish our independence."
  
 YUG_sabotage_royal_army:0 "Sabotage the Royal Army"
 YUG_sabotage_royal_army_desc:0 "The Serbian-dominated Royal Yugoslav Army stands as an obstacle to Croatian independence. Through careful sabotage and subversion, we can weaken their control and prepare the ground for our liberation."
 
 YUG_belgrade_ultimatum:0 "The Belgrade Ultimatum"
 YUG_belgrade_ultimatum_desc:0 "The time has come to present our demands to Belgrade. Either they accept Croatian autonomy, or we will be forced to take more drastic measures to secure our future."
 
 YUG_iog_puppet_donation:0 "Equipment Support for Serbia"
 YUG_iog_puppet_donation_desc:0 "Despite our differences, providing military equipment to our Serbian puppet will help maintain stability in the region and ensure their loyalty to our cause."
 
 YUG_faithful_ally:0 "A Faithful Ally"
 YUG_faithful_ally_desc:0 "Through our cooperation with Italy, we have proven ourselves to be a reliable partner. This alliance will serve us well in the challenging times ahead."
 
 YUG_conscript_muslims:0 "Conscript Muslim Population"
 YUG_conscript_muslims_desc:0 "The Muslim populations of Bosnia and Herzegovina represent an untapped source of manpower. By implementing mandatory conscription, we can bolster our military forces significantly."
 
 YUG_muslim_alliance:0 "Alliance with Muslims"
 YUG_muslim_alliance_desc:0 "Rather than forcing conscription, we can seek a genuine partnership with the Muslim communities. Their voluntary support will be far more valuable in the long run."
 
 YUG_slovenian_steel_mills:0 "Slovenian Steel Mills"
 YUG_slovenian_steel_mills_desc:0 "Slovenia possesses significant industrial potential. By developing steel mills in the region, we can strengthen our industrial base and secure vital war materials."
 
 YUG_italo_croat_legion:0 "Italo-Croat Legion"
 YUG_italo_croat_legion_desc:0 "A joint military force combining Italian experience and Croatian determination will serve as the backbone of our armed forces and cement our alliance with Rome."
 
 YUG_surrender_the_claims:0 "Surrender Italian Claims"
 YUG_surrender_the_claims_desc:0 "To secure Italian support, we must be willing to relinquish our claims to territories that Rome desires. This sacrifice is necessary for our greater goals."
 
 YUG_slovene_limited_self_government:0 "Slovenian Limited Self-Government"
 YUG_slovene_limited_self_government_desc:0 "Granting the Slovenians a degree of autonomy will help pacify their nationalist sentiments while keeping them firmly under our control."
 
 YUG_backa:0 "Give Up Bačka"
 YUG_backa_desc:0 "In exchange for Hungarian support and cooperation, we must be willing to relinquish our claims to the Bačka region. This diplomatic concession may prove valuable in securing our borders."
 
 YUG_west_banat:0 "Trade West Banat"
 YUG_west_banat_desc:0 "West Banat can serve as a valuable bargaining chip in our diplomatic negotiations. Trading this territory will help us secure more critical strategic objectives."
 
 YUG_develop_slovenia:0 "Develop Slovenian Industry"
 YUG_develop_slovenia_desc:0 "Slovenia's industrial potential has long been neglected. By investing in the development of Slovenian manufacturing, we can significantly boost our economic output."
 
 YUG_croatian_volunteers_spain:0 "Croatian Volunteers to Spain"
 YUG_croatian_volunteers_spain_desc:0 "The Spanish Civil War offers our soldiers an opportunity to gain valuable combat experience. Croatian volunteers will fight alongside our ideological allies and learn modern warfare tactics."
 
 YUG_italian_economic_aid:0 "Italian Economic Aid"
 YUG_italian_economic_aid_desc:0 "Italy has offered substantial economic assistance to help modernize our industry. This support will be crucial for transforming our economy and military capabilities."
 YUG_mobilize_the_wild_ustasa:0 "Mobilize the Wild Ustase"
 YUG_mobilize_the_wild_ustasa_desc:0 "Mobilize the Wild Ustase to the NDH armed forces"
 YUG_One_Third_policy:0 "The One Third Policy"
 YUG_One_Third_policy_desc:0 "Enact the One Third Policy across all Croatian lands to consolidate control through forced demographic engineering."
 YUG_mass_raids:0 "Mass Raid And Loot Policy"
 YUG_mass_raids_desc:0 "Authorize coordinated raids and confiscations in targeted regions to seize assets and fund the war effort."
 
 # Ideas
 YUG_IOG_tank_buff_idea:0 "Axis Armored Spearhead Learnings"
 
 YUG_ustase_army:0 "Ustase Defensive Brigades"
 
 YUG_IOG_tank_production_idea:0 "Tank Production Program"
 YUG_IOG_puppet_donation:0 "Equipment Support Program"
 YUG_IOG_puppet_donation_desc:0 "We are providing our puppet state with military equipment and industrial resources to maintain their loyalty and ensure regional stability."
 
 YUG_IOC_conscript_muslims:0 "Muslim Conscription"
 YUG_IOC_conscript_muslims_desc:0 "By conscripting the Muslim population, we have significantly increased our available manpower reserves for military service."
 
 YUG_IOC_muslim_alliance:0 "Muslim Alliance"
 YUG_IOC_muslim_alliance_desc:0 "Our alliance with the Muslim communities has resulted in increased industrial productivity and resource extraction in their regions."
 
 YUG_IOG_sf_path_inf_debuff_idea:0 "Special Forces Doctrine"
 YUG_IOG_sf_path_inf_debuff_idea_desc:0 "Our military has shifted focus towards elite special forces units at the expense of regular infantry effectiveness. This specialization makes our commandos formidable but weakens conventional forces."
  
 YUG_IOG_sf_industry_bonus_idea:0 "Industrial Mobilization"
 YUG_IOG_sf_industry_bonus_idea_desc:0 "Our comprehensive industrial mobilization program has significantly increased factory efficiency and expanded our production capacity across all sectors."
 
 YUG_IOC_italocroat_regiment:0 "Italo-Croat Regiment"
 YUG_IOC_italocroat_regiment_desc:0 "The joint Italo-Croat military units benefit from Italian combat experience and Croatian local knowledge, creating a formidable fighting force with high morale and effectiveness."

 YUG_elite_army_idea:0 "Elite Army"

 YUG_army_reforms1:0 "Army Reforms"
 YUG_army_reforms2:0 "Army Reforms"
 YUG_army_reforms3:0 "Army Reforms"
 YUG_army_reforms4:0 "Army Reforms"

 YUG_german_military_example_idea:0 "German Military Example"
 YUG_italian_military_example_idea:0 "Italian Military Example"
 YUG_arditi_tactics_idea:0 "Arditi Tactics"
 YUG_mass_raids_policy:0 "Mass raid and loot policy"
 
 
 # Serbian Puppet Focuses
 SER_YUG_naval_effort:0 "Naval Construction Program"
 SER_YUG_naval_effort_desc:0 "To support our overlord's naval ambitions, we must expand our dockyard capacity and train our naval personnel to maintain a credible maritime presence."
 
 SER_YUG_construction_effort:0 "Expand Civilian Industry"
 SER_YUG_construction_effort_desc:0 "Our civilian industrial base requires immediate expansion. By constructing new factories, we can better serve our overlord's economic needs while improving our own infrastructure."
 
 SER_YUG_production_effort:0 "Military Production Drive"
 SER_YUG_production_effort_desc:0 "We must dedicate resources to expanding our military production capacity. These new factories will provide the weapons and equipment needed by our armed forces."
 
 SER_YUG_construction_effort_2:0 "Further Civilian Expansion"
 SER_YUG_construction_effort_2_desc:0 "Building upon our initial industrial development, we will construct additional civilian factories to strengthen our economic foundation."
 
 SER_YUG_production_effort_2:0 "Accelerated Arms Production"
 SER_YUG_production_effort_2_desc:0 "The expansion of our arms industry continues. More military factories mean greater output of vital war materials."
 
 SER_YUG_infrastructure_effort:0 "Infrastructure Development"
 SER_YUG_infrastructure_effort_desc:0 "Our nation's infrastructure is outdated and insufficient. By improving roads, railways, and communications, we can facilitate both military movement and economic growth."
 
 SER_YUG_production_effort_3:0 "Peak Military Production"
 SER_YUG_production_effort_3_desc:0 "The final phase of our military industrialization will ensure we can sustain a modern war effort with adequate equipment production."
 
 SER_YUG_infrastructure_effort_2:0 "Advanced Infrastructure"
 SER_YUG_infrastructure_effort_2_desc:0 "Continuing our infrastructure modernization, we will further improve our transportation network and logistical capabilities across the nation."
 
 SER_YUG_construction_effort_3:0 "Industrial Consolidation"
 SER_YUG_construction_effort_3_desc:0 "The culmination of our civilian industrial program will cement our position as a valuable economic partner to our overlord."
 
 
 
 
 
 
 
 
 #MIO
 YUG_henschel_organization:0 "Henschel"

 YUG_the_experiment_has_failed_desc:0 "The dream of a unified South Slavic state has turned into a nightmare of Serbian oppression. It is time to admit that the Yugoslav experiment has failed and for Croatia to forge its own path."
 YUG_take_control_of_zara_desc:0 "The Italian enclave of Zara is a thorn in our side. We must assert our sovereignty and take full control of this important port city, integrating it fully into Croatia."
 YUG_offer_italian_claims_desc:0 "To secure a powerful ally in Italy, we must be prepared to make sacrifices. Offering them territories they have long desired will cement our partnership and ensure their support for our cause."
 YUG_german_economic_aid_desc:0 "The German Reich has offered us substantial economic aid to help modernize our industry and infrastructure. This assistance will be vital in building a strong and prosperous Croatia."
 YUG_slovenia_for_further_german_support_desc:0 "Our German allies have requested control over Slovenia in exchange for their continued support. While a difficult decision, ceding this territory will secure a powerful and lasting alliance with the Reich."
 YUG_cede_lands_to_bulgaria_desc:0 "To foster goodwill with our Bulgarian neighbors and secure our eastern border, we will cede lands that they have historically claimed. This diplomatic gesture will strengthen our regional position."
 YUG_incorporate_the_administrative_zone_desc:0 "The so-called 'Administrative Zone' is rightfully Croatian territory. We will dismantle this artificial construct and fully incorporate the region into our state, uniting all Croats under one banner."
 YUG_insular_economy_desc:0 "In these uncertain times, we must strive for economic self-sufficiency. By developing an insular economy, we will protect ourselves from foreign pressures and ensure our nation's prosperity."
 YUG_axis_military_advisors_desc:0 "To modernize our armed forces, we will invite military advisors from our Axis allies. Their expertise and experience will be invaluable in transforming our army into a formidable fighting force."
 YUG_look_to_germany_desc:0 "Germany has emerged as the dominant power in Europe. By aligning ourselves with the Reich, we can secure our independence and achieve our national ambitions under their powerful protection."

 YUG_copy_streamlined_german_industry_desc:0 "The German industrial model is a marvel of efficiency. By studying and replicating their streamlined processes, we can dramatically improve our own production capabilities and economic output."
 YUG_look_to_italy_desc:0 "Italy, our neighbor across the Adriatic, offers a model of a modern, disciplined state. By aligning ourselves with Rome, we can benefit from their strength and guidance in forging a new Croatian identity."
 YUG_copy_the_italian_model_desc:0 "The Italian state is a testament to order and national pride. We will emulate their political and social structures to bring discipline and unity to Croatia, creating a society worthy of our ancient heritage."
 YUG_join_axis_research_programmes_desc:0 "Our allies in the Axis are at the forefront of technological innovation. By participating in their research programmes, we will gain access to cutting-edge military and industrial technologies."
 YUG_german_military_example_desc:0 "The German Wehrmacht is the most formidable fighting force in the world. We will restructure our army based on their doctrines and training methods to create a modern, professional military."
 YUG_light_tank_research_desc:0 "To compete on the modern battlefield, we must develop our own armored forces. Researching light tank technology will be the first step towards creating a mobile and effective armored corps."
 YUG_light_tank_doctrine_desc:0 "With our new light tanks, we must develop appropriate doctrines to maximize their effectiveness. A focus on speed and flanking maneuvers will allow our armored units to punch above their weight."
 YUG_italian_military_example_desc:0 "The Italian military, with its proud traditions and modern equipment, provides a worthy example for our own armed forces. We will adopt their methods to instill a new sense of discipline and purpose in our soldiers."
 YUG_develop_croat_arditi_desc:0 "Inspired by the elite Italian shock troops, we will form our own 'Arditi' units. These brave soldiers will be trained for daring assaults and will form the vanguard of our army."
 YUG_doctrine_for_our_arditi_desc:0 "Our Arditi units require a unique tactical doctrine to be used to their full potential. We will develop strategies that emphasize their strengths in close-quarters combat and shock tactics."
 YUG_military_science_desc:0 "The art of war is ever-evolving. We will establish institutions dedicated to the study of military science, ensuring our officers are well-versed in the latest strategies and technologies."
 YUG_croatian_leadership_desc:0 "A strong nation requires strong leaders. We will identify and promote talented Croatians to positions of authority, ensuring that our state is guided by a loyal and capable elite."
 YUG_ustase_dictatorship_desc:0 "The time for half-measures is over. To ensure the purity and strength of the Croatian nation, we will establish a firm Ustase dictatorship, crushing all opposition and forging a new, disciplined society."
 YUG_class_warfare_desc:0 "The old hierarchies have failed us. We will dismantle the corrupt upper classes and empower the working people of Croatia, creating a society based on justice and equality for the true sons of the nation."
 YUG_sideline_the_serbs_desc:0 "The Serbian minority has long been a source of instability. We will systematically remove them from positions of influence and ensure that they can no longer threaten the Croatian state from within."
 YUG_ally_the_chetniks_desc:0 "Though they are Serbs, the Chetniks share our opposition to the communists. A temporary alliance of convenience will allow us to focus on our common enemy and secure our position."
 YUG_stabilise_the_trajectory_desc:0 "Our new state is beset by challenges from all sides. We must take decisive action to stabilize the political situation, restore order, and set a clear course for the future of Croatia."
 YUG_attain_papal_legitimacy_desc:0 "As a Catholic nation, the recognition of the Holy See is of paramount importance. We will seek the Pope's blessing to legitimize our rule and strengthen our standing in the Christian world."
 YUG_lessons_from_the_great_war_desc:0 "The last great conflict taught us many bitter lessons. We will study the strategies and mistakes of the Great War to ensure that our nation is better prepared for the conflicts to come."

 # Added Missing YUG Focus Localisation
 YUG_a_mechanised_army_desc:0 "We will modernize our land forces with mechanized formations to improve mobility and battlefield flexibility."
 YUG_a_new_king_desc:0 "A renewed monarchy can stabilize the state and provide a clear symbol of national continuity."
 YUG_abolish_the_monarchy_desc:0 "The monarchy has outlived its purpose. Its abolition will open the way for a new political order."
 YUG_all_kinds_of_special_forces_desc:0 "Expanding specialized formations will give us versatile tools for difficult terrain and complex operations."
 YUG_an_elite_army_desc:0 "Quality over quantity: a highly trained elite force will form the core of our military doctrine."
 YUG_armored_cavalry_desc:0 "By combining speed and armor, our mobile units will exploit breakthroughs and react to threats quickly."
 YUG_army_modernization_desc:0 "A comprehensive reform program will bring our army in line with modern standards of warfare."
 YUG_artillery_focus_desc:0 "Concentrated investment in artillery will improve our firepower and battlefield support capabilities."
 YUG_ban_slovene_nationalist_parties_desc:0 "Suppressing separatist political movements is intended to preserve central authority and internal cohesion."
 YUG_bomber_license_desc:0 "Licensed production of foreign bomber designs will accelerate our air force development."
 YUG_bomber_project_desc:0 "A dedicated bomber program will improve our strategic and tactical striking potential."
 YUG_branch_out_desc:0 "We should expand our military programs into new specialist branches to diversify our strengths."
 YUG_cheaper_production_methods_desc:0 "Improved manufacturing methods will reduce costs and increase output across key sectors."
 YUG_coastal_defense_desc:0 "Strengthening coastal fortifications and naval infrastructure will secure our maritime frontier."
 YUG_concessions_for_macedonians_desc:0 "Limited concessions may reduce unrest and improve stability in contested regions."
 YUG_confidence_in_the_west_desc:0 "Closer ties with Western powers can bring diplomatic backing and economic support."
 YUG_contest_the_adriatic_desc:0 "A stronger naval doctrine is required to challenge rivals and protect our interests in the Adriatic."
 YUG_croatian_officers_desc:0 "Promoting a new cadre of professional officers will improve command quality and military readiness."
 YUG_dedicated_military_training_schools_desc:0 "Specialized academies will standardize training and raise the quality of our armed forces."
 YUG_develop_civilian_industry_desc:0 "Expanding civilian industry will strengthen our economy and support long-term rearmament."
 YUG_develop_rural_industry_desc:0 "Industrializing rural areas will increase productivity and reduce economic imbalance."
 YUG_dictator_without_dictatorship_desc:0 "A controlled concentration of power can maintain order while preserving a legal political facade."
 YUG_establish_the_banovina_of_croatia_desc:0 "Administrative restructuring should ease ethnic tensions and rebalance internal governance."
 YUG_expand_the_mining_industry_desc:0 "Greater extraction capacity will secure critical raw materials for industry and defense."
 YUG_expand_the_serbian_shipyards_desc:0 "Modernized shipyards will increase naval production and support maritime strategy."
 YUG_expand_the_split_shipyards_desc:0 "Investments in Split's dockyards will accelerate warship construction and repair capacity."
 YUG_expand_the_submarine_fleet_desc:0 "A larger submarine arm will improve sea denial and defensive naval operations."
 YUG_expand_the_university_of_belgrad_desc:0 "Academic expansion in Belgrade will drive research and technological advancement."
 YUG_expand_the_university_of_zagreb_desc:0 "Developing Zagreb's research institutions will strengthen innovation and specialist training."
 YUG_fighter_license_desc:0 "Licensed fighter production will allow rapid modernization of our air force."
 YUG_fuel_efficiency_desc:0 "Improving fuel economy across our forces will sustain operations and reduce logistical strain."
 YUG_heavy_cruiser_project_desc:0 "A modern heavy cruiser program will strengthen our naval striking capabilities."
 YUG_heavy_fighter_project_desc:0 "Developing heavy fighters will improve interception range and air defense depth."
 YUG_ikarus_desc:0 "Supporting Ikarus will expand domestic aircraft design and production potential."
 YUG_improve_serbian_rail_network_desc:0 "Rail upgrades will improve logistics, troop movement, and industrial distribution."
 YUG_industrialization_program_desc:0 "A coordinated industrialization drive will accelerate economic development and state capacity."
 YUG_infantry_focus_desc:0 "Prioritizing infantry doctrine and equipment will strengthen the backbone of our army."
 YUG_integrated_rail_network_desc:0 "A unified rail system will connect key regions and improve strategic mobility."
 YUG_larger_calibre_developments_desc:0 "Advancing heavier weapons programs will increase our battlefield firepower."
 YUG_learn_from_germans_desc:0 "Studying German methods can provide practical lessons in planning, doctrine, and organization."
 YUG_license_production_desc:0 "Foreign licenses will bridge capability gaps while domestic industry scales up."
 YUG_local_developers_desc:0 "Domestic design bureaus and engineers will reduce dependence on foreign suppliers."
 YUG_local_self_management_desc:0 "Delegating selected responsibilities to local authorities can improve efficiency and responsiveness."
 YUG_mechanised_doctrine_desc:0 "New doctrine will integrate mechanized units into a cohesive operational framework."
 YUG_merge_the_black_legion_desc:0 "Consolidating irregular formations into the regular chain of command will improve coordination."
 YUG_military_interpreters_desc:0 "Interpreter training will improve cooperation with allies and the use of foreign military materials."
 YUG_modern_destroyers_desc:0 "A destroyer modernization plan will improve screening, escort, and anti-submarine capabilities."
 YUG_modernisation_of_small_arms_desc:0 "Upgraded infantry weapons will increase combat effectiveness and reliability in the field."
 YUG_modernised_doctrine_desc:0 "Revising doctrine around modern maneuver principles will improve operational performance."
 YUG_modernize_the_air_force_desc:0 "We must update aircraft, training, and doctrine to field an effective modern air arm."
 YUG_motorize_the_cavalry_desc:0 "Motorization will transform legacy cavalry formations into mobile modern units."
 YUG_motorized_logistics_desc:0 "Motorized supply and transport chains will improve operational tempo and sustainment."
 YUG_naval_bombers_desc:0 "Naval air power will help us threaten enemy fleets and protect coastal waters."
 YUG_preparation_war_games_desc:0 "Large-scale exercises will test doctrine, logistics, and command under realistic conditions."
 YUG_prepare_for_the_inevitable_desc:0 "Regional tensions demand immediate preparation for a wider conflict."
 YUG_purchase_foreign_desc:0 "Purchasing foreign military equipment can quickly fill capability gaps."
 YUG_rare_minerals_exploitation_desc:0 "Expanding extraction of strategic minerals will support advanced military production."
 YUG_reconstruct_the_military_desc:0 "Institutional reforms will rebuild the armed forces into a modern and coherent force."
 YUG_recover_from_the_great_depression_desc:0 "Economic recovery measures will rebuild confidence and lay the foundation for growth."
 YUG_reform_high_command_desc:0 "A streamlined high command structure will improve planning and wartime decision-making."
 YUG_reinforce_the_little_entente_desc:0 "Recommitting to regional cooperation can strengthen collective security."
 YUG_remove_serb_influence_army_desc:0 "Military restructuring will reduce rival influence and centralize command authority."
 YUG_replace_the_dalmacija_desc:0 "Replacing outdated naval assets is necessary to maintain a credible fleet."
 YUG_rogozarski_desc:0 "Investment in Rogozarski will strengthen domestic aviation development."
 YUG_serbian_army_desc:0 "Maintaining strong Serbian military participation can preserve continuity in command structures."
 YUG_small_arms_development_desc:0 "Focused investment in infantry weapons will improve reliability and output."
 YUG_special_forces_doctrine_desc:0 "A dedicated doctrine for specialist units will improve their battlefield integration and impact."
 YUG_step_down_desc:0 "A managed political transition can reduce tensions and re-legitimize the government."
 YUG_synthetic_program_desc:0 "Synthetic resource production will reduce dependence on foreign imports in wartime."
 YUG_the_ik_3_desc:0 "The IK-3 project symbolizes our ambition to field modern domestically developed fighters."
 YUG_unified_army_desc:0 "A unified military command will improve cohesion, doctrine alignment, and operational effectiveness."
 YUG_ustase_general_staff_desc:0 "A centralized general staff will coordinate planning, command, and force development."
 YUG_ustase_military_desc:0 "Reorganizing loyal formations into a structured force will strengthen state control over the army."
 YUG_zmaj_desc:0 "Backing Zmaj will expand domestic aircraft production and technical expertise."
