 #### Founding rally event ####
 jap_aht.1.t: "Rally for the Establishment of the Imperial Rule Assistance Association"
 jap_aht.1.desc: "Before the inauguration of the Imperial Rule Assistance Association, a celebratory rally is held, during which the leaders of its main political groups speak. Among them is Seigo Nakano, who declares that a movement like the New Political Structure is possible only because, thanks to Japan's unique national polity, even opposing groups can unite under the Throne."
 jap_aht.1.a: "A fine point."

 #### IRAA flavour event chain ####
 jap_aht.2.t: "Transformation of the Tōhōkai"
 jap_aht.2.d: "Seigō Nakano was appointed one of the eleven executive directors of the Imperial Rule Assistance Association. Before this, he dissolved his Tōhōkai party, but not completely - he transformed it into a cultural organization named Shintōsha, after the former Kaneko academy in Dairen. Among its branches is an academy called Shintjuku, dedicated to martial arts and the study of philosophy and history, where Nakano himself sometimes lectures."
 jap_aht.2.a: "Dissolved the party, but not quite."
 jap_aht.3.t: "Nakano's Speeches"
 jap_aht.3.d: "Seigō Nakano divides most of his time between meetings of the Board of Directors of the Imperial Rule Assistance Association, during which he must advise the government on policy and public sentiment, and giving speeches that are supposed to increase public involvement in the Association's activities. Naturally, however, they tend to increase the specific weight of his own faction within it."
 jap_aht.3.a: "A cunning plan."
 jap_aht.4.t: "Reorganization of Hashimoto's Party"
 jap_aht.4.d: "Kingorō Hashimoto, who has also reorganized his Great Japan Youth Party into the Sekiseikai (Society of Sincerity), is no less active in this period than his colleagues from the 'renovationist' camp, such as Seigō Nakano. For many outsiders, this raises questions about the sincerity of Hashimoto's intentions, but they do not know that this was a condition for Hashimoto's participation in the Imperial Rule Assistance Association project and the dissolution of his party."
 jap_aht.4.a: "He schemes and plays his own game."
 jap_aht.5.t: "Accusations from Bin Akao"
 jap_aht.5.d: "The right-wing traditionalists are extremely dissatisfied with the influence of right-wing radicals in the Imperial Rule Assistance Association due to their much larger number of members. Bin Akao, now one of the leading figures in the Japanist wing, has accused his rivals of insincerity for not completely dissolving their own organizations. This is primarily addressed to Seigō Nakano and Kingorō Hashimoto."
 jap_aht.5.a: "They have provoked a public reaction."
 jap_aht.6.t: "Attack on Nakano's Supporter"
 jap_aht.6.d: "Today, a surprise attack on supporters of Seigō Nakano occurred – during his visit to Hiroshima, a young supporter from his society's youth corps was wounded with a knife. It is believed that right-wing traditionalists may be responsible. It is also of some interest that Nakano's former 'bodyguard,' Terada Inejirō, has now switched to his opponents' camp, and his former functions have since been taken over by Sato Morio, a former soldier from the fighting in China."
 jap_aht.6.a: "It seems strife and disputes have only intensified with the Association's creation."
 jap_aht.7.t: "The New Economic Structure Project"
 jap_aht.7.d: "The Kikakuin, or Cabinet Planning Board, has developed a plan for a New Economic Structure, which represents an extreme form of state control, proposing to 'liberate management from the capitalist constraints applied in the pursuit of profit.'\nThis was to be achieved by limiting dividends and public control over the appointments of top management in key industries or control bodies, which would be coordinated by the Planning Bureau of the Imperial Rule Assistance Association.\nSmall enterprises would be ruthlessly rationalized."
 jap_aht.7.a: "It should be kept secret for now."
 jap_aht.7.b: "We should begin the process of its discussion."
 jap_aht.8.t: "Criticism of the New Economic Structure"
 jap_aht.8.d: "When the plan's contents became known, it was fiercely criticized by both business and right-wing traditionalists. A leading group, including the éminence grise Toyama and General Araki, wrote a letter to the Prime Minister demanding the dismissal of socialists from the Imperial Rule Assistance Association. Some members of the same group issued a 'Manifesto in Defense of the Constitution,' pointing out that the Constitution protects private property and accusing the 'renovationists' of aiding the enemy by sowing discord."
 jap_aht.8.a: "This was to be expected."
 jap_aht.9.t: "Discussion in the Cabinet"
 jap_aht.9.d: "During cabinet discussions, the New Economic Structure plan was criticized and amended by former party ministers and finance ministers, which, however, met with some resistance from the armed forces. The revised version of the plan was sent back to the Imperial Rule Assistance Association for consideration."
 jap_aht.9.a: "Very well."
 jap_aht.10.t: "Board of Directors Meeting"
 jap_aht.10.d: "The Board of Directors of the Imperial Rule Assistance Association discussed the draft of the New Economic Structure received after the cabinet's revisions, but did not fully agree with them and leaned towards adopting its original version, developed by the Cabinet Planning Board."
 jap_aht.10.a: "They will stand by this plan to the end."
 jap_aht.11.t: "Nakano's Alternative"
 jap_aht.11.d: "Seigō Nakano, with connections to both business and the military, has attempted to devise an alternative to the original New Economic Structure project that could better serve the interests of both sides. At the Board of Directors, he presented a nine-point statement on the 'basic principles of economic reform,' criticizing the Cabinet Planning Board for 'superficial theorizing' and 'left-wing totalitarianism disguised as Imperial Way totalitarianism,' which 'disregards the practical activities of private organizations, but in the name of uniformity of private life, property, and state administration, calls for their consolidation into companies engaged in national policy.'\nIn contrast, he proposed that 'private organizations play an independent role in carrying out national policy,' allowing for some competition between them in the interests of increasing efficiency."
 jap_aht.11.d.add: "\n\nHe viewed France under the Popular Front of socialism as a catastrophic example, while Nazi Germany had found the right formula."
 jap_aht.11.a: "We will consider it."
 jap_aht.12.t: "Compromise Bill"
 jap_aht.12.d: "The creation of a worthy compromise version of the New Economic Structure project has occupied the main attention of the members of the Imperial Rule Assistance Association. It proposes a bill on industrial organizations that would provide for economic control through autonomous associations in accordance with its general plan. They would select executives to cooperate with the Kikakuin in planning and with the Ministry of Commerce and Industry in implementing projects, which would be carried out according to government instructions sent to the associations.\n\nOther features included that excess profits would be converted into bonds; small enterprises would be rationalized only in case of difficulties; wages would be proportional to efficiency, and management would not be appointed by the state, except for industrial associations, and then on the basis of nominations by members."
 jap_aht.12.a: "This is a good solution."
 jap_aht.13.t: "Difficulties with the Compromise"
 jap_aht.13.d: "Although the compromise bill was planned for discussion in parliament, the government faced such difficulties that it was decided instead to develop another version of the New Economic Structure - a system of planning by decree under the General Mobilization Law.\n\nSeigō Nakano described the compromise bill as suppressed by 'hypocritical bureaucrats and members of parliament serving liberal capitalists.' Due to the resulting direct confrontation between the government and big business, the political intervention Nakano had hoped for was ruled out, so he had little to offer the business community for their support, which, incidentally, has since waned."
 jap_aht.13.a: "This is the very last possible option for implementing economic reform."
 jap_aht.15.t: "Hiranuma's Statement"
 jap_aht.15.d: "After criticism of the government began in parliament, to control the situation, [JAP.GetLeader] brought Hiranuma into the cabinet as Minister of Home Affairs, while Akira Kazami was replaced as Minister of Justice by General Yanagawa of the 'Imperial Way' faction. Almost immediately after this reshuffle, Hiranuma stated in parliament that the Imperial Rule Assistance Association has no political status, being merely a public organization, and promised to reorganize it accordingly. After this, the reduced budget was passed, which, however, led to the swift resignation of Seigō Nakano and Kingorō Hashimoto from their posts. Nakano told reporters that the Imperial Rule Assistance Association, despite its limited budget, 'was destroyed by obsolete forces, professional right-wingers, financial capitalists, and representatives of the fifth column.'"
 jap_aht.15.a: "A harsh decision."
 jap_aht.16.t: "The Military's Attempt to Save the Association"
 jap_aht.16.d: "The military from the Tōseiha faction were dissatisfied with this turn of events, such as the rejection of economic reform projects. General Akira Mutō tried to preserve a political role for the Imperial Rule Assistance Association, but he failed. Hiranuma managed to lead a movement too powerful to overcome, aimed at eliminating all the reformist aspirations of the Association."
 jap_aht.16.a: "Does this prove that the civilian government is capable of subordinating the military?"
 jap_aht.17.t: "The Red Affair"
 jap_aht.17.d: "Today, the Kempeitai raided the Ministry of Commerce and Industry, resulting in the arrest of almost all the original authors of the new economic structure project. The secret police justify this operation on suspicion that these bureaucrats 'sympathize with socialist and communist ideas' and 'want to undermine the state system,' for which the incident has been dubbed the 'Red Affair' in the media. This is a severe blow to the reputation of the Imperial Rule Assistance Association and personally to Prince Konoe's circle. It is said that the Kempeitai operation was initiated at the behest of opponents of the plan's implementation, which gives hope that the arrested will be released quickly."
 jap_aht.17.a: "It seems the repressive machine is out of control."
 jap_aht.18.t: "Repressive Amendments to Laws"
 jap_aht.18.d: "On the initiative of the Privy Council, the House of Representatives has passed additional repressive amendments to the existing laws on the protection of the state system. This is a clear signal to those who wanted to use the Imperial Rule Assistance Association to reshape the system of state power for themselves. And it seems that this is the final stroke in its helplessness. It is believed that the main driver of these amendments was the chief opponent of the economic reform project – Kiichirō Hiranuma."
 jap_aht.18.a: "The traditional forces have won."
 jap_aht.19.t: "Reforming the Association"
 jap_aht.19.d: "The leadership of the Imperial Rule Assistance Association, headed by Arima Yoriyasu, has resigned due to the circumstances of its functioning, or rather, dysfunction. After this, Kiichirō Hiranuma was finally able to reform the Association in accordance with his plans, according to which it will be a 'public' rather than a 'political' organization: the political, planning, and parliamentary bureaus of the Association were abolished, and its prefectural branches were subordinated to the governors, that is, to the Ministry of Home Affairs."
 jap_aht.19.a: "The Association has finally become an auxiliary body of the bureaucracy."
 jap_aht.20.t: "Resignation of the Radicals"
 jap_aht.20.d: "Prime Minister [JAP.GetLeader] has dismissed the last supporters of a radical vision for the Imperial Rule Assistance Association from among the reformist bureaucrats: Naoki Hoshino and Kishi Nobusuke. Their place was taken by the influential industrialist Ogura Masatsune. However, to maintain bureaucratic balance, the main economic opponent of the project, Kobayashi Ichizō, also resigned. Now the Imperial Rule Assistance Association has finally turned into a facade and a shadow of its planned greatness – Japan continues to exist as if it never was."
 jap_aht.20.a: "The bigger they are, the harder they fall."
 jap_aht.24.t: "Nakano's Statement"
 jap_aht.24.d: "Today, Seigō Nakano published a statement in the newspapers, in which he declared that since all channels of political activity in the proper sense of the word have ceased to function, society is plunging into a vortex of intrigue, and that the Tōhōkai party will be revived to deal with this situation.\n\nThere are no legal obstacles to this, as the former parties disbanded in the struggle for participation in the new power structure, and not by coercion. Furthermore, since the Imperial Rule Assistance Association has now been declared non-political, another political party cannot be considered as competing with it."
 jap_aht.24.a: "A brilliant move. Is everything returning to how it was?"
 jap_aht.26.t: "Hatoyama Revives the Liberal Party"
 jap_aht.26.d: "Ichirō Hatoyama, long dissatisfied with the changes taking place in the country, has planned to form a group of like-minded members to revive parliamentary politics. First, a 'Census Association' was formed, and today, with Hatoyama as the group's representative, 37 members of parliament have formed the Dōkōkai party. It has been joined by former representatives of different parties, both Seiyūkai and Minseitō, and even some deputies from the Shakai Taishūtō. Hatoyama's actions have received particularly important support from the 'father of constitutional politics,' Yukio Ozaki – the oldest member of parliament, who has been a deputy since 1891 and is the country's most steadfast and radical liberal politician. In the early 30s, he left all parties and became an independent deputy, as he was disillusioned with the parties of that time and their cooperation with the military. Now, it seems, he is ready to support the new movement."
 jap_aht.26.a: "This is now becoming alarming."
