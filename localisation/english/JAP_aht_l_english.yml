 jap_aht.14.t: "Problems in Parliament"
 jap_aht.14.d: "The government has begun to face serious problems in parliament, related to attacks on the Imperial Rule Assistance Association as an unconstitutional body. One argument was that parliament was losing its independence in legislation and in conducting audits if all its members were part of a body headed by the prime minister. The absence of many 'renovationist' representatives in parliament severely hampered their ability to defend the Association from attacks in the lower house. Members of parliament decided to cut the budget of the Imperial Rule Assistance Association, while the zaibatsu cooperated with them by withholding interim funds on the basis of the alleged influence of 'reds' in the Association."
 jap_aht.14.a: "This is the beginning of the end for the Association project..."
 jap_aht.21.t: "Failure of the New Economic Structure"
 jap_aht.21.d: "One of the main goals pursued by the military from the Tōseiha faction and some of the 'renovationists,' especially from Prince Konoe's circle, in creating the Imperial Rule Assistance Association was to carry out economic reform, involving the establishment or at least partial introduction of planned elements into the Japanese economy. It is now quite clear that they will not be able to achieve it. All repeated attempts at such proposals are defeated each time due to the overly strong influence of the zaibatsu, as well as traditionalist politicians and Japanists from parliament."
 jap_aht.21.a: "Time will tell if this idea has been buried for good or merely postponed again."
 jap_aht.22.t: "Long Disputes over the Association's Status"
 jap_aht.22.d: "During six meetings of the preparatory committee of the Imperial Rule Assistance Association, sharp disagreements arose over the status of the proposed organization, as the head of the Bureau of Military Affairs (the army's main agent of influence on policy) openly called for the creation of a single national party structure. However, it was decided that the proposed body would not be a political association, as this would imply the exclusion of some part of the nation, but merely a body 'supplementing the government.' Thus, the prime minister would be its chairman by virtue of his office."
 jap_aht.22.a: "The Association is struggling to gain ground."
 jap_aht.23.t: "A Difficult Decision on the Status of Governors"
 jap_aht.23.d: "Another hotly debated issue at the meetings of the Imperial Rule Assistance Association concerned whether the heads of the Association's branches should be prefectural governors, which is crucial to the nature of this body as either administrative or political. Adopting such an option would imply a duplication of the state and 'party' hierarchy, and thus a centralization of power, as governors would now become even less dependent in their actions. Also, and perhaps more importantly, the Ministry of Home Affairs would lose its position in the state. However, in the end, the supporters of such a radical project failed to push their idea through, and it was decided not to interfere with the existing power structure at the local level."
 jap_aht.23.a: "The purpose of the Association is fading before our eyes."
