l_english:
 JAP_korea_resisting_integration:0 "Resisting Integration"
 JAP_korea_resisting_integration_desc:0 "The Korean populace resents Japanese rule and quietly resists integration into the Empire. Construction projects and resource extraction in this state suffer from non-cooperation and sabotage."
 JAP_imperial_japanese_army:0 "Imperial Japanese Army"
 JAP_imperial_japanese_army_desc:0 "The Dai-Nippon Teikoku Rikugun stands ready to expand the Empire's borders by land."
 JAP_imperial_japanese_navy:0 "Imperial Japanese Navy"
 JAP_imperial_japanese_navy_desc:0 "The Dai-Nippon Teikoku Kaigun rules the waves of the Western Pacific."
 JAP_imperial_japanese_economy:0 "Imperial Japanese Economy"
 JAP_imperial_japanese_economy_desc:0 "The economy of the Empire of Japan, bound to the zaibatsu and the demands of the military."
 JAP_zaibatsu_economy:0 "The Zaibatsu"
 JAP_zaibatsu_economy_desc:0 "The great family conglomerates dominate the economy of the Empire. The Big Four — Mitsui, Mitsubishi, Sumitomo and Yasuda — control trade, shipbuilding, metals and finance, while the upstart shinko zaibatsu Nissan and Nakajima tie their fortunes to the military."
 JAP_eco_spirit_changed_tt: "§YThe Imperial Japanese Economy is adjusted:§!"
 JAP_zaibatsu_favor_gain_tt: "§GIncreases§! our favor with this zaibatsu"
 JAP_zaibatsu_big4_favor_loss_tt: "§RThe Big Four resent the rise of the shinko zaibatsu§! (§R-5§! favor each)"
 JAP_zaibatsu_mitsui_trading_contracts: "Mitsui Trading Contracts"
 JAP_zaibatsu_mitsui_trading_contracts_desc: "Mitsui Bussan operates the largest trading network in Asia. Contract their merchant fleet and overseas offices to supply consumer markets."
 JAP_zaibatsu_mitsui_trading_contracts_tt: "§GConsumer Goods: -0.2%§!, gain §G15§! convoys"
 JAP_zaibatsu_mitsui_miike_expansion: "Expand the Miike Mines"
 JAP_zaibatsu_mitsui_miike_expansion_desc: "The Miike coal mines in Kyushu are the largest in Japan and the heart of Mitsui's industrial holdings. Fund their expansion."
 JAP_zaibatsu_mitsui_miike_expansion_tt: "§GResource Gain Efficiency: +2%§!, §G+30§! Coal and §G+10§! Steel in Kyushu"
 JAP_zaibatsu_mitsubishi_naval_contracts: "Mitsubishi Naval Contracts"
 JAP_zaibatsu_mitsubishi_naval_contracts_desc: "Mitsubishi Heavy Industries builds the Navy's finest warships. Steady contracts keep their slipways and engineers busy."
 JAP_zaibatsu_mitsubishi_naval_contracts_tt: "§GDockyard Output: +1%§!, gain §G10§! Navy Experience"
 JAP_zaibatsu_mitsubishi_nagasaki_expansion: "Expand the Nagasaki Shipyard"
 JAP_zaibatsu_mitsubishi_nagasaki_expansion_desc: "The Mitsubishi shipyard at Nagasaki is among the greatest in the world — and will one day lay down the largest battleship ever built."
 JAP_zaibatsu_mitsubishi_nagasaki_expansion_tt: "§GDockyard Construction Speed: +5%§!, §G+1§! Dockyard in Kyushu"
 JAP_zaibatsu_sumitomo_metal_contracts: "Sumitomo Metal Contracts"
 JAP_zaibatsu_sumitomo_metal_contracts_desc: "Sumitomo Metal Industries supplies steel, copper and light alloys to the arsenals. Their refined output stretches every ton of ore further."
 JAP_zaibatsu_sumitomo_metal_contracts_tt: "§GLack of Resources Penalty: -5%§!"
 JAP_zaibatsu_sumitomo_besshi_refineries: "Expand the Besshi Refineries"
 JAP_zaibatsu_sumitomo_besshi_refineries_desc: "The Besshi copper mine on Shikoku has been worked by the Sumitomo family for 250 years. Modern refineries at Niihama will multiply its output."
 JAP_zaibatsu_sumitomo_besshi_refineries_tt: "§GCivilian Factory Construction Speed: +5%§!, §G+15§! Steel and §G+10§! Aluminium on Shikoku"
 JAP_zaibatsu_yasuda_war_bonds: "Yasuda Bond Issues"
 JAP_zaibatsu_yasuda_war_bonds_desc: "The Yasuda banking house can float government bonds through its vast financial network, easing the cost of state policy."
 JAP_zaibatsu_yasuda_war_bonds_tt: "§GDaily Political Power Gain: +2%§!"
 JAP_zaibatsu_yasuda_industrial_loans: "Yasuda Industrial Loans"
 JAP_zaibatsu_yasuda_industrial_loans_desc: "Cheap credit from the Yasuda and Third Banks lets industry expand without burdening the household economy."
 JAP_zaibatsu_yasuda_industrial_loans_tt: "§GConsumer Goods: -0.5%§!, §GConstruction Speed: +2.5%§!"
 JAP_zaibatsu_nissan_motorization_contracts: "Nissan Motorization Contracts"
 JAP_zaibatsu_nissan_motorization_contracts_desc: "Aikawa Yoshisuke's Nissan combine builds trucks and vehicles for the Army. The generals favor the ambitious newcomer over the old houses."
 JAP_zaibatsu_nissan_motorization_contracts_tt: "§GFactory Efficiency Gain: +2%§!, gain §G250§! Motorized Equipment"
 JAP_zaibatsu_nissan_mangyo: "Found the Manchurian Industrial Development Company"
 JAP_zaibatsu_nissan_mangyo_desc: "Aikawa is prepared to move the entire Nissan combine to Manchukuo and take over industrial development of the puppet state — a project the Kwantung Army enthusiastically backs, and the old zaibatsu deeply resent."
 JAP_zaibatsu_nissan_mangyo_tt: "§GFactory Output: +2%§!, §G+1§! Civilian Factory in Fengtian"
 JAP_zaibatsu_nakajima_aircraft_contracts: "Nakajima Aircraft Contracts"
 JAP_zaibatsu_nakajima_aircraft_contracts_desc: "Nakajima Hikoki is the Army's favored aircraft maker, run by the fiercely nationalist Nakajima Chikuhei. Contracts sharpen their production lines."
 JAP_zaibatsu_nakajima_aircraft_contracts_tt: "§GProduction Efficiency Cap: +2%§!, gain §G15§! Air Experience"
 JAP_zaibatsu_nakajima_ota_plant: "Expand the Ota Plant"
 JAP_zaibatsu_nakajima_ota_plant_desc: "Nakajima's home factory at Ota in Gunma prefecture can be expanded into one of the largest aircraft plants in the world."
 JAP_zaibatsu_nakajima_ota_plant_tt: "§GMilitary Factory Construction Speed: +5%§!, §G+1§! Military Factory in Kanto"
 JAP_zaibatsu_demands_incoming_tt: "§RA zaibatsu will make demands of the government§!"
 JAP_zaibatsu_demand_resolved_tt: "§GThe demands are satisfied§! (§G+10§! favor)"
 JAP_zaibatsu_obstruction_ended_tt: "§GThe obstruction ends and the penalties are lifted§! (§G+10§! favor)"
 JAP_zaibatsu_big4_plus5_tt: "§G+5§! favor with each of the Big Four"
