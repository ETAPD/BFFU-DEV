 #################### HIROTA ERA - February 26 Incident ####################
 JAP_niniroku_jiken: "The February 26 Incident"
 JAP_niniroku_jiken_desc: "Before dawn on 26 February 1936, young officers of the Kodoha faction led some 1,400 soldiers in a revolt in central Tokyo, assassinating senior statesmen in a bid for a 'Showa Restoration'. The uprising would be crushed within days - but it would reshape the government and bring Hirota Koki to power."
 JAP_niniroku_jiken_occurred_tt: "§RThe February 26th Incident has occurred.§! The uprising runs its bloody course - this is a matter of history, not choice."

 JAP_kokiscabinetforms: "Koki's Cabinet Forms"
 JAP_kokiscabinetforms_desc: "With the rebels suppressed and Okada's government discredited, Hirota Koki assembles a new cabinet - one that must satisfy both the Diet and an emboldened military if it is to survive."
 JAP_hirota_limited_time_tt: "§RHirota Koki's cabinet is living on borrowed time.§!\n§RThis branch is only available until §Y2 February 1937§!§R.§!\n§RAfter that date the connected reforms are §Rlocked§!§R, Hirota is forced from office, and General Senjuro Hayashi takes power.§!"

 JAP_hirotaoutoftime: "Hirota Out of Time"
 JAP_hirotaoutoftime_desc: "Caught between the irreconcilable demands of the military and the Diet, Hirota's coalition has collapsed. His reform window has closed."
 JAP_hirota_has_failed_tt: "§RHirota Koki has run out of time. His cabinet collapses and General Senjuro Hayashi is called upon to form a government.§!"

 JAP_hayashi_enters_office: "Hayashi Enters Office"
 JAP_hayashi_enters_office_desc: "The aged general Senjuro Hayashi forms a short-lived cabinet, leaning ever harder on the army for support."

 JAP_remnants_of_the_coup: "Remnants of the Coup"
 JAP_remnants_of_the_coup_desc: "The bloody suppression of the February 26 Incident has left Tokyo tense and the government on edge. Order has been restored - but trust has not, and the capital remains uneasy."

 #################### HIROTA ERA - Events ####################
 JAP_rework.1.t: "The February 26 Incident"
 JAP_rework.1.desc: "In the pre-dawn snow of 26 February 1936, some fourteen hundred soldiers of the First Division - led by young Kodoha officers - have seized central Tokyo. They have cut down ministers in their own homes in the name of a 'Showa Restoration', demanding the purge of the Emperor's 'corrupt advisors'.\n\nThe Emperor is said to be incandescent with rage and has ordered the rebels crushed. The cabinet of Keisuke Okada lies in ruins. When the smoke clears, it will fall to Hirota Koki to restore order to a shaken nation."
 JAP_rework.1.a: "The rebellion must be put down."
 JAP_rework.2.t: "Hirota's Cabinet Falls"
 JAP_rework.2.desc: "Caught between the relentless demands of the military and a resentful Diet, the government of Hirota Koki has finally collapsed under the strain. With his coalition gone, the aged general Senjuro Hayashi is summoned to form a new cabinet - one that will lean still further on the army."
 JAP_rework.2.a: "Hirota's time is up."
