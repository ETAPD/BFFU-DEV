 JAP_zaibatsu_nissan_plus10_tt: "§G+10§! favor with Nissan"
 JAP_zaibatsu_nissan_minus10_tt: "§R-10§! favor with Nissan"
 JAP_zaibatsu_nakajima_plus15_tt: "§G+15§! favor with Nakajima"
 JAP_zaibatsu_nakajima_plus10_tt: "§G+10§! favor with Nakajima"
 JAP_zaibatsu_nakajima_minus10_tt: "§R-10§! favor with Nakajima"
 JAP_zaibatsu_split_plus5_tt: "§G+5§! favor with Nakajima and Mitsubishi"
 jap_zaibatsu.11.t: "Shadow of the Assassins"
 jap_zaibatsu.11.d: "The blood of the February 26 uprising has barely dried. The great zaibatsu houses remember Dan Takuma, gunned down outside Mitsui headquarters, and fear the young officers' wrath. They look to the government — will it shake them down in the name of national unity, or shield them from the radicals?"
 jap_zaibatsu.11.a: "The nation requires patriotic donations"
 jap_zaibatsu.11.b: "Guarantee their safety"
 jap_zaibatsu.12.t: "Strike at the Besshi Mine"
 jap_zaibatsu.12.d: "Miners at Sumitomo's ancient Besshi copper works have downed tools over wages and conditions. Sumitomo demands police action; the Home Ministry counsels arbitration."
 jap_zaibatsu.12.a: "Send in the police"
 jap_zaibatsu.12.b: "Force arbitration"
 jap_zaibatsu.1.t: "Nissan Looks to Manchuria"
 jap_zaibatsu.1.d: "Aikawa Yoshisuke proposes to move the entire Nissan combine to Manchukuo and assume control of the puppet state's industrial development as the Manchurian Industrial Development Company. The Kwantung Army backs him enthusiastically — and the old houses see a rival being handed an empire."
 jap_zaibatsu.1.a: "Approve the move"
 jap_zaibatsu.1.b: "The old houses come first"
 jap_zaibatsu.13.t: "The Yasuda Consolidation"
 jap_zaibatsu.13.d: "The Yasuda banking house seeks government blessing to absorb several regional banks into its network, further concentrating Japanese finance in zaibatsu hands."
 jap_zaibatsu.13.a: "Approve the merger"
 jap_zaibatsu.13.b: "Block it"
 jap_zaibatsu.2.t: "The National Mobilization Law"
 jap_zaibatsu.2.d: "The Diet debates a law granting the government sweeping authority over labor, prices, and industry itself. The zaibatsu see expropriation dressed in patriotic clothes; the military sees the engine of total war."
 jap_zaibatsu.2.a: "Enforce it to the letter"
 jap_zaibatsu.2.a_tt: "§GMilitary Factory Construction Speed: +5%§!, §GConsumer Goods: -0.5%§!"
 jap_zaibatsu.2.b: "Water down the provisions"
 jap_zaibatsu.2.b_tt: "§GMilitary Factory Construction Speed: +2%§!"
 jap_zaibatsu.2.c: "Exempt the great houses"
 jap_zaibatsu.3.t: "The Fighter Contract"
 jap_zaibatsu.3.d: "The Army Air Service must choose its next mainline fighter. Nakajima's works promise rugged, mass-produced machines; Mitsubishi's engineers promise elegance and range. Whoever wins will dominate aircraft production for years."
 jap_zaibatsu.3.a: "Nakajima delivers for the Army"
 jap_zaibatsu.3.a_tt: "§GProduction Efficiency Cap: +2%§!"
 jap_zaibatsu.3.b: "Mitsubishi's design is superior"
 jap_zaibatsu.3.b_tt: "§GProduction Efficiency Gain: +2%§!"
 jap_zaibatsu.3.c: "Split the contracts"
 jap_zaibatsu.3.c_tt: "§RConsumer Goods: +0.2%§! (duplicated tooling)"
 jap_zaibatsu.14.t: "Mangyo Struggles"
 jap_zaibatsu.14.d: "Aikawa's Manchurian venture is starved of capital. American investment never came, the Army interferes in every decision, and the combine bleeds money. He asks Tokyo for relief."
 jap_zaibatsu.14.a: "Bail out the combine"
 jap_zaibatsu.14.b: "Aikawa made his bed"
 jap_zaibatsu.4.t: "The Economic New Order"
 jap_zaibatsu.4.d: "Reform bureaucrats around Kishi Nobusuke propose the Economic New Order: separation of ownership and management, profits capped, production directed by the state. The zaibatsu denounce it as communism in bureaucrat's clothing."
 jap_zaibatsu.4.a: "Back the reform bureaucrats"
 jap_zaibatsu.4.a_tt: "§GCiv to Mil Factory Conversion Cost: -10%§!"
 jap_zaibatsu.4.b: "Side with the zaibatsu"
 jap_zaibatsu.4.c: "Forge a compromise"
 jap_zaibatsu.4.c_tt: "§GCiv to Mil Factory Conversion Cost: -5%§!"
 jap_zaibatsu.5.t: "The Embargo Bites"
 jap_zaibatsu.5.d: "The American export freeze has severed the trade arteries of the Empire. Mitsui Bussan, whose ships and ledgers spanned the Pacific, watches its commercial empire wither. (§R-10§! favor with Mitsui)"
 jap_zaibatsu.5.a: "Subsidize the trading houses"
 jap_zaibatsu.5.a_tt: "§RConsumer Goods: +0.5%§!"
 jap_zaibatsu.5.b: "They must adapt on their own"
 jap_zaibatsu.5.b_tt: "§RResource Gain Efficiency: -2%§!"
 jap_zaibatsu.15.t: "Steel for Engines"
 jap_zaibatsu.15.d: "Nakajima's engine plants demand priority allocation of special steels — the same alloys Sumitomo Metal needs for naval orders. There is not enough for both."
 jap_zaibatsu.15.a: "Nakajima gets priority"
 jap_zaibatsu.15.b: "Sumitomo keeps its allocation"
 jap_zaibatsu.16.t: "Hulls for the Merchant Marine"
 jap_zaibatsu.16.d: "Submarines are bleeding the merchant fleet white. Mitsubishi's yards can lay down warships or standard merchantmen — not both at full tempo."
 jap_zaibatsu.16.a: "Warships first"
 jap_zaibatsu.16.a_tt: "§RConsumer Goods: +0.5%§! (merchant losses mount)"
 jap_zaibatsu.16.b: "The convoys must sail"
 jap_zaibatsu.16.b_tt: "§GConsumer Goods: -0.2%§!, gain §G25§! convoys"
 jap_zaibatsu.6.t: "The Munitions Ministry"
 jap_zaibatsu.6.d: "Tojo's government establishes the Ministry of Munitions to seize direct control of war production. Every zaibatsu plant, every allocation, every contract now flows through the state — if the great houses can be made to obey."
 jap_zaibatsu.6.a: "Total conversion"
 jap_zaibatsu.6.a_tt: "§GFactory Output: +5%§!, §GCiv to Mil Conversion Cost: -10%§!, §RConsumer Goods: +1%§!"
 jap_zaibatsu.6.b: "A cooperative scheme"
 jap_zaibatsu.6.b_tt: "§GFactory Output: +2%§!"
 jap_zaibatsu.obstruction.a: "They dare..."
 jap_zaibatsu.21.t: "Mitsui Obstructs the Government"
 jap_zaibatsu.21.d: "Slighted once too often, Mitsui's directors quietly strangle the government's trade. Imports stall in warehouses, commodities vanish from markets, and prices climb."
 JAP_zaibatsu_mitsui_obstruction_tt: "§RConsumer Goods: +1%, Resource Gain Efficiency: -2%§! until Mitsui is appeased"
 jap_zaibatsu.22.t: "Mitsubishi Obstructs the Government"
 jap_zaibatsu.22.d: "Mitsubishi's shipyards discover endless technical difficulties. Slipways stand idle, deliveries slip, and the Navy's building program grinds."
 JAP_zaibatsu_mitsubishi_obstruction_tt: "§RDockyard Output: -5%, Dockyard Construction Speed: -5%§! until Mitsubishi is appeased"
 jap_zaibatsu.23.t: "Sumitomo Obstructs the Government"
 jap_zaibatsu.23.d: "Sumitomo's mills slow their deliveries of steel and alloys. Arsenals report shortages within weeks."
 JAP_zaibatsu_sumitomo_obstruction_tt: "§RLack of Resources Penalty: +10%§! until Sumitomo is appeased"
 jap_zaibatsu.24.t: "Yasuda Obstructs the Government"
 jap_zaibatsu.24.d: "The Yasuda banks tighten credit to government suppliers and slow-walk every bond issue. The machinery of state creaks for want of money."
 JAP_zaibatsu_yasuda_obstruction_tt: "§RDaily Political Power Gain: -5%, Consumer Goods: +0.5%§! until Yasuda is appeased"
 jap_zaibatsu.25.t: "Nissan Obstructs the Government"
 jap_zaibatsu.25.d: "Aikawa's combine drags its feet on every army order. Trucks arrive late, production lines retool slowly, and the motorization program stalls."
 JAP_zaibatsu_nissan_obstruction_tt: "§RProduction Efficiency Gain: -3%, Civ to Mil Conversion Cost: +5%§! until Nissan is appeased"
 jap_zaibatsu.26.t: "Nakajima Obstructs the Government"
 jap_zaibatsu.26.d: "Nakajima Chikuhei's political allies tie procurement in knots while his plants slow deliveries. Aircraft production falters."
 JAP_zaibatsu_nakajima_obstruction_tt: "§RProduction Efficiency Cap: -3%, Military Factory Construction Speed: -5%§! until Nakajima is appeased"
 jap_zaibatsu.reward.a: "Excellent"
 jap_zaibatsu.31.t: "Mitsui Opens its Network"
 jap_zaibatsu.31.d: "Decades of favor repaid: Mitsui Bussan places its global trading network at the government's disposal."
 jap_zaibatsu.31.tt: "§GResource Gain Efficiency: +2%§!"
 jap_zaibatsu.32.t: "Mitsubishi's Master Shipwrights"
 jap_zaibatsu.32.d: "Mitsubishi assigns its best engineers and foremen to the Navy's program."
 jap_zaibatsu.32.tt: "§GDockyard Output: +2%§!"
 jap_zaibatsu.33.t: "Sumitomo's Refined Alloys"
 jap_zaibatsu.33.d: "Sumitomo Metal shares its proprietary refining processes with the arsenals."
 jap_zaibatsu.33.tt: "§GLack of Resources Penalty: -5%§!"
 jap_zaibatsu.34.t: "The Yasuda Purse Opens"
 jap_zaibatsu.34.d: "The Yasuda banks extend the government a permanent line of cheap credit."
 jap_zaibatsu.34.tt: "§GDaily Political Power Gain: +2%§!"
 jap_zaibatsu.35.t: "Nissan's Modern Methods"
 jap_zaibatsu.35.d: "Nissan's American-style production engineering spreads through Japanese industry."
 jap_zaibatsu.35.tt: "§GProduction Efficiency Gain: +2%§!"
 jap_zaibatsu.36.t: "Nakajima's Production Lines"
 jap_zaibatsu.36.d: "Nakajima shares its line-production techniques with the Army's other suppliers."
 jap_zaibatsu.36.tt: "§GProduction Efficiency Cap: +2%§!, gain §G25§! Air Experience"
 jap_zaibatsu.41.t: "The House of Mitsui Stands With Us"
 jap_zaibatsu.41.d: "Mitsui places its entire merchant marine and trading empire in the service of the throne."
 jap_zaibatsu.41.tt: "§GConsumer Goods: -0.5%§!, gain §G50§! convoys"
 jap_zaibatsu.42.t: "The House of Mitsubishi Stands With Us"
 jap_zaibatsu.42.d: "Mitsubishi commits everything — yards, engineers, capital — to the Imperial Navy."
 jap_zaibatsu.42.tt: "§GDockyard Construction Speed: +5%§!, gain §G50§! Navy Experience"
 jap_zaibatsu.43.t: "The House of Sumitomo Stands With Us"
 jap_zaibatsu.43.d: "Sumitomo opens new mills in Kansai dedicated entirely to war production."
 jap_zaibatsu.43.tt: "§G+25§! Steel in Kansai"
 jap_zaibatsu.44.t: "The House of Yasuda Stands With Us"
 jap_zaibatsu.44.d: "Yasuda's financiers underwrite the war effort without reservation."
 jap_zaibatsu.44.tt: "§G+150§! Political Power, §GStability: +1%§!"
 jap_zaibatsu.45.t: "The House of Nissan Stands With Us"
 jap_zaibatsu.45.d: "Aikawa's combine becomes the motor pool of the Empire."
 jap_zaibatsu.45.tt: "§GCiv to Mil Conversion Cost: -5%§!, gain §G500§! Motorized Equipment"
 jap_zaibatsu.46.t: "The House of Nakajima Stands With Us"
 jap_zaibatsu.46.d: "Nakajima Hikoki devotes itself utterly to filling the Empire's skies."
 jap_zaibatsu.46.tt: "§GMilitary Factory Construction Speed: +5%§!"
 JAP_zaibatsu_mitsui_demands_mission: "Mitsui Demands Redress"
 JAP_zaibatsu_mitsui_demands_mission_desc: "The House of Mitsui expects the government to make amends. Grant concessions before their patience runs out, or they will obstruct the economy."
 JAP_zaibatsu_mitsubishi_demands_mission: "Mitsubishi Demands Redress"
 JAP_zaibatsu_mitsubishi_demands_mission_desc: "The House of Mitsubishi expects the government to make amends. Grant concessions before their patience runs out, or they will obstruct the economy."
 JAP_zaibatsu_sumitomo_demands_mission: "Sumitomo Demands Redress"
 JAP_zaibatsu_sumitomo_demands_mission_desc: "The House of Sumitomo expects the government to make amends. Grant concessions before their patience runs out, or they will obstruct the economy."
 JAP_zaibatsu_yasuda_demands_mission: "Yasuda Demands Redress"
 JAP_zaibatsu_yasuda_demands_mission_desc: "The House of Yasuda expects the government to make amends. Grant concessions before their patience runs out, or they will obstruct the economy."
 JAP_zaibatsu_nissan_demands_mission: "Nissan Demands Redress"
 JAP_zaibatsu_nissan_demands_mission_desc: "The Nissan combine expects the government to make amends. Grant concessions before their patience runs out, or they will obstruct the economy."
 JAP_zaibatsu_nakajima_demands_mission: "Nakajima Demands Redress"
 JAP_zaibatsu_nakajima_demands_mission_desc: "Nakajima Hikoki expects the government to make amends. Grant concessions before their patience runs out, or they will obstruct the economy."
 JAP_zaibatsu_grant_concessions_mitsui: "Grant Concessions to Mitsui"
 JAP_zaibatsu_grant_concessions_mitsui_desc: "Tax relief, contract guarantees, and a public bow to the house's dignity."
 JAP_zaibatsu_grant_concessions_mitsubishi: "Grant Concessions to Mitsubishi"
 JAP_zaibatsu_grant_concessions_mitsubishi_desc: "Tax relief, contract guarantees, and a public bow to the house's dignity."
 JAP_zaibatsu_grant_concessions_sumitomo: "Grant Concessions to Sumitomo"
 JAP_zaibatsu_grant_concessions_sumitomo_desc: "Tax relief, contract guarantees, and a public bow to the house's dignity."
 JAP_zaibatsu_grant_concessions_yasuda: "Grant Concessions to Yasuda"
 JAP_zaibatsu_grant_concessions_yasuda_desc: "Tax relief, contract guarantees, and a public bow to the house's dignity."
 JAP_zaibatsu_grant_concessions_nissan: "Grant Concessions to Nissan"
 JAP_zaibatsu_grant_concessions_nissan_desc: "Capital injections, army contracts, and a freer hand in Manchuria."
 JAP_zaibatsu_grant_concessions_nakajima: "Grant Concessions to Nakajima"
 JAP_zaibatsu_grant_concessions_nakajima_desc: "Steel allocations, engine contracts, and a seat at the procurement table."
 JAP_zaibatsu_appease_mitsui: "Appease Mitsui"
 JAP_zaibatsu_appease_mitsui_desc: "Settle the dispute on the house's terms and end the obstruction."
 JAP_zaibatsu_appease_mitsubishi: "Appease Mitsubishi"
 JAP_zaibatsu_appease_mitsubishi_desc: "Settle the dispute on the house's terms and end the obstruction."
 JAP_zaibatsu_appease_sumitomo: "Appease Sumitomo"
 JAP_zaibatsu_appease_sumitomo_desc: "Settle the dispute on the house's terms and end the obstruction."
 JAP_zaibatsu_appease_yasuda: "Appease Yasuda"
 JAP_zaibatsu_appease_yasuda_desc: "Settle the dispute on the house's terms and end the obstruction."
 JAP_zaibatsu_appease_nissan: "Appease Nissan"
 JAP_zaibatsu_appease_nissan_desc: "Settle the dispute on the combine's terms and end the obstruction."
 JAP_zaibatsu_appease_nakajima: "Appease Nakajima"
 JAP_zaibatsu_appease_nakajima_desc: "Settle the dispute on the company's terms and end the obstruction."
 JAP_reorganize_the_war_economy: "Reorganize the War Economy"
 JAP_reorganize_the_war_economy_desc: "The Empire's industry must serve the military first. Establishing central direction over the zaibatsu opens the door to a managed economy — and to playing the great houses against one another."
 JAP_empower_the_shinko_zaibatsu: "Empower the Shinko Zaibatsu"
 JAP_empower_the_shinko_zaibatsu_desc: "The new combines — Nissan and Nakajima — owe their fortunes to military contracts, not inherited wealth. Favour them over the conservative Big Four and bind capital to the army's needs."
 JAP_motorize_the_army: "Motorize the Army"
 JAP_motorize_the_army_desc: "Nissan's automobile works retool for military trucks and tractors, dragging the Imperial Army into the age of the engine."
 JAP_found_mangyo_focus: "Found Mangyo"
 JAP_found_mangyo_focus_desc: "Hand Ayukawa's Nissan combine the keys to Manchuria. The Manchurian Industrial Development Company will become the arsenal of the continent."
 JAP_aircraft_for_the_empire: "Aircraft for the Empire"
 JAP_aircraft_for_the_empire_desc: "Nakajima moves from licensed assembly to original design. The Ota plant will pour out warplanes for the coming struggle."
 JAP_break_the_old_houses: "Break the Old Houses"
 JAP_break_the_old_houses_desc: "The Big Four have grown fat on the Empire's blood. Strip them of their privileges and seize their assets for the war machine — they will not forgive it, and they will fight back."
 JAP_the_military_industrial_order: "The Military-Industrial Order"
 JAP_the_military_industrial_order_desc: "Capital and the sword are now one. The new economic order answers to the General Staff alone, and the factories of the Empire run day and night."
 JAP_zaibatsu_economy_unlocked_tt: "§YUnlocks the §HThe Zaibatsu§! decision category§!"
 JAP_shinko_zaibatsu_unlocked_tt: "§YUnlocks the §HNissan§! and §HNakajima§! investment decisions§!"
 JAP_mangyo_unlocked_tt: "§YUnlocks the §HFound the Manchurian Industrial Development Company§! decision§!"
 JAP_nakajima_ota_unlocked_tt: "§YUnlocks the §HExpand the Ota Plant§! decision§!"
 JAP_zaibatsu_rivalry_active_tt: "§RThe great houses begin to make demands of the state§!"
 JAP_zaibatsu_big4_minus20_tt: "§RMitsui, Mitsubishi, Sumitomo and Yasuda favour: -20§!"
 JAP_accommodate_the_big_four: "Accommodate the Big Four"
 JAP_accommodate_the_big_four_desc: "Mitsui, Mitsubishi, Sumitomo and Yasuda built modern Japan. Work with the great houses rather than against them — their goodwill is worth more than the army's ambitions."
 JAP_the_zaibatsu_banks: "The Zaibatsu Banks"
 JAP_the_zaibatsu_banks_desc: "The financial arms of Mitsui and Yasuda underwrite the state's ambitions, smoothing the flow of capital to where it is needed."
 JAP_heavy_industry_partnership: "Heavy Industry Partnership"
 JAP_heavy_industry_partnership_desc: "Mitsubishi and Sumitomo are given a free hand in shipbuilding and metals, and they reward the Empire with steel and hulls."
 JAP_the_trading_houses: "The Trading Houses"
 JAP_the_trading_houses_desc: "Mitsui Bussan and the other sogo shosha extend the Empire's commercial reach across Asia, securing raw materials and shipping."
 JAP_cartel_agreements: "Cartel Agreements"
 JAP_cartel_agreements_desc: "Formal cartels let the great houses divide markets and police themselves. With their interests secured, the zaibatsu will no longer obstruct the war economy."
 JAP_partnership_of_throne_and_capital: "Partnership of Throne and Capital"
 JAP_partnership_of_throne_and_capital_desc: "Throne, state and capital move as one. The conservative order endures, and the factories of the Empire hum with confident, well-funded industry."
 JAP_zaibatsu_cartel_tt: "§GThe zaibatsu will no longer obstruct the war economy (no obstruction events)§!"
 JAP_zaibatsu_mitsubishi_superheavy_shipyard: "Mitsubishi Super-Heavy Shipyard"
 JAP_zaibatsu_mitsubishi_superheavy_shipyard_desc: "Mitsubishi Heavy Industries expands its Nagasaki yards to slipways capable of building the largest warships afloat."
 JAP_zaibatsu_mitsubishi_superheavy_shipyard_tt: "§GDockyard Output: +5%§!, §GNaval Construction Speed: +5%§!, builds §Y2 dockyards§! in Kyushu"
 JAP_zaibatsu_sumitomo_light_metals_combine: "Sumitomo Light Metals Combine"
 JAP_zaibatsu_sumitomo_light_metals_combine_desc: "Sumitomo consolidates aluminium smelting and alloy production into a single combine, easing the Empire's chronic light-metals shortage."
 JAP_zaibatsu_sumitomo_light_metals_combine_tt: "§GResource Shortage Penalty: -10%§!, §G+20 Aluminium§! in Shikoku"
 JAP_zaibatsu_mitsui_keiretsu_expansion: "Mitsui Keiretsu Expansion"
 JAP_zaibatsu_mitsui_keiretsu_expansion_desc: "The Mitsui combine extends its reach across every sector of the economy, from mining to manufacturing to shipping."
 JAP_zaibatsu_mitsui_keiretsu_expansion_tt: "§GFactory Output: +3%§!, builds §Y1 civilian factory§!, §Y25 convoys§!"
