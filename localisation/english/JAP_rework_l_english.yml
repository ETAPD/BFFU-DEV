 JAP_zaibatsu_mitsubishi_minus10_tt: "§R-10§! favor with Mitsubishi"
 JAP_zaibatsu_mitsubishi_minus5_tt: "§R-5§! favor with Mitsubishi"
 JAP_zaibatsu_sumitomo_plus10_tt: "§G+10§! favor with Sumitomo"
 JAP_zaibatsu_sumitomo_minus10_tt: "§R-10§! favor with Sumitomo"
