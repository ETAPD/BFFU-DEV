JAP_niniroku_jiken:0 "Ni-Niroku Jiken"
JAP_niniroku_jiken_desc:0 "The February 26 Incident (二・二六事件, Ni Ni-Roku Jiken) was an attempted coup d'état in the Empire of Japan from 26 to 29 February 1936, launched by radical young Imperial Japanese Army (IJA) officers."
JAP_transport_submarine_technology:0 "Transport Submarine Technology"
JAP_transport_submarine_technology_desc:0 "Fill"
JAP_kokiscabinetforms:0 "Koki's Cabinet Forms"
JAP_kokiscabinetforms_desc:0 "Following the February 26, 1936, Incident and Okada Keisuke’s resignation, Hirota Kōki emerged as a compromise prime minister acceptable to both civilian and military factions. His cabinet formation revealed the military’s growing influence, as Hirota altered ministerial appointments in response to objections from Army Minister Count Terauchi."
JAP_kyoikukaigicouncilestablished:0 "Kyōiku Kaigi Council Established"
JAP_kyoikukaigicouncilestablished_desc:0 "established in 1935 was an advisory body to the Japanese Minister of Education. It functioned as a tool for the state to centralise control over schooling, standardising curricula and shifting educational goals toward extreme nationalism and militarism."
JAP_noborito_research_institute:0 "Noborito Research Institute"
JAP_noborito_research_institute_desc:0 "The Noborito Research Institute, officially known as the Ninth Army Technical Research Laboratory, was a covert facility of the Imperial Japanese Army. Established in September 1939 in the Noborito area of Kawasaki, Kanagawa Prefecture, it specialized in unconventional warfare technologies, espionage, sabotage, and the development of clandestine and biological weapons."
JAP_hirotaoutoftime:0 "Hirota Out of Time..."
JAP_hirotaoutoftime_desc:0 "He resigned after a disagreement with Hisaichi Terauchi, who was serving as the war minister, over a speech by the Rikken Seiyūkai representative Kunimatsu Hamada criticizing military interference in politics."
JAP_reformthekakushinkanryo:0 "Reform the Kakushin Kanryō"
JAP_reformthekakushinkanryo_desc:0 "Widely viewed as originating in the military, the proposal called for the establishment of a central personnel agency under the direct control of the prime minister and for the expansion of the scope of discretionary appointment. The former was aimed at increasing government efficiency by combating "sectionalism""
JAP_rebuild_the_agricultural_sector:0 "Rebuild the Agricultural Sector"
JAP_rebuild_the_agricultural_sector_desc:0 "During the early 1930s, the Japanese government introduced the Tenant Arbitration Ordinance (1932) to manage intense landlord-tenant conflicts. To further widen this legal framework, Japan enacted the Farm Tenancy Conciliation Act in 1935 (and corresponding amendments to the 1922 Leased Land and Leased House Conciliation Act). This allowed for out-of-court dispute mediation regarding rent reductions, evictions, and renewals without resorting to costly civil litigation"
JAP_renewed_ministries_of_trade_and_industry:0 "Renewed Ministries of Trade and Industry"
JAP_renewed_ministries_of_trade_and_industry_desc:0 "By offering the miliary a hand-picked cabinet per the decree on May 18, 1936, Hirota has gained crucial time to enact economic reforms"
JAP_reform_the_tax_system:0 "Reform the Tax System"
JAP_reform_the_tax_system_desc:0 "The Hirota' Cabinet, attempted a revision of the\ntax system which ended in failure. Mr. Yuki, Finance Minister of the Hayashi Cabinet, managed to meet the urgent needs of national finance by means of an enactment known as the "temporary tax increment law", which provided for taxation levied on the capital of juridical persons, a special tax on bonds in foreign currencies, a gasolene tax and a tax\non the transfer of negotiable instruments at the same time initiating the temporary grants in aid fund amounting to some\n¥ 100,000,000"
JAP_address_the_housing_crisis:0 "Address the Housing Crisis"
JAP_address_the_housing_crisis_desc:0 "As Japan industrialized rapidly, rural peasants and workers flooded into cities like Tokyo and Osaka. This migration triggered massive overcrowding and fueled massive, unsanitary slum districts. Most urban working-class families were confined to cramped, flammable wooden row houses known as nagaya, which lacked proper plumbing, ventilation, or earthquake safety."
JAP_assure_the_military_of_the_civilian_sector:0 "Assure the Military of the Civilian Sector"
JAP_assure_the_military_of_the_civilian_sector_desc:0 "Under Prime Minister Hirota, per Hirohito's decree on May 18, 1936, only active military personnel could assume the posts of Army and Navy ministers (previously reserved for retirees), granting them the ability to advocate for the defense industry's interests."
JAP_begin_the_imperial_liaison_conferences:0 "Begin the Imperial Liaison Conferences"
JAP_begin_the_imperial_liaison_conferences_desc:0 "These meetings were a tripartite assembly that included :\nThe Prime Minister and the Foreign Minister.The The Minister of War and the Chief of the Army General Staff\nThe Minister of the Navy and the Chief of the Navy General Staff"
JAP_hayashi_enters_office:0 "Hayashi Enters Office"
JAP_hayashi_enters_office_desc:0 "Following Hirota's outburst, a 4 month replacement Hayashi enters with short time, attempts to reign in factionalism"
