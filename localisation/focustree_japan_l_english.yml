JAP_anotherresignation:0 "Another Resignation..."
JAP_anotherresignation_desc:0 "after only a few months in office, he threw government support behind the Shōwa-kai, a promilitarist party. He dissolved the Diet (parliament) and called a general election, hoping to establish a one-party country. The general election revealed that he had few supporters, and he was forced to resign."
JAP_ichiyoraifuk:0 "Ichiyō Raifuk"
JAP_ichiyoraifuk_desc:0 "The return of spring. With all political failures in recent years the admired prince Konoe has stepped in times of crisis to steer Japan through its next goals"
